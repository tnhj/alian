<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Pixel Battle</title>

<style>

body{
margin:0;
background:#000;
font-family:monospace;
color:white;
overflow:hidden;
}

canvas{
display:block;
margin:auto;
background:#111;
image-rendering: pixelated;
}

#ui{
position:absolute;
top:10px;
left:10px;
}

.bar{
width:220px;
height:14px;
background:#333;
margin-bottom:6px;
}

.fill{
height:100%;
background:#0f0;
}

#phasefill{background:cyan;}
#bossfill{background:red;}

#title{
position:absolute;
width:100%;
height:100%;
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
background:black;
font-size:36px;
}

button{
font-size:20px;
padding:10px 30px;
margin-top:20px;
}

</style>
</head>

<body>

<div id="title">
PIXEL BATTLE
<button onclick="startGame()">START</button>
</div>

<div id="ui">

HP
<div class="bar"><div id="hpfill" class="fill"></div></div>

PHASE
<div class="bar"><div id="phasefill" class="fill"></div></div>

<div id="bossui" style="display:none;">
BOSS
<div class="bar"><div id="bossfill"></div></div>
</div>

</div>

<canvas id="game" width="800" height="500"></canvas>

<script>

const canvas = document.getElementById("game")
const ctx = canvas.getContext("2d")

let keys={}
let gameStarted=false

document.addEventListener("keydown",e=>keys[e.key]=true)
document.addEventListener("keyup",e=>keys[e.key]=false)

const playerSprite=[
"00100",
"01110",
"11111",
"10101",
"00100"
]

const enemySprite=[
"111",
"101",
"111"
]

const bossSprite=[
"00111100",
"11111111",
"11011011",
"11111111",
"01111110"
]

let player={
x:400,
y:420,
hp:100,
speed:2
}

let bullets=[]
let enemies=[]
let enemyBullets=[]
let explosions=[]

let phase=1
let progress=0
let boss=null

function startGame(){

document.getElementById("title").style.display="none"
gameStarted=true

spawnEnemies()

loop()

}

function drawSprite(sprite,x,y,scale,color){

ctx.fillStyle=color

for(let r=0;r<sprite.length;r++){

for(let c=0;c<sprite[r].length;c++){

if(sprite[r][c]=="1"){

ctx.fillRect(
x+c*scale,
y+r*scale,
scale,
scale)

}

}

}

}

function spawnEnemies(){

for(let i=0;i<5+phase;i++){

enemies.push({
x:Math.random()*760,
y:Math.random()*200,
hp:10,
vx:(Math.random()*2-1)*2,
vy:(Math.random()*2-1)*2,
shoot:60+Math.random()*60
})

}

}

function spawnBoss(){

boss={
x:360,
y:80,
hp:300,
max:300,
phase2:false,
timer:0
}

document.getElementById("bossui").style.display="block"

}

function shoot(){

bullets.push({
x:player.x+10,
y:player.y,
vy:-6
})

}

function explosion(x,y){

explosions.push({
x,y,
frame:0
})

}

function update(){

if(keys["ArrowLeft"]) player.x-=player.speed
if(keys["ArrowRight"]) player.x+=player.speed
if(keys["ArrowUp"]) player.y-=player.speed
if(keys["ArrowDown"]) player.y+=player.speed

if(keys[" "] && Math.random()<0.25) shoot()

player.x=Math.max(0,Math.min(780,player.x))
player.y=Math.max(0,Math.min(480,player.y))

bullets.forEach(b=>b.y+=b.vy)

bullets=bullets.filter(b=>b.y>-20)

enemies.forEach(e=>{

e.x+=e.vx
e.y+=e.vy

if(e.x<0||e.x>780)e.vx*=-1
if(e.y<0||e.y>250)e.vy*=-1

e.shoot--

if(e.shoot<0){

enemyBullets.push({
x:e.x+5,
y:e.y+5,
vy:3
})

e.shoot=80+Math.random()*80

}

})

enemyBullets.forEach(b=>b.y+=b.vy)

enemyBullets.forEach((b,i)=>{

if(Math.abs(b.x-player.x)<10 && Math.abs(b.y-player.y)<10){

player.hp-=5
explosion(player.x,player.y)
enemyBullets.splice(i,1)

}

})

bullets.forEach((b,bi)=>{

enemies.forEach((e,ei)=>{

if(Math.abs(b.x-e.x)<10 && Math.abs(b.y-e.y)<10){

explosion(e.x,e.y)

bullets.splice(bi,1)
enemies.splice(ei,1)

progress+=10

}

})

})

if(enemies.length==0 && !boss){

if(progress>=100){

spawnBoss()

}else{

phase++
spawnEnemies()

}

}

if(boss){

boss.timer++

if(boss.hp<150 && !boss.phase2){

boss.phase2=true

}

if(boss.timer%60==0){

enemyBullets.push({x:boss.x+30,y:boss.y,vy:4})
enemyBullets.push({x:boss.x+10,y:boss.y,vy:4})
enemyBullets.push({x:boss.x+50,y:boss.y,vy:4})

}

if(boss.phase2 && boss.timer%40==0){

for(let i=-2;i<=2;i++){

enemyBullets.push({
x:boss.x+30,
y:boss.y,
vy:3,
vx:i
})

}

}

bullets.forEach((b,i)=>{

if(Math.abs(b.x-boss.x)<40 && Math.abs(b.y-boss.y)<20){

boss.hp-=10
explosion(b.x,b.y)

bullets.splice(i,1)

}

})

if(boss.hp<=0){

alert("GAME CLEAR!")
location.reload()

}

}

explosions.forEach(e=>e.frame++)

explosions=explosions.filter(e=>e.frame<20)

updateUI()

}

function draw(){

ctx.clearRect(0,0,800,500)

drawSprite(playerSprite,player.x,player.y,4,"lime")

bullets.forEach(b=>{
ctx.fillStyle="yellow"
ctx.fillRect(b.x,b.y,3,8)
})

enemyBullets.forEach(b=>{
ctx.fillStyle="red"
ctx.fillRect(b.x,b.y,3,8)
})

enemies.forEach(e=>{

drawSprite(enemySprite,e.x,e.y,5,"white")

})

if(boss){

drawSprite(bossSprite,boss.x,boss.y,6,boss.phase2?"purple":"orange")

}

explosions.forEach(e=>{

ctx.fillStyle="orange"

ctx.beginPath()

ctx.arc(e.x,e.y,e.frame,0,Math.PI*2)

ctx.fill()

})

}

function updateUI(){

document.getElementById("hpfill").style.width=player.hp*2+"px"

document.getElementById("phasefill").style.width=progress*2+"px"

if(boss){

document.getElementById("bossfill").style.width=(boss.hp/boss.max)*220+"px"

}

}

function loop(){

update()
draw()

requestAnimationFrame(loop)

}

</script>

</body>
</html>
