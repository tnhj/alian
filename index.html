<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>理不尽弾幕シューティング</title>
<style>
body{margin:0;background:black;color:white;font-family:sans-serif;text-align:center}
canvas{background:black;display:block;margin:auto}
</style>
</head>
<body>
<canvas id="game" width="600" height="800"></canvas>
<script>
const canvas=document.getElementById("game");
const ctx=canvas.getContext("2d");

const W=canvas.width;
const H=canvas.height;

let keys={};
addEventListener("keydown",e=>keys[e.key]=true);
addEventListener("keyup",e=>keys[e.key]=false);

let player={x:W/2,y:H-80,size:6,speed:5};
let shots=[];
let enemies=[];
let bullets=[];

let phase=1;
let boss=null;
let timer=0;

function spawnEnemy(){
let type=Math.floor(Math.random()*3);
enemies.push({x:Math.random()*W,y:-20,type:type,t:0});
}

function spawnBoss(){
boss={x:W/2,y:120,hp:500,phase:1,t:0};
}

function shoot(){
shots.push({x:player.x,y:player.y-10});
}

addEventListener("keydown",e=>{
if(e.key==="z")shoot();
});

function updatePlayer(){
if(keys["ArrowLeft"])player.x-=player.speed;
if(keys["ArrowRight"])player.x+=player.speed;
if(keys["ArrowUp"])player.y-=player.speed;
if(keys["ArrowDown"])player.y+=player.speed;

player.x=Math.max(0,Math.min(W,player.x));
player.y=Math.max(0,Math.min(H,player.y));
}

function updateShots(){
for(let s of shots)s.y-=10;
shots=shots.filter(s=>s.y>-20);
}

function updateEnemies(){
for(let e of enemies){
 e.t++;
 e.y+=2;

 if(e.type==0 && e.t%60==0){
 bullets.push({x:e.x,y:e.y,vx:0,vy:4});
 }

 if(e.type==1 && e.t%60==0){
 for(let i=0;i<6;i++){
 let a=i*Math.PI/3;
 bullets.push({x:e.x,y:e.y,vx:Math.cos(a)*3,vy:Math.sin(a)*3});
 }
 }

 if(e.type==2 && e.t%60==0){
 let a=e.t*0.2;
 bullets.push({x:e.x,y:e.y,vx:Math.cos(a)*4,vy:Math.sin(a)*4});
 }
 }

 enemies=enemies.filter(e=>e.y<H+40);
}

function updateBoss(){
if(!boss)return;

boss.t++;

boss.x+=Math.sin(boss.t*0.03)*4;

if(boss.hp<250)boss.phase=2;

if(boss.phase==1 && boss.t%40==0){
 for(let i=0;i<20;i++){
 let a=i*Math.PI*2/20;
 bullets.push({x:boss.x,y:boss.y,vx:Math.cos(a)*3,vy:Math.sin(a)*3});
 }
}

if(boss.phase==2){

 if(boss.t%30==0){
 for(let i=0;i<36;i++){
 let a=i*Math.PI*2/36;
 bullets.push({x:boss.x,y:boss.y,vx:Math.cos(a)*4,vy:Math.sin(a)*4});
 }
 }

 if(boss.t%120==0){
 enemies.push({x:Math.random()*W,y:-20,type:1,t:0});
 enemies.push({x:Math.random()*W,y:-20,type:2,t:0});
 }

 if(boss.t%90==0){
 bullets.push({x:boss.x,y:boss.y,vx:0,vy:5,split:true,t:0});
 }
}
}

function updateBullets(){
for(let b of bullets){
 b.x+=b.vx;
 b.y+=b.vy;

 if(b.split){
 b.t++;
 if(b.t==40){
 for(let i=0;i<8;i++){
 let a=i*Math.PI*2/8;
 bullets.push({x:b.x,y:b.y,vx:Math.cos(a)*4,vy:Math.sin(a)*4});
 }
 }
 }

 if(b.x<0||b.x>W)b.vx*=-1;
 if(b.y<0||b.y>H)b.vy*=-1;
}

bullets=bullets.filter(b=>b.y>-50&&b.y<H+50);
}

function collision(){

for(let s of shots){
 for(let e of enemies){
 if(Math.hypot(s.x-e.x,s.y-e.y)<10){
 e.y=9999;
 }
 }

 if(boss && Math.hypot(s.x-boss.x,s.y-boss.y)<30){
 boss.hp--;
 }
}

}

function drawPlayer(){
ctx.fillStyle="cyan";
ctx.fillRect(player.x-4,player.y-4,8,8);
}

function drawShots(){
ctx.fillStyle="white";
for(let s of shots)ctx.fillRect(s.x-2,s.y-6,4,6);
}

function drawEnemies(){
ctx.fillStyle="red";
for(let e of enemies)ctx.fillRect(e.x-6,e.y-6,12,12);
}

function drawBoss(){
if(!boss)return;
ctx.fillStyle="purple";
ctx.fillRect(boss.x-40,boss.y-20,80,40);

ctx.fillStyle="white";
ctx.fillText("BOSS HP:"+boss.hp,10,20);
}

function drawBullets(){
ctx.fillStyle="yellow";
for(let b of bullets)ctx.fillRect(b.x-3,b.y-3,6,6);
}

function draw(){
ctx.clearRect(0,0,W,H);

ctx.fillText("PHASE "+phase,10,40);

 drawPlayer();
 drawShots();
 drawEnemies();
 drawBullets();
 drawBoss();
}

function update(){

 timer++;

 updatePlayer();
 updateShots();
 updateEnemies();
 updateBullets();

 if(phase<10 && timer%180==0)spawnEnemy();

 if(timer>2000 && !boss)spawnBoss();

 updateBoss();
 collision();

 draw();

 requestAnimationFrame(update);
}

update();
</script>
</body>
</html>
