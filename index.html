<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>Pixel Bullet Hell Invader</title>
<style>
body{
margin:0;
background:black;
color:white;
font-family:monospace;
overflow:hidden;
}

canvas{
display:block;
margin:auto;
background:#050505;
image-rendering: pixelated;
}

#ui{
position:absolute;
top:10px;
left:50%;
transform:translateX(-50%);
width:600px;
}

.bar{
height:10px;
background:#333;
margin:5px 0;
}

.fill{
height:100%;
background:#0f0;
width:100%;
}

#phaseFill{ background:#0af }
#bossFill{ background:#f00 }

</style>
</head>
<body>

<div id="ui">
<div>HP</div>
<div class="bar"><div id="hpFill" class="fill"></div></div>

<div>PHASE</div>
<div class="bar"><div id="phaseFill" class="fill"></div></div>

<div>BOSS</div>
<div class="bar"><div id="bossFill" class="fill"></div></div>
</div>

<canvas id="game" width="600" height="800"></canvas>

<script>

const canvas = document.getElementById("game")
const ctx = canvas.getContext("2d")

let keys={}
addEventListener("keydown",e=>keys[e.key]=true)
addEventListener("keyup",e=>keys[e.key]=false)

const player={
x:300,
y:720,
hp:100,
cool:0
}

let bullets=[]
let enemyBullets=[]
let enemies=[]
let explosions=[]

let phase=1
let phaseProgress=0
let boss=null
let gameOver=false
let gameClear=false

function spawnEnemy(){

let type=Math.floor(Math.random()*3)

enemies.push({
x:Math.random()*560+20,
y:-20,
hp:10+phase*2,
type:type,
t:0
})

}

function spawnBoss(){

boss={
x:300,
y:120,
hp:800,
maxHp:800,
phase:1,
t:0
}

}

function shoot(x,y,vx,vy,enemy=false){

let b={
x,y,vx,vy
}

if(enemy) enemyBullets.push(b)
else bullets.push(b)

}

function explode(x,y){

for(let i=0;i<15;i++){
explosions.push({
x,y,
vx:(Math.random()-0.5)*6,
vy:(Math.random()-0.5)*6,
life:30
})
}

}

function update(){

if(gameOver||gameClear)return

if(keys["ArrowLeft"]) player.x-=6
if(keys["ArrowRight"]) player.x+=6

player.x=Math.max(10,Math.min(590,player.x))

if(player.cool<=0){
shoot(player.x,player.y,-0, -10)
player.cool=6
}
player.cool--

phaseProgress+=0.3

if(phaseProgress>100 && !boss){
phase++
phaseProgress=0
if(phase<10) spawnEnemy()
}

if(Math.random()<0.03+phase*0.005 && phase<10)
spawnEnemy()

if(phase==10 && !boss){
spawnBoss()
}

for(let e of enemies){

e.t+=0.05

if(e.type==0){
e.y+=2+phase*0.3
}

if(e.type==1){
e.y+=2
e.x+=Math.sin(e.t)*3
}

if(e.type==2){
e.y+=1.5
e.x+=Math.cos(e.t*2)*4
}

if(Math.random()<0.02){
let dx=player.x-e.x
let dy=player.y-e.y
let d=Math.hypot(dx,dy)
shoot(e.x,e.y,dx/d*3,dy/d*3,true)
}

}

if(boss){

boss.t+=0.03

boss.x=300+Math.sin(boss.t)*200

if(Math.random()<0.15){

for(let i=0;i<12;i++){

let a=i*Math.PI*2/12
shoot(boss.x,boss.y,Math.cos(a)*3,Math.sin(a)*3,true)

}

}

if(boss.phase==2){

for(let i=0;i<20;i++){

let a=i*Math.PI*2/20+boss.t
shoot(boss.x,boss.y,Math.cos(a)*4,Math.sin(a)*4,true)

}

}

if(boss.hp<boss.maxHp/2 && boss.phase==1){
boss.phase=2
explode(boss.x,boss.y)
}

}

for(let b of bullets){
b.y+=b.vy
}

for(let b of enemyBullets){
b.x+=b.vx
b.y+=b.vy
}

for(let b of bullets){

for(let e of enemies){

if(Math.hypot(b.x-e.x,b.y-e.y)<15){
e.hp-=10
b.y=-100
}

}

if(boss && Math.hypot(b.x-boss.x,b.y-boss.y)<40){
boss.hp-=5
b.y=-100
}

}

for(let b of enemyBullets){

if(Math.hypot(b.x-player.x,b.y-player.y)<15){
player.hp-=5
b.y=900
explode(player.x,player.y)
}

}

enemies=enemies.filter(e=>{
if(e.hp<=0){
explode(e.x,e.y)
return false
}
return e.y<820
})

bullets=bullets.filter(b=>b.y>-50)
enemyBullets=enemyBullets.filter(b=>b.y<850)

for(let ex of explosions){
ex.x+=ex.vx
ex.y+=ex.vy
ex.life--
}

explosions=explosions.filter(e=>e.life>0)

if(player.hp<=0){
gameOver=true
}

if(boss && boss.hp<=0){
gameClear=true
explode(boss.x,boss.y)
}

updateUI()

}

function updateUI(){

document.getElementById("hpFill").style.width=player.hp+"%"

document.getElementById("phaseFill").style.width=phaseProgress+"%"

if(boss){
document.getElementById("bossFill").style.width=
(boss.hp/boss.maxHp*100)+"%"
}else{
document.getElementById("bossFill").style.width="0%"
}

}

function drawPixel(x,y,size=4){

ctx.fillRect(
Math.floor(x/size)*size,
Math.floor(y/size)*size,
size,size
)

}

function draw(){

ctx.fillStyle="black"
ctx.fillRect(0,0,600,800)

ctx.fillStyle="#0ff"
drawPixel(player.x,player.y,6)

ctx.fillStyle="#ff0"
for(let b of bullets) drawPixel(b.x,b.y,4)

ctx.fillStyle="#f44"
for(let b of enemyBullets) drawPixel(b.x,b.y,4)

ctx.fillStyle="#0f0"
for(let e of enemies) drawPixel(e.x,e.y,8)

if(boss){
ctx.fillStyle="#f0f"
drawPixel(boss.x,boss.y,20)
}

ctx.fillStyle="#fa0"
for(let ex of explosions){
drawPixel(ex.x,ex.y,4)
}

if(gameOver){

ctx.fillStyle="white"
ctx.font="40px monospace"
ctx.fillText("GAME OVER",180,400)

}

if(gameClear){

ctx.fillStyle="white"
ctx.font="40px monospace"
ctx.fillText("GAME CLEAR!",160,400)

}

}

function loop(){

update()
draw()
requestAnimationFrame(loop)

}

loop()

</script>

</body>
</html>
