```html
<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>GALAXY INVADER</title>

<style>

body{
margin:0;
background:black;
color:white;
font-family:sans-serif;
text-align:center;
overflow:hidden;
}

canvas{
background:black;
border:2px solid cyan;
display:block;
margin:auto;
}

#titleScreen{
position:absolute;
width:100%;
height:100%;
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
background:black;
}

#title{
font-size:60px;
color:cyan;
animation:glow 2s infinite alternate;
}

@keyframes glow{
from{ text-shadow:0 0 10px cyan;}
to{ text-shadow:0 0 30px cyan;}
}

button{
padding:15px 40px;
font-size:20px;
background:black;
color:cyan;
border:2px solid cyan;
cursor:pointer;
}

#ui{
width:900px;
margin:auto;
}

.bar{
height:16px;
background:#333;
margin:5px;
}

.fill{
height:100%;
background:lime;
}

.shieldFill{background:cyan;}
.phaseFill{background:orange;}
.bossFill{background:red;}

</style>
</head>

<body>

<div id="titleScreen">
<div id="title">GALAXY INVADER</div>
<button onclick="startGame()">START</button>
</div>

<div id="ui">

HP
<div class="bar"><div id="hp" class="fill"></div></div>

SHIELD
<div class="bar"><div id="shield" class="fill shieldFill"></div></div>

PHASE
<div class="bar"><div id="phase" class="fill phaseFill"></div></div>

BOSS
<div class="bar"><div id="boss" class="fill bossFill"></div></div>

</div>

<canvas id="game" width="900" height="600"></canvas>

<script>

const canvas=document.getElementById("game")
const ctx=canvas.getContext("2d")

let game=false

let player={x:450,y:550,hp:100}

let shield=0
let shieldMax=50

let bullets=[]
let enemyBullets=[]
let enemies=[]
let explosions=[]
let items=[]

let boss=null

let phase=1
let phaseProgress=0

let keys={}

let shootCooldown=0

let stars=[]

for(let i=0;i<80;i++){
stars.push({
x:Math.random()*900,
y:Math.random()*600,
speed:1+Math.random()*2
})
}

document.addEventListener("keydown",e=>{
keys[e.key]=true

if(e.code==="Space")shoot()

})

document.addEventListener("keyup",e=>keys[e.key]=false)

function shoot(){

if(shootCooldown>0)return

bullets.push({x:player.x,y:player.y})

shootCooldown=12

}

function startGame(){
document.getElementById("titleScreen").style.display="none"
game=true
startPhase()
loop()
}

function startPhase(){

shield=shieldMax

let count=5+phase*2

for(let i=0;i<count;i++){

let type=1

if(phase>=2 && Math.random()<0.3)type=2
if(phase>=3 && Math.random()<0.2)type=3
if(phase>=4 && Math.random()<0.2)type=4

enemies.push({
x:80+i*120,
y:80+Math.random()*100,
hp:10+type*5,
dir:Math.random()<0.5?-1:1,
type:type,
zig:0
})

}

if(phase==5)spawnBoss()

}

function spawnBoss(){

boss={
x:450,
y:120,
hp:300,
cool:0,
mode:1
}

}

function enemyShoot(e){

enemyBullets.push({
x:e.x,
y:e.y,
vx:(Math.random()-0.5)*2,
vy:3+phase
})

}

function update(){

if(!game)return

if(keys["ArrowLeft"])player.x-=7
if(keys["ArrowRight"])player.x+=7

player.x=Math.max(20,Math.min(880,player.x))

if(shootCooldown>0)shootCooldown--

for(let i=bullets.length-1;i>=0;i--){
bullets[i].y-=10
if(bullets[i].y<0)bullets.splice(i,1)
}

for(let i=enemyBullets.length-1;i>=0;i--){

enemyBullets[i].x+=enemyBullets[i].vx
enemyBullets[i].y+=enemyBullets[i].vy

if(enemyBullets[i].y>600)
enemyBullets.splice(i,1)

}

enemies.forEach(e=>{

let speed=1+phase*0.2

if(e.type==2)speed=3
if(e.type==3){
e.zig+=0.1
e.x+=Math.sin(e.zig)*4
}

e.x+=e.dir*speed

if(e.x<20||e.x>880)e.dir*=-1

if(Math.random()<0.006+phase*0.002)
enemyShoot(e)

})

if(boss){

if(boss.hp<150)boss.mode=2

boss.cool--

if(boss.cool<=0){

if(boss.mode==1){

enemyBullets.push({x:boss.x,y:boss.y,vx:-2,vy:4})
enemyBullets.push({x:boss.x,y:boss.y,vx:0,vy:4})
enemyBullets.push({x:boss.x,y:boss.y,vx:2,vy:4})

}else{

for(let i=0;i<8;i++){

enemyBullets.push({
x:boss.x,
y:boss.y,
vx:Math.cos(i)*3,
vy:Math.sin(i)*3+3
})

}

}

boss.cool=50

}

}

checkCollisions()

updateUI()

}

function checkCollisions(){

for(let bi=bullets.length-1;bi>=0;bi--){

let b=bullets[bi]

for(let ei=enemies.length-1;ei>=0;ei--){

let e=enemies[ei]

if(Math.abs(b.x-e.x)<20 && Math.abs(b.y-e.y)<20){

bullets.splice(bi,1)

e.hp-=10

if(e.hp<=0){

spawnExplosion(e.x,e.y)

if(Math.random()<0.35)
items.push({x:e.x,y:e.y})

enemies.splice(ei,1)

phaseProgress+=5

}

break

}

}

if(boss){

if(Math.abs(b.x-boss.x)<70 && Math.abs(b.y-boss.y)<70){

bullets.splice(bi,1)

boss.hp-=10

spawnExplosion(b.x,b.y)

if(boss.hp<=0){

alert("GAME CLEAR")
location.reload()

}

}

}

}

for(let bi=enemyBullets.length-1;bi>=0;bi--){

let b=enemyBullets[bi]

if(Math.abs(b.x-player.x)<20 && Math.abs(b.y-player.y)<20){

enemyBullets.splice(bi,1)

if(shield>0){
shield-=5
}else{
player.hp-=5
}

spawnExplosion(player.x,player.y)

if(player.hp<=0){

alert("GAME OVER")
location.reload()

}

}

}

items.forEach((it,i)=>{

it.y+=2

if(Math.abs(it.x-player.x)<20 && Math.abs(it.y-player.y)<20){

player.hp=Math.min(100,player.hp+20)

items.splice(i,1)

}

})

if(enemies.length==0 && !boss){

phase++
phaseProgress=0
startPhase()

}

}

function spawnExplosion(x,y){
explosions.push({x,y,frame:0})
}

function updateUI(){

document.getElementById("hp").style.width=player.hp+"%"
document.getElementById("shield").style.width=(shield/shieldMax*100)+"%"
document.getElementById("phase").style.width=Math.min(100,phaseProgress)+"%"

if(boss)
document.getElementById("boss").style.width=(boss.hp/300*100)+"%"

}

function draw(){

ctx.clearRect(0,0,900,600)

drawStars()
drawPlayer()
drawEnemies()
drawBoss()
drawBullets()
drawExplosions()
drawItems()

}

function drawStars(){

ctx.fillStyle="white"

stars.forEach(s=>{

s.y+=s.speed

if(s.y>600){
s.y=0
s.x=Math.random()*900
}

ctx.fillRect(s.x,s.y,2,2)

})

}

function drawPlayer(){

ctx.fillStyle="cyan"

ctx.fillRect(player.x-15,player.y-10,30,20)
ctx.fillRect(player.x-5,player.y-20,10,10)

}

function drawEnemies(){

enemies.forEach(e=>{

if(e.type==1)ctx.fillStyle="lime"
if(e.type==2)ctx.fillStyle="yellow"
if(e.type==3)ctx.fillStyle="orange"
if(e.type==4)ctx.fillStyle="purple"

ctx.fillRect(e.x-15,e.y-10,30,20)
ctx.fillRect(e.x-20,e.y,40,5)

})

}

function drawBoss(){

if(!boss)return

ctx.fillStyle="red"

ctx.fillRect(boss.x-70,boss.y-40,140,80)
ctx.fillRect(boss.x-40,boss.y-80,80,40)

}

function drawBullets(){

ctx.fillStyle="cyan"

bullets.forEach(b=>ctx.fillRect(b.x-2,b.y-10,4,10))

ctx.fillStyle="orange"

enemyBullets.forEach(b=>ctx.fillRect(b.x-3,b.y-6,6,12))

}

function drawExplosions(){

for(let i=explosions.length-1;i>=0;i--){

let ex=explosions[i]

ctx.fillStyle="orange"

ctx.beginPath()
ctx.arc(ex.x,ex.y,ex.frame*4,0,Math.PI*2)
ctx.fill()

ex.frame++

if(ex.frame>12)
explosions.splice(i,1)

}

}

function drawItems(){

ctx.fillStyle="pink"

items.forEach(it=>{

ctx.beginPath()
ctx.arc(it.x,it.y,8,0,Math.PI*2)
ctx.fill()

})

}

function loop(){

update()
draw()

requestAnimationFrame(loop)

}

</script>

</body>
</html>
