<!DOCTYPE html>

<html lang="ja">
<head>
<meta charset="UTF-8">
<title>Ultimate Danmaku</title>

<style>
body{margin:0;background:black;color:white;font-family:monospace;overflow:hidden}
canvas{display:block;margin:auto;background:#02020a;image-rendering:pixelated}

#ui{
position:absolute;
top:10px;
left:50%;
transform:translateX(-50%);
width:600px
}

.bar{height:12px;background:#333;margin:4px 0}
.fill{height:100%;background:#0f0}

</style>

</head>

<body>

<div id="ui">

HP

<div class="bar"><div id="hpFill" class="fill"></div></div>

Score <span id="score">0</span>

Boss <span id="bossName">None</span>

</div>

<canvas id="game" width="600" height="800"></canvas>

<script>

const canvas=game
const ctx=canvas.getContext("2d")

let keys={}
addEventListener("keydown",e=>keys[e.key]=true)
addEventListener("keyup",e=>keys[e.key]=false)

const player={x:300,y:700,hp:100,cool:0}

let bullets=[]
let enemyBullets=[]
let explosions=[]
let stars=[]

let score=0
let bossIndex=0
let boss=null

for(let i=0;i<150;i++){
stars.push({x:Math.random()*600,y:Math.random()*800,s:Math.random()*2+1})
}

function shoot(x,y,vx,vy,enemy=false){
const b={x,y,vx,vy}
if(enemy)enemyBullets.push(b)
else bullets.push(b)
}

function explode(x,y){
for(let i=0;i<12;i++){
explosions.push({
x,y,
vx:(Math.random()*2-1)*4,
vy:(Math.random()*2-1)*4,
life:30
})
}
}

function flower(cx,cy,petals,speed,rot){
for(let i=0;i<petals;i++){
let a=i*Math.PI*2/petals+rot
shoot(cx,cy,Math.cos(a)*speed,Math.sin(a)*speed,true)
}
}

function spiral(cx,cy,count,speed,rot){
for(let i=0;i<count;i++){
let a=rot+i*0.2
shoot(cx,cy,Math.cos(a)*speed,Math.sin(a)*speed,true)
}
}

function star(cx,cy,count,speed,rot){
for(let i=0;i<count;i++){
let a=i*Math.PI*2/count
shoot(cx,cy,Math.cos(a+rot)*speed,Math.sin(a+rot)*speed,true)
shoot(cx,cy,Math.cos(a+rot)*speed*0.5,Math.sin(a+rot)*speed*0.5,true)
}
}

const bosses=[

{name:"Ignis",hp:1500,pattern:0},
{name:"Glacia",hp:1800,pattern:1},
{name:"Volt",hp:2000,pattern:2},
{name:"Gravitas",hp:2300,pattern:3},
{name:"Hanabi",hp:3000,pattern:4}

]

function spawnBoss(){

let data=bosses[bossIndex]

boss={
x:300,
y:120,
hp:data.hp,
max:data.hp,
pattern:data.pattern,
t:0,
name:data.name
}

bossName.textContent=data.name

}

spawnBoss()

function update(){

if(player.hp<=0)return

if(keys["ArrowLeft"])player.x-=6
if(keys["ArrowRight"])player.x+=6
player.x=Math.max(10,Math.min(590,player.x))

if(keys[" "]&&player.cool<=0){
shoot(player.x,player.y,0,-10)
player.cool=6
}

player.cool--

for(let s of stars){
s.y+=s.s
if(s.y>800)s.y=0
}

boss.t+=0.04
boss.x=300+Math.sin(boss.t)*200

switch(boss.pattern){

case 0:
spiral(boss.x,boss.y,12,3,boss.t)
break

case 1:
star(boss.x,boss.y,10,3,boss.t)
break

case 2:
flower(boss.x,boss.y,20,4,boss.t)
break

case 3:
spiral(boss.x,boss.y,20,5,boss.t*2)
flower(boss.x,boss.y,12,3,-boss.t)
break

case 4:
flower(boss.x,boss.y,30,4,boss.t)
star(boss.x,boss.y,16,3,boss.t*2)
break

}

for(let b of bullets){
b.x+=b.vx
b.y+=b.vy
}

for(let b of enemyBullets){
b.x+=b.vx
b.y+=b.vy
}

for(let b of bullets){
if(Math.hypot(b.x-boss.x,b.y-boss.y)<30){
boss.hp-=5
b.y=-100
}
}

for(let b of enemyBullets){

let d=Math.hypot(b.x-player.x,b.y-player.y)

if(d<12){
player.hp-=10
b.y=900
explode(player.x,player.y)
}

}

if(boss.hp<=0){

explode(boss.x,boss.y)

bossIndex++

if(bossIndex<bosses.length){

spawnBoss()

}else{

boss=null

}

}

bullets=bullets.filter(b=>b.y>-20)
enemyBullets=enemyBullets.filter(b=>b.y<820)

for(let ex of explosions){
ex.x+=ex.vx
ex.y+=ex.vy
ex.life--
}

explosions=explosions.filter(e=>e.life>0)

hpFill.style.width=player.hp+"%"

scoreEl.textContent=score

}

function pixel(x,y,s){
ctx.fillRect(Math.floor(x/s)*s,Math.floor(y/s)*s,s,s)
}

function draw(){

ctx.fillStyle="black"
ctx.fillRect(0,0,600,800)

ctx.fillStyle="white"
for(let s of stars)pixel(s.x,s.y,2)

ctx.fillStyle="#0ff"
pixel(player.x,player.y,6)

ctx.fillStyle="#ff0"
for(let b of bullets)pixel(b.x,b.y,4)

ctx.fillStyle="#f44"
for(let b of enemyBullets)pixel(b.x,b.y,4)

if(boss){
ctx.fillStyle="#f0f"
pixel(boss.x,boss.y,24)
}

ctx.fillStyle="orange"
for(let ex of explosions)pixel(ex.x,ex.y,4)

if(!boss){
ctx.fillStyle="white"
ctx.font="40px monospace"
ctx.fillText("GAME CLEAR",170,400)
}

if(player.hp<=0){
ctx.fillStyle="white"
ctx.font="40px monospace"
ctx.fillText("GAME OVER",170,400)
}

}

function loop(){
update()
draw()
requestAnimationFrame(loop)
}

const scoreEl=document.getElementById("score")
const bossName=document.getElementById("bossName")

loop()

</script>

</body>
</html>
