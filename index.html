<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>8bit Shooting</title>
<style>

body{
margin:0;
background:black;
color:white;
font-family:monospace;
overflow:hidden;
}

canvas{
display:block;
margin:auto;
background:black;
}

#ui{
position:absolute;
top:10px;
left:10px;
}

#gameover{
position:absolute;
top:50%;
left:50%;
transform:translate(-50%,-50%);
font-size:40px;
display:none;
}

</style>
</head>

<body>

<div id="ui">
HP <span id="hp"></span>
</div>

<div id="gameover">
GAME OVER
</div>

<canvas id="game" width="480" height="640"></canvas>

<script>

const canvas=document.getElementById("game")
const ctx=canvas.getContext("2d")

let keys={}

document.addEventListener("keydown",e=>keys[e.key]=true)
document.addEventListener("keyup",e=>keys[e.key]=false)

let player={
x:240,
y:550,
hp:100,
speed:4,
charge:0,
charging:false
}

let bullets=[]
let enemies=[]
let enemyBullets=[]
let stars=[]

for(let i=0;i<120;i++){
stars.push({
x:Math.random()*480,
y:Math.random()*640,
s:Math.random()*2+1
})
}

function spawnEnemy(){

enemies.push({
x:Math.random()*440+20,
y:Math.random()*200+20,
vx:(Math.random()-0.5)*2,
vy:(Math.random()-0.5)*2,
hp:3
})

}

for(let i=0;i<6;i++)spawnEnemy()

function update(){

// movement
if(keys["ArrowLeft"]) player.x-=player.speed
if(keys["ArrowRight"]) player.x+=player.speed
if(keys["ArrowUp"]) player.y-=player.speed
if(keys["ArrowDown"]) player.y+=player.speed

player.x=Math.max(10,Math.min(470,player.x))
player.y=Math.max(350,Math.min(630,player.y))

// shooting
if(keys[" "]){
player.charging=true
player.charge++
}

if(!keys[" "] && player.charging){

if(player.charge>30){

bullets.push({
x:player.x,
y:player.y,
v:10,
size:10,
pierce:true
})

}else{

bullets.push({
x:player.x,
y:player.y,
v:8,
size:4
})

}

player.charge=0
player.charging=false

}

// stars
stars.forEach(s=>{
s.y+=s.s
if(s.y>640)s.y=0
})

// bullets
bullets.forEach((b,i)=>{
b.y-=b.v
if(b.y<0)bullets.splice(i,1)
})

// enemies
enemies.forEach((e,ei)=>{

e.x+=e.vx
e.y+=e.vy

if(e.x<20||e.x>460)e.vx*=-1
if(e.y<20||e.y>300)e.vy*=-1

if(Math.random()<0.02){

enemyBullets.push({
x:e.x,
y:e.y,
vx:(Math.random()-0.5)*3,
vy:3
})

}

bullets.forEach((b,bi)=>{

if(Math.hypot(b.x-e.x,b.y-e.y)<15){

e.hp--

if(!b.pierce) bullets.splice(bi,1)

if(e.hp<=0){

enemies.splice(ei,1)
spawnEnemy()

}

}

})

})

// enemy bullets
enemyBullets.forEach((b,i)=>{

b.x+=b.vx
b.y+=b.vy

if(Math.hypot(b.x-player.x,b.y-player.y)<15){

player.hp-=10
enemyBullets.splice(i,1)

}

})

// game over
if(player.hp<=0){

document.getElementById("gameover").style.display="block"

return

}

document.getElementById("hp").innerText=player.hp

}

function drawPlayer(){

// 8bit ship

const p=[
"00111100",
"01111110",
"11111111",
"11011011",
"11111111",
"00111100",
"00100100",
"01000010"
]

let scale=3

for(let y=0;y<p.length;y++){

for(let x=0;x<p[y].length;x++){

if(p[y][x]=="1"){

ctx.fillStyle="cyan"

ctx.fillRect(
player.x+x*scale-12,
player.y+y*scale-12,
scale,
scale
)

}

}

}

}

function draw(){

ctx.clearRect(0,0,480,640)

// stars
ctx.fillStyle="white"
stars.forEach(s=>ctx.fillRect(s.x,s.y,2,2))

// player
drawPlayer()

// bullets
ctx.fillStyle="yellow"
bullets.forEach(b=>{
ctx.beginPath()
ctx.arc(b.x,b.y,b.size,0,Math.PI*2)
ctx.fill()
})

// enemy bullets
ctx.fillStyle="red"
enemyBullets.forEach(b=>{
ctx.beginPath()
ctx.arc(b.x,b.y,4,0,Math.PI*2)
ctx.fill()
})

// enemies
ctx.fillStyle="orange"
enemies.forEach(e=>{
ctx.fillRect(e.x-12,e.y-12,24,24)
})

}

function loop(){

update()
draw()

requestAnimationFrame(loop)

}

loop()

</script>
</body>
</html>
