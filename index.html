<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>Chaos Invader</title>

<style>
body{
margin:0;
background:black;
color:white;
font-family:monospace;
overflow:hidden;
}

canvas{
display:block;
margin:auto;
background:#02020a;
image-rendering:pixelated;
}

#ui{
position:absolute;
top:10px;
left:50%;
transform:translateX(-50%);
width:600px;
}

.bar{height:10px;background:#333;margin:4px 0;}
.fill{height:100%;}

#hpFill{background:#0f0}
#phaseFill{background:#09f}
#bossFill{background:#f00}

</style>
</head>
<body>

<div id="ui">

HP
<div class="bar"><div id="hpFill" class="fill"></div></div>

PHASE
<div class="bar"><div id="phaseFill" class="fill"></div></div>

BOSS
<div class="bar"><div id="bossFill" class="fill"></div></div>

SCORE <span id="score">0</span>

</div>

<canvas id="game" width="600" height="800"></canvas>

<script>

const canvas=game
const ctx=canvas.getContext("2d")

let keys={}
addEventListener("keydown",e=>keys[e.key]=true)
addEventListener("keyup",e=>keys[e.key]=false)

const player={
x:300,
y:720,
hp:100,
cool:0
}

let bullets=[]
let enemyBullets=[]
let enemies=[]
let explosions=[]
let stars=[]

let phase=1
let enemiesKilled=0
let enemiesTotal=0
let boss=null
let score=0

let gameOver=false
let gameClear=false

for(let i=0;i<100;i++){
stars.push({x:Math.random()*600,y:Math.random()*800,s:Math.random()*2+1})
}

function spawnEnemy(){

let type=Math.floor(Math.random()*5)

enemies.push({
x:Math.random()*560+20,
y:100,
hp:20+phase*4,
type,
t:Math.random()*10,
vx:(Math.random()-0.5)*6
})

}

function spawnWave(){

enemiesKilled=0
enemiesTotal=8+phase*4

for(let i=0;i<enemiesTotal;i++)spawnEnemy()

}

function spawnBoss(){

boss={
x:300,
y:120,
hp:1600,
maxHp:1600,
phase:1,
t:0
}

}

function shoot(x,y,vx,vy,enemy=false){

let b={x,y,vx,vy}

if(enemy)enemyBullets.push(b)
else bullets.push(b)

}

function explode(x,y){

for(let i=0;i<30;i++){

explosions.push({
x,y,
vx:(Math.random()-0.5)*10,
vy:(Math.random()-0.5)*10,
life:40
})

}

}

spawnWave()

function update(){

if(gameOver||gameClear)return

if(keys["ArrowLeft"])player.x-=7
if(keys["ArrowRight"])player.x+=7
player.x=Math.max(10,Math.min(590,player.x))

if(keys[" "] && player.cool<=0){

shoot(player.x,player.y,0,-12)
player.cool=5

}

player.cool--

for(let s of stars){

s.y+=s.s
if(s.y>800)s.y=0

}

for(let e of enemies){

e.t+=0.08

switch(e.type){

case 0: // 高速ジグザグ
e.x+=Math.sin(e.t*4)*8
break

case 1: // 波動
e.x+=Math.cos(e.t)*6
e.y+=Math.sin(e.t)*2
break

case 2: // スパイラル
e.x+=Math.cos(e.t)*5
e.y+=Math.sin(e.t)*2
break

case 3: // ダッシュ
e.x+=e.vx
if(Math.random()<0.02)e.vx*=-1
break

case 4: // テレポート
if(Math.random()<0.01)
e.x=Math.random()*560+20
break

}

if(Math.random()<0.04){

let dx=player.x-e.x
let dy=player.y-e.y
let d=Math.hypot(dx,dy)

shoot(e.x,e.y,dx/d*4,dy/d*4,true)

}

e.x=Math.max(20,Math.min(580,e.x))
e.y=Math.max(50,Math.min(400,e.y))

}

if(boss){

boss.t+=0.05
boss.x=300+Math.sin(boss.t)*220

for(let i=0;i<16;i++){

let a=i*Math.PI*2/16+boss.t
shoot(boss.x,boss.y,Math.cos(a)*4,Math.sin(a)*4,true)

}

if(boss.phase==2){

for(let i=0;i<24;i++){

let a=i*Math.PI*2/24+boss.t
shoot(boss.x,boss.y,Math.cos(a)*5,Math.sin(a)*5,true)

}

}

if(boss.hp<boss.maxHp/2 && boss.phase==1){

boss.phase=2
explode(boss.x,boss.y)

}

}

for(let b of bullets){b.x+=b.vx;b.y+=b.vy}
for(let b of enemyBullets){b.x+=b.vx;b.y+=b.vy}

for(let b of bullets){

for(let e of enemies){

if(Math.hypot(b.x-e.x,b.y-e.y)<15){

e.hp-=10
b.y=-100

}

}

if(boss && Math.hypot(b.x-boss.x,b.y-boss.y)<40){

boss.hp-=5
b.y=-100

}

}

for(let b of enemyBullets){

if(Math.hypot(b.x-player.x,b.y-player.y)<15){

player.hp-=5
b.y=900
explode(player.x,player.y)

}

}

enemies=enemies.filter(e=>{

if(e.hp<=0){

explode(e.x,e.y)
score+=100
enemiesKilled++
return false

}

return true

})

if(enemies.length==0 && !boss){

if(phase<10){

phase++
spawnWave()

}else{

spawnBoss()

}

}

if(boss && boss.hp<=0){

explode(boss.x,boss.y)
gameClear=true

}

bullets=bullets.filter(b=>b.y>-20)
enemyBullets=enemyBullets.filter(b=>b.y<820)

for(let e of explosions){

e.x+=e.vx
e.y+=e.vy
e.life--

}

explosions=explosions.filter(e=>e.life>0)

if(player.hp<=0)gameOver=true

updateUI()

}

function updateUI(){

hpFill.style.width=player.hp+"%"

phaseFill.style.width=(enemiesKilled/enemiesTotal*100)+"%"

score.textContent=score

if(boss){

bossFill.style.width=(boss.hp/boss.maxHp*100)+"%"

}else{

bossFill.style.width="0%"

}

}

function drawPixel(x,y,s){

ctx.fillRect(
Math.floor(x/s)*s,
Math.floor(y/s)*s,
s,s
)

}

function draw(){

ctx.fillStyle="black"
ctx.fillRect(0,0,600,800)

ctx.fillStyle="white"
for(let s of stars)drawPixel(s.x,s.y,2)

ctx.fillStyle="#0ff"
drawPixel(player.x,player.y,6)

ctx.fillStyle="#ff0"
for(let b of bullets)drawPixel(b.x,b.y,4)

ctx.fillStyle="#f44"
for(let b of enemyBullets)drawPixel(b.x,b.y,4)

ctx.fillStyle="#0f0"
for(let e of enemies)drawPixel(e.x,e.y,8)

if(boss){

ctx.fillStyle="#f0f"
drawPixel(boss.x,boss.y,20)

}

ctx.fillStyle="#fa0"
for(let ex of explosions)drawPixel(ex.x,ex.y,4)

if(gameOver){

ctx.fillStyle="white"
ctx.font="40px monospace"
ctx.fillText("GAME OVER",170,400)

}

if(gameClear){

ctx.fillStyle="white"
ctx.font="40px monospace"
ctx.fillText("GAME CLEAR!",150,400)

}

}

function loop(){

update()
draw()
requestAnimationFrame(loop)

}

loop()

</script>
</body>
</html>
