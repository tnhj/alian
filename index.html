<!DOCTYPE html>

<html lang="ja">
<head>
<meta charset="UTF-8">
<title>Danmaku Invader</title>
<style>
body{margin:0;background:black;color:white;font-family:monospace;overflow:hidden}
canvas{display:block;margin:auto;background:#02020a;image-rendering:pixelated}

#ui{
position:absolute;
top:10px;
left:50%;
transform:translateX(-50%);
width:600px
}

.bar{height:12px;background:#333;margin:4px 0}
.fill{height:100%;background:#0f0}
#phaseFill{background:#0ff}
#bossFill{background:#f0f} </style>

</head>
<body>

<div id="ui">

HP

<div class="bar"><div id="hpFill" class="fill"></div></div>

PHASE

<div class="bar"><div id="phaseFill" class="fill"></div></div>

BOSS

<div class="bar"><div id="bossFill" class="fill"></div></div>

</div>

<canvas id="game" width="600" height="800"></canvas>

<script>

const canvas=game
const ctx=canvas.getContext("2d")

let keys={}
addEventListener("keydown",e=>keys[e.key]=true)
addEventListener("keyup",e=>keys[e.key]=false)

const player={x:300,y:720,hp:100,cool:0}

let bullets=[]
let enemyBullets=[]
let enemies=[]
let explosions=[]
let stars=[]

let phase=1
let maxPhase=10

let boss=null

for(let i=0;i<120;i++){
stars.push({
x:Math.random()*600,
y:Math.random()*800,
s:Math.random()*2+1
})
}

function spawnEnemies(){

for(let i=0;i<phase+3;i++){

enemies.push({

x:100+Math.random()*400,
y:80+Math.random()*200,

vx:(Math.random()*2-1)*2,
vy:(Math.random()*2-1)*2,

t:Math.random()*10,

hp:20+phase*5

})

}

}

spawnEnemies()

function shoot(x,y,vx,vy,enemy=false){

const b={x,y,vx,vy}

if(enemy) enemyBullets.push(b)
else bullets.push(b)

}

function explode(x,y){

for(let i=0;i<12;i++){
explosions.push({
x,y,
vx:(Math.random()*2-1)*4,
vy:(Math.random()*2-1)*4,
life:30
})
}

}

function spawnBoss(){

boss={
x:300,
y:120,
hp:1200,
max:1200,
t:0,
phase:1
}

}

function update(){

if(player.hp<=0) return

if(keys["ArrowLeft"]) player.x-=6
if(keys["ArrowRight"]) player.x+=6

player.x=Math.max(10,Math.min(590,player.x))

if(keys[" "] && player.cool<=0){

shoot(player.x,player.y,0,-10)

player.cool=6

}

player.cool--

for(let s of stars){

s.y+=s.s

if(s.y>800)s.y=0

}

for(let e of enemies){

e.t+=0.05

e.x+=Math.sin(e.t)*3+e.vx
e.y+=Math.cos(e.t)*2+e.vy

e.x=Math.max(40,Math.min(560,e.x))
e.y=Math.max(40,Math.min(400,e.y))

if(Math.random()<0.02){

let a=Math.atan2(player.y-e.y,player.x-e.x)

shoot(e.x,e.y,Math.cos(a)*4,Math.sin(a)*4,true)

}

}

if(boss){

boss.t+=0.04

boss.x=300+Math.sin(boss.t)*220

for(let i=0;i<24;i++){

let a=i*Math.PI*2/24+boss.t

shoot(boss.x,boss.y,
Math.cos(a)*3,
Math.sin(a)*3,true)

}

if(boss.phase==2){

for(let i=0;i<36;i++){

let a=i*Math.PI*2/36+boss.t*2

shoot(boss.x,boss.y,
Math.cos(a)*4,
Math.sin(a)*4,true)

}

}

if(boss.hp<boss.max/2) boss.phase=2

}

for(let b of bullets){
b.x+=b.vx
b.y+=b.vy
}

for(let b of enemyBullets){
b.x+=b.vx
b.y+=b.vy
}

for(let b of bullets){

for(let e of enemies){

if(Math.hypot(b.x-e.x,b.y-e.y)<18){

e.hp-=10
b.y=-100

if(e.hp<=0){

explode(e.x,e.y)

}

}

}

if(boss && Math.hypot(b.x-boss.x,b.y-boss.y)<40){

boss.hp-=5
b.y=-100

}

}

for(let b of enemyBullets){

if(Math.hypot(b.x-player.x,b.y-player.y)<15){

player.hp-=5
b.y=900

}

}

enemies=enemies.filter(e=>e.hp>0)

bullets=bullets.filter(b=>b.y>-20)

enemyBullets=enemyBullets.filter(b=>b.y<820)

for(let ex of explosions){

ex.x+=ex.vx
ex.y+=ex.vy
ex.life--

}

explosions=explosions.filter(e=>e.life>0)

if(enemies.length==0 && !boss){

phase++

if(phase==maxPhase){

spawnBoss()

}else{

spawnEnemies()

}

}

if(boss && boss.hp<=0){

boss=null

}

hpFill.style.width=player.hp+"%"

phaseFill.style.width=(phase/maxPhase*100)+"%"

if(boss){

bossFill.style.width=(boss.hp/boss.max*100)+"%"

}else{

bossFill.style.width="0%"

}

}

function pixel(x,y,s){

ctx.fillRect(
Math.floor(x/s)*s,
Math.floor(y/s)*s,
s,s
)

}

function draw(){

ctx.fillStyle="black"
ctx.fillRect(0,0,600,800)

ctx.fillStyle="white"
for(let s of stars) pixel(s.x,s.y,2)

ctx.fillStyle="#0ff"
pixel(player.x,player.y,6)

ctx.fillStyle="#ff0"
for(let b of bullets) pixel(b.x,b.y,4)

ctx.fillStyle="#f44"
for(let b of enemyBullets) pixel(b.x,b.y,4)

ctx.fillStyle="#0f0"
for(let e of enemies) pixel(e.x,e.y,12)

ctx.fillStyle="#f0f"
if(boss) pixel(boss.x,boss.y,24)

ctx.fillStyle="orange"
for(let ex of explosions) pixel(ex.x,ex.y,4)

if(player.hp<=0){

ctx.fillStyle="white"
ctx.font="40px monospace"
ctx.fillText("GAME OVER",160,400)

}

if(!boss && phase>maxPhase){

ctx.fillStyle="white"
ctx.font="40px monospace"
ctx.fillText("GAME CLEAR!",150,400)

}

}

function loop(){

update()
draw()

requestAnimationFrame(loop)

}

loop()

</script>

</body>
</html>
