```html
<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>GALAXY INVADER</title>

<style>

body{
margin:0;
background:black;
color:white;
font-family:Orbitron, sans-serif;
text-align:center;
overflow:hidden;
}

canvas{
background:linear-gradient(#020111,#000);
display:block;
margin:auto;
border:2px solid cyan;
}

#titleScreen{
position:absolute;
top:0;
left:0;
width:100%;
height:100%;
background:black;
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
}

#title{
font-size:60px;
color:cyan;
animation:glow 2s infinite alternate;
}

@keyframes glow{
from{ text-shadow:0 0 10px cyan;}
to{ text-shadow:0 0 30px cyan;}
}

button{
padding:15px 40px;
font-size:20px;
margin-top:30px;
cursor:pointer;
background:black;
color:cyan;
border:2px solid cyan;
}

#ui{
width:1000px;
margin:auto;
}

.bar{
height:18px;
background:#333;
margin:6px;
}

.fill{
height:100%;
background:lime;
}

.bossFill{
background:red;
}

.phaseFill{
background:cyan;
}

</style>
</head>

<body>

<div id="titleScreen">
<div id="title">GALAXY INVADER</div>
<button onclick="startGame()">START</button>
</div>

<div id="ui">

HP
<div class="bar"><div id="hp" class="fill"></div></div>

SHIELD
<div class="bar"><div id="shield" class="fill"></div></div>

PHASE
<div class="bar"><div id="phase" class="fill phaseFill"></div></div>

BOSS
<div class="bar"><div id="boss" class="fill bossFill"></div></div>

</div>

<canvas id="game" width="1000" height="650"></canvas>

<script>

const canvas=document.getElementById("game")
const ctx=canvas.getContext("2d")

let player={
x:500,
y:600,
hp:100,
speed:7
}

let shield=0
let shieldMax=50

let bullets=[]
let enemyBullets=[]
let enemies=[]
let items=[]
let explosions=[]

let boss=null
let phase=1
let phaseProgress=0

let keys={}
let game=false

document.addEventListener("keydown",e=>keys[e.key]=true)
document.addEventListener("keyup",e=>keys[e.key]=false)

function startGame(){
document.getElementById("titleScreen").style.display="none"
game=true
startPhase()
loop()
}

function startPhase(){

shield=shieldMax

if(phase<5){

let count=6+phase*3

for(let i=0;i<count;i++){

enemies.push({
x:100+i*100,
y:80+Math.random()*100,
hp:20,
dir:Math.random()<0.5?-1:1
})

}

}else{

spawnBoss()

}

}

function spawnBoss(){

boss={
x:500,
y:100,
hp:300,
cool:0,
phase:1
}

}

setInterval(()=>{
if(game){
bullets.push({x:player.x,y:player.y})
}
},120)

function enemyShoot(e){

enemyBullets.push({
x:e.x,
y:e.y,
vx:(Math.random()-0.5)*3,
vy:4+phase
})

}

function update(){

if(!game)return

if(keys["ArrowLeft"])player.x-=player.speed
if(keys["ArrowRight"])player.x+=player.speed

player.x=Math.max(20,Math.min(980,player.x))

bullets.forEach(b=>b.y-=10)

enemyBullets.forEach(b=>{
b.x+=b.vx
b.y+=b.vy
})

enemies.forEach(e=>{

e.x+=e.dir*(1+phase*0.4)

if(e.x<20||e.x>980)e.dir*=-1

if(Math.random()<0.01+phase*0.003)
enemyShoot(e)

})

if(boss){

if(boss.hp<150)boss.phase=2

boss.cool--

if(boss.cool<=0){

if(boss.phase==1){

enemyBullets.push({x:boss.x,y:boss.y,vx:-2,vy:4})
enemyBullets.push({x:boss.x,y:boss.y,vx:0,vy:4})
enemyBullets.push({x:boss.x,y:boss.y,vx:2,vy:4})

}else{

for(let i=0;i<6;i++)
enemyBullets.push({
x:boss.x,
y:boss.y,
vx:Math.cos(i)*4,
vy:Math.sin(i)*4+3
})

if(Math.random()<0.4){

enemies.push({
x:boss.x+Math.random()*200-100,
y:boss.y+50,
hp:20,
dir:1
})

}

}

boss.cool=40

}

}

checkCollisions()
updateUI()

}

function checkCollisions(){

bullets.forEach((b,bi)=>{

enemies.forEach((e,ei)=>{

if(Math.abs(b.x-e.x)<20 && Math.abs(b.y-e.y)<20){

e.hp-=10
bullets.splice(bi,1)

if(e.hp<=0){

spawnExplosion(e.x,e.y)

if(Math.random()<0.25)
items.push({x:e.x,y:e.y})

enemies.splice(ei,1)
phaseProgress+=5

}

}

})

if(boss){

if(Math.abs(b.x-boss.x)<70 && Math.abs(b.y-boss.y)<70){

boss.hp-=10
bullets.splice(bi,1)
spawnExplosion(b.x,b.y)

if(boss.hp<=0){

alert("GAME CLEAR")
location.reload()

}

}

}

})

enemyBullets.forEach((b,bi)=>{

if(Math.abs(b.x-player.x)<20 && Math.abs(b.y-player.y)<20){

enemyBullets.splice(bi,1)

if(shield>0){
shield-=5
}else{
player.hp-=5
}

spawnExplosion(player.x,player.y)

if(player.hp<=0){

alert("GAME OVER")
location.reload()

}

}

})

items.forEach((it,ii)=>{

it.y+=2

if(Math.abs(it.x-player.x)<20 && Math.abs(it.y-player.y)<20){

player.hp=Math.min(100,player.hp+20)
items.splice(ii,1)

}

})

if(enemies.length==0 && !boss){

phase++
phaseProgress=0
startPhase()

}

}

function spawnExplosion(x,y){
explosions.push({x,y,frame:0})
}

function updateUI(){

document.getElementById("hp").style.width=player.hp+"%"
document.getElementById("shield").style.width=(shield/shieldMax*100)+"%"
document.getElementById("phase").style.width=Math.min(100,phaseProgress)+"%"

if(boss)
document.getElementById("boss").style.width=(boss.hp/300*100)+"%"

}

function draw(){

ctx.clearRect(0,0,1000,650)

drawPlayer()
drawEnemies()
drawBoss()
drawBullets()
drawExplosions()
drawItems()

}

function drawPlayer(){

ctx.fillStyle="cyan"
ctx.fillRect(player.x-15,player.y-10,30,20)
ctx.fillRect(player.x-5,player.y-20,10,10)

}

function drawEnemies(){

ctx.fillStyle="lime"

enemies.forEach(e=>{

ctx.fillRect(e.x-15,e.y-10,30,20)
ctx.fillRect(e.x-20,e.y,40,5)

})

}

function drawBoss(){

if(!boss)return

ctx.fillStyle="red"

ctx.fillRect(boss.x-70,boss.y-40,140,80)
ctx.fillRect(boss.x-40,boss.y-80,80,40)

}

function drawBullets(){

ctx.fillStyle="yellow"

bullets.forEach(b=>ctx.fillRect(b.x-2,b.y-10,4,10))

ctx.fillStyle="orange"

enemyBullets.forEach(b=>ctx.fillRect(b.x-3,b.y-6,6,12))

}

function drawExplosions(){

explosions.forEach((ex,i)=>{

ctx.fillStyle="orange"

ctx.beginPath()
ctx.arc(ex.x,ex.y,ex.frame*4,0,Math.PI*2)
ctx.fill()

ex.frame++

if(ex.frame>12)
explosions.splice(i,1)

})

}

function drawItems(){

ctx.fillStyle="pink"

items.forEach(it=>{
ctx.beginPath()
ctx.arc(it.x,it.y,8,0,Math.PI*2)
ctx.fill()
})

}

function loop(){

update()
draw()

requestAnimationFrame(loop)

}

</script>

</body>
</html>
