<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>Galaxy Defender</title>

<style>
body{
background:#05070f;
color:white;
text-align:center;
font-family:monospace;
}

canvas{
background:#000;
border:3px solid #0ff;
box-shadow:0 0 20px #0ff;
}

#ui{
width:800px;
margin:auto;
}

.bar{
height:16px;
background:#222;
margin:4px;
}

.fill{
height:100%;
background:#0f0;
}
</style>
</head>

<body>

<h1>🚀 Galaxy Defender</h1>
<p>← → 移動　スペース 攻撃</p>

<div id="ui">
HP
<div class="bar"><div id="hp" class="fill"></div></div>

Phase Progress
<div class="bar"><div id="phase" class="fill"></div></div>
</div>

<canvas id="game" width="800" height="600"></canvas>

<script>

const canvas=document.getElementById("game")
const ctx=canvas.getContext("2d")

let keys={}
document.addEventListener("keydown",e=>keys[e.key]=true)
document.addEventListener("keyup",e=>keys[e.key]=false)

let player={
x:380,
y:540,
w:40,
h:40,
hp:100,
cool:0
}

let bullets=[]
let enemyBullets=[]
let enemies=[]
let explosions=[]
let items=[]

let phase=1
let kills=0
let phaseTarget=15

function spawnEnemy(){

let type=1
if(phase>=2) type=Math.random()<0.5?1:2
if(phase>=3) type=Math.random()<0.33?3:type

let e={
x:Math.random()*760,
y:40,
type:type,
vx:(Math.random()-0.5)*2,
hp:1,
cool:Math.random()*120
}

enemies.push(e)
}

for(let i=0;i<6;i++) spawnEnemy()

function shoot(){

if(player.cool>0)return

bullets.push({
x:player.x+18,
y:player.y,
vy:-8
})

player.cool=10
}

function update(){

if(keys["ArrowLeft"]) player.x-=5
if(keys["ArrowRight"]) player.x+=5

player.x=Math.max(0,Math.min(760,player.x))

if(keys[" "]) shoot()

player.cool--

bullets.forEach(b=>b.y+=b.vy)

bullets=bullets.filter(b=>b.y>-20)

enemyBullets.forEach(b=>b.y+=b.vy)

enemies.forEach(e=>{

e.x+=e.vx

if(e.x<0||e.x>760) e.vx*=-1

e.cool--

if(e.cool<=0){

enemyBullets.push({
x:e.x+15,
y:e.y+20,
vy:4+phase
})

e.cool=120-Math.min(80,phase*10)
}

})

bullets.forEach((b,bi)=>{

enemies.forEach((e,ei)=>{

if(
b.x<e.x+30 &&
b.x+4>e.x &&
b.y<e.y+20 &&
b.y+10>e.y
){

enemies.splice(ei,1)
bullets.splice(bi,1)

explosions.push({
x:e.x,
y:e.y,
t:0
})

kills++

if(Math.random()<0.2){

items.push({
x:e.x,
y:e.y,
vy:2
})

}

spawnEnemy()

}

})

})

enemyBullets.forEach((b,bi)=>{

if(
b.x<player.x+player.w &&
b.x+4>player.x &&
b.y<player.y+player.h &&
b.y+10>player.y
){

enemyBullets.splice(bi,1)
player.hp-=5

}

})

items.forEach((i,ii)=>{

i.y+=i.vy

if(
i.x<player.x+player.w &&
i.x+20>player.x &&
i.y<player.y+player.h &&
i.y+20>player.y
){

items.splice(ii,1)
player.hp=Math.min(100,player.hp+20)

}

})

explosions.forEach(e=>e.t++)
explosions=explosions.filter(e=>e.t<20)

if(kills>=phaseTarget){

phase++
kills=0
phaseTarget+=10

for(let i=0;i<4+phase;i++) spawnEnemy()

}

if(player.hp<=0){

alert("GAME OVER")
location.reload()

}

}

function drawPlayer(){

ctx.fillStyle="#0ff"

ctx.fillRect(player.x+10,player.y,20,20)
ctx.fillRect(player.x,player.y+20,40,10)
ctx.fillRect(player.x+15,player.y+30,10,10)

}

function drawEnemy(e){

if(e.type==1) ctx.fillStyle="#f33"
if(e.type==2) ctx.fillStyle="#ff0"
if(e.type==3) ctx.fillStyle="#f0f"

ctx.fillRect(e.x,e.y,30,20)
ctx.fillRect(e.x+10,e.y+20,10,5)

}

function drawExplosion(e){

let r=e.t*2

ctx.fillStyle="orange"
ctx.beginPath()
ctx.arc(e.x+15,e.y+10,r,0,Math.PI*2)
ctx.fill()

}

function draw(){

ctx.clearRect(0,0,800,600)

drawPlayer()

ctx.fillStyle="#0ff"

bullets.forEach(b=>{
ctx.fillRect(b.x,b.y,4,10)
})

ctx.fillStyle="#f00"

enemyBullets.forEach(b=>{
ctx.fillRect(b.x,b.y,4,10)
})

enemies.forEach(drawEnemy)

items.forEach(i=>{

ctx.fillStyle="#0f0"
ctx.fillRect(i.x,i.y,20,20)

})

explosions.forEach(drawExplosion)

document.getElementById("hp").style.width=player.hp+"%"
document.getElementById("phase").style.width=(kills/phaseTarget*100)+"%"

}

function loop(){

update()
draw()

requestAnimationFrame(loop)

}

loop()

</script>
</body>
</html>
