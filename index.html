<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>8bit Danmaku Shooter</title>
<style>
body{
background:black;
color:white;
text-align:center;
font-family:monospace;
}
canvas{
background:black;
border:2px solid white;
}
</style>
</head>

<body>

<h2>8bit Danmaku Shooter</h2>
<canvas id="game" width="480" height="640"></canvas>
<p>矢印キー：移動 / SPACE：射撃（長押しで溜め）</p>

<script>

const canvas = document.getElementById("game");
const ctx = canvas.getContext("2d");

let gameState="start";

let keys={};

document.addEventListener("keydown",e=>keys[e.key]=true);
document.addEventListener("keyup",e=>keys[e.key]=false);

let player={
x:240,
y:560,
size:32,
hp:100,
maxHp:100
};

let bullets=[];
let enemies=[];
let enemyBullets=[];

let shotCooldown=0;
let charge=0;

let phase=1;
let phaseProgress=0;
let phaseMax=20;

function spawnEnemy(){

let e={
x:Math.random()*420+30,
y:Math.random()*200+20,
size:40,
hp:2,
dir:Math.random()<0.5?-1:1,
cool:Math.random()*120
};

enemies.push(e);
}

function drawPlayer(){

ctx.fillStyle="cyan";

/* 8bit fighter */

ctx.fillRect(player.x,player.y,8,32);
ctx.fillRect(player.x+8,player.y+8,16,16);
ctx.fillRect(player.x+24,player.y,8,32);
ctx.fillRect(player.x-8,player.y+16,48,8);

}

function drawEnemy(e){

ctx.fillStyle="red";

/* 8bit enemy */

ctx.fillRect(e.x,e.y,40,8);
ctx.fillRect(e.x+8,e.y+8,24,8);
ctx.fillRect(e.x,e.y+16,40,8);
ctx.fillRect(e.x+8,e.y+24,8,8);
ctx.fillRect(e.x+24,e.y+24,8,8);

}

function drawBullets(){

ctx.fillStyle="yellow";
for(let b of bullets){

ctx.beginPath();
ctx.arc(b.x,b.y,b.size,0,Math.PI*2);
ctx.fill();

}

ctx.fillStyle="orange";
for(let b of enemyBullets){

ctx.beginPath();
ctx.arc(b.x,b.y,4,0,Math.PI*2);
ctx.fill();

}

}

function update(){

if(gameState!="play")return;

if(keys["ArrowLeft"])player.x-=4;
if(keys["ArrowRight"])player.x+=4;
if(keys["ArrowUp"])player.y-=4;
if(keys["ArrowDown"])player.y+=4;

player.x=Math.max(0,Math.min(canvas.width-player.size,player.x));
player.y=Math.max(0,Math.min(canvas.height-player.size,player.y));

if(keys[" "]){
charge++;
}else{

if(charge>20){

bullets.push({
x:player.x+16,
y:player.y,
vy:-8,
size:10,
power:3
});

}else if(charge>0 && shotCooldown<=0){

bullets.push({
x:player.x+16,
y:player.y,
vy:-8,
size:5,
power:1
});

shotCooldown=25;
}

charge=0;

}

if(shotCooldown>0)shotCooldown--;

for(let b of bullets){
b.y+=b.vy;
}

bullets=bullets.filter(b=>b.y>-20);

for(let e of enemies){

e.x+=e.dir*1.2;

if(e.x<0||e.x>440)e.dir*=-1;

e.cool--;

if(e.cool<0){

enemyBullets.push({
x:e.x+20,
y:e.y+30,
vy:3
});

e.cool=90-Math.min(phase*5,60);

}

}

for(let b of enemyBullets){
b.y+=b.vy;
}

enemyBullets=enemyBullets.filter(b=>b.y<640);

for(let b of bullets){
for(let e of enemies){

if(Math.abs(b.x-(e.x+20))<20 &&
Math.abs(b.y-(e.y+20))<20){

e.hp-=b.power;
b.y=-100;

if(e.hp<=0){

phaseProgress++;

enemies.splice(enemies.indexOf(e),1);

}

}

}
}

for(let b of enemyBullets){

if(Math.abs(b.x-(player.x+16))<16 &&
Math.abs(b.y-(player.y+16))<16){

player.hp-=5;
b.y=700;

}

}

if(player.hp<=0){

gameState="gameover";

}

if(enemies.length<phase+2){
spawnEnemy();
}

if(phaseProgress>=phaseMax){

phase++;
phaseProgress=0;
phaseMax+=10;

}

}

function drawUI(){

ctx.fillStyle="white";

ctx.fillText("PHASE "+phase,10,20);

/* player HP */

ctx.strokeRect(10,30,200,10);

ctx.fillStyle="lime";
ctx.fillRect(10,30,200*(player.hp/player.maxHp),10);

/* phase bar */

ctx.strokeStyle="white";
ctx.strokeRect(260,10,200,10);

ctx.fillStyle="orange";
ctx.fillRect(260,10,200*(phaseProgress/phaseMax),10);

}

function draw(){

ctx.clearRect(0,0,480,640);

if(gameState=="start"){

ctx.font="30px monospace";
ctx.fillText("8BIT SHOOTER",120,260);

ctx.font="16px monospace";
ctx.fillText("PRESS SPACE",170,320);

if(keys[" "]){

gameState="play";

}

return;
}

if(gameState=="gameover"){

ctx.font="30px monospace";
ctx.fillText("GAME OVER",150,300);

ctx.font="16px monospace";
ctx.fillText("RELOAD TO RETRY",150,340);

return;

}

drawPlayer();

for(let e of enemies){
drawEnemy(e);
}

drawBullets();

drawUI();

}

function loop(){

update();
draw();

requestAnimationFrame(loop);

}

loop();

</script>

</body>
</html>
