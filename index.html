<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Cosmic Danmaku Invader</title>
  <style>
    :root { color-scheme: dark; }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      font-family: "Courier New", monospace;
      color: #e8f7ff;
      background:
        radial-gradient(circle at 20% 10%, #2d205f 0%, transparent 20%),
        radial-gradient(circle at 80% 20%, #123d5c 0%, transparent 25%),
        radial-gradient(circle at 50% 130%, #01040b 30%, #000 80%);
    }
    .wrap {
      width: min(94vw, 540px);
      padding: 12px;
      border: 2px solid #6ae4ff;
      border-radius: 10px;
      background: linear-gradient(160deg, rgba(11, 19, 34, 0.96), rgba(2, 7, 18, 0.9));
      box-shadow: 0 0 35px rgba(106, 228, 255, 0.25), inset 0 0 30px rgba(86, 202, 255, 0.08);
    }
    .title {
      margin: 0;
      font-size: 24px;
      text-align: center;
      letter-spacing: 2px;
      text-shadow: 0 0 6px #58d4ff, 0 0 16px #58d4ff;
    }
    .sub {
      margin: 6px 0 12px;
      text-align: center;
      font-size: 12px;
      opacity: 0.88;
    }
    canvas {
      width: 100%;
      max-width: 512px;
      aspect-ratio: 4 / 5;
      display: block;
      margin: 0 auto;
      border: 2px solid #84ecff;
      border-radius: 8px;
      background: #020613;
      image-rendering: pixelated;
      image-rendering: crisp-edges;
      box-shadow: inset 0 0 22px rgba(120, 200, 255, 0.14);
    }
  </style>
</head>
<body>
  <div class="wrap">
    <h1 class="title">COSMIC DANMAKU INVADER</h1>
    <p class="sub">← → 移動 / SPACE 攻撃 / SPACE/ENTER で開始・再挑戦</p>
    <canvas id="game" width="480" height="600"></canvas>
  </div>

  <script>
    const canvas = document.getElementById("game");
    const ctx = canvas.getContext("2d");
    if (!ctx) {
      throw new Error("Canvas 2D context is not supported in this browser.");
    }
    const W = canvas.width;
    const H = canvas.height;

    const keys = {};
    document.addEventListener("keydown", (e) => {
      keys[e.key] = true;
      if (["ArrowLeft", "ArrowRight", " ", "Enter"].includes(e.key)) e.preventDefault();
    });
    document.addEventListener("keyup", (e) => (keys[e.key] = false));

    const stars = Array.from({ length: 160 }, () => ({
      x: Math.random() * W,
      y: Math.random() * H,
      z: Math.random() * 1.8 + 0.3,
    }));

    const PHASE_TARGET_BASE = 18;
    const PHASE_TARGET_GAIN = 6;

    const state = {
      mode: "start",
      player: null,
      enemies: [],
      bullets: [],
      enemyBullets: [],
      boss: null,
      phase: 1,
      phaseProgress: 0,
      phaseTarget: PHASE_TARGET_BASE,
      score: 0,
      frame: 0,
      spawnTick: 0,
      fireTick: 0,
      flash: 0,
      clearedBossPhase: false,
    };

    function resetGame() {
      state.mode = "play";
      state.player = {
        x: W / 2 - 18,
        y: H - 70,
        w: 36,
        h: 32,
        hp: 100,
        maxHp: 100,
        speed: 5,
        fireCooldown: 0,
        invul: 0,
      };
      state.enemies = [];
      state.bullets = [];
      state.enemyBullets = [];
      state.boss = null;
      state.phase = 1;
      state.phaseProgress = 0;
      state.phaseTarget = PHASE_TARGET_BASE;
      state.score = 0;
      state.frame = 0;
      state.spawnTick = 0;
      state.fireTick = 0;
      state.flash = 0;
      state.clearedBossPhase = false;
    }

    function rectHit(a, b) {
      return a.x < b.x + b.w && a.x + a.w > b.x && a.y < b.y + b.h && a.y + a.h > b.y;
    }

    function circleRectHit(c, r) {
      const cx = Math.max(r.x, Math.min(c.x, r.x + r.w));
      const cy = Math.max(r.y, Math.min(c.y, r.y + r.h));
      const dx = c.x - cx;
      const dy = c.y - cy;
      return dx * dx + dy * dy < c.r * c.r;
    }

    function spawnEnemy() {
      const p = state.phase;
      const speed = Math.min(2 + p * 0.15, 5.2);
      const fireRate = Math.max(52 - p * 2, 17);
      const hp = 2 + Math.floor(p / 2);
      state.enemies.push({
        x: 20 + Math.random() * (W - 56),
        y: -40,
        w: 32,
        h: 28,
        hp,
        maxHp: hp,
        vx: (Math.random() * 0.8 + 0.6) * (Math.random() < 0.5 ? -1 : 1),
        vy: speed,
        fireRate,
        fireTick: Math.floor(Math.random() * fireRate),
      });
    }

    function spawnBoss() {
      const p = state.phase;
      const maxHp = 420 + p * 90;
      state.boss = {
        x: W / 2 - 74,
        y: 48,
        w: 148,
        h: 92,
        hp: maxHp,
        maxHp,
        t: 0,
        patternTick: 0,
        phase: p,
      };
    }

    function nextPhase() {
      state.phase += 1;
      state.phaseProgress = 0;
      state.phaseTarget = PHASE_TARGET_BASE + (state.phase - 1) * PHASE_TARGET_GAIN;
      state.clearedBossPhase = false;
      state.enemyBullets = state.enemyBullets.filter((b) => b.fromBoss);
      if (state.phase % 5 === 0) spawnBoss();
    }

    function shootPlayer() {
      const p = state.player;
      const rapid = Math.max(8, 14 - Math.floor(state.phase / 2));
      if (p.fireCooldown > 0) {
        p.fireCooldown -= 1;
        return;
      }
      state.bullets.push({ x: p.x + p.w / 2 - 2, y: p.y - 10, w: 4, h: 12, vy: -8.5, power: 1 });
      if (state.phase >= 4) {
        state.bullets.push({ x: p.x + 7, y: p.y - 3, w: 3, h: 9, vy: -7.8, vx: -1.15, power: 1 });
        state.bullets.push({ x: p.x + p.w - 10, y: p.y - 3, w: 3, h: 9, vy: -7.8, vx: 1.15, power: 1 });
      }
      p.fireCooldown = rapid;
    }

    function emitEnemyBullet(x, y, angle, speed, fromBoss = false, r = 4) {
      state.enemyBullets.push({
        x,
        y,
        vx: Math.cos(angle) * speed,
        vy: Math.sin(angle) * speed,
        r,
        fromBoss,
      });
    }

    function update() {
      if (state.mode !== "play") return;
      const p = state.player;
      state.frame += 1;

      if (keys.ArrowLeft) p.x -= p.speed;
      if (keys.ArrowRight) p.x += p.speed;
      p.x = Math.max(0, Math.min(W - p.w, p.x));

      if (keys[" "]) shootPlayer();
      if (p.invul > 0) p.invul -= 1;

      state.spawnTick += 1;
      if (!state.boss) {
        const spawnInterval = Math.max(48 - state.phase * 2, 12);
        const liveCap = Math.min(6 + Math.floor(state.phase * 0.8), 20);
        if (state.spawnTick >= spawnInterval && state.enemies.length < liveCap) {
          spawnEnemy();
          state.spawnTick = 0;
        }
      }

      for (const b of state.bullets) {
        b.x += b.vx || 0;
        b.y += b.vy;
      }
      state.bullets = state.bullets.filter((b) => b.y > -20 && b.x > -20 && b.x < W + 20);

      for (const e of state.enemies) {
        e.x += e.vx;
        e.y += e.vy;
        if (e.x < 0 || e.x + e.w > W) e.vx *= -1;

        e.fireTick -= 1;
        if (e.fireTick <= 0) {
          const px = p.x + p.w / 2;
          const py = p.y + p.h / 2;
          const ex = e.x + e.w / 2;
          const ey = e.y + e.h / 2;
          const base = Math.atan2(py - ey, px - ex);
          emitEnemyBullet(ex, ey, base, 2.3 + state.phase * 0.08, false, 3);
          if (state.phase >= 7) {
            emitEnemyBullet(ex, ey, base + 0.16, 2.1 + state.phase * 0.08, false, 3);
            emitEnemyBullet(ex, ey, base - 0.16, 2.1 + state.phase * 0.08, false, 3);
          }
          e.fireTick = e.fireRate;
        }
      }
      state.enemies = state.enemies.filter((e) => e.y < H + 50 && e.hp > 0);

      if (state.boss) {
        const b = state.boss;
        b.t += 1;
        b.patternTick += 1;
        b.x = W / 2 - b.w / 2 + Math.sin(b.t * 0.023) * 130;

        const centerX = b.x + b.w / 2;
        const centerY = b.y + b.h / 2;
        const rank = Math.floor(state.phase / 5);

        if (b.patternTick % Math.max(26 - rank * 2, 9) === 0) {
          const n = 18 + rank * 4;
          const spin = b.t * 0.03;
          for (let i = 0; i < n; i += 1) {
            const a = spin + (Math.PI * 2 * i) / n;
            emitEnemyBullet(centerX, centerY, a, 1.6 + rank * 0.45, true, 4);
          }
        }

        if (b.patternTick % Math.max(40 - rank * 2, 14) === 0) {
          const target = Math.atan2((p.y + p.h / 2) - centerY, (p.x + p.w / 2) - centerX);
          const fan = 7 + rank;
          for (let i = -fan; i <= fan; i += 1) {
            emitEnemyBullet(centerX, centerY, target + i * 0.09, 2.5 + rank * 0.38, true, 4);
          }
        }

        if (b.patternTick % Math.max(62 - rank * 3, 18) === 0) {
          for (let i = 0; i < 14; i += 1) {
            const x = 14 + (W - 28) * (i / 13);
            emitEnemyBullet(x, 0, Math.PI / 2, 2.3 + rank * 0.45, true, 5);
          }
        }
      }

      for (const eb of state.enemyBullets) {
        eb.x += eb.vx;
        eb.y += eb.vy;
      }
      state.enemyBullets = state.enemyBullets.filter((b) => b.y > -40 && b.y < H + 40 && b.x > -40 && b.x < W + 40);

      for (const bullet of state.bullets) {
        for (const enemy of state.enemies) {
          if (rectHit(bullet, enemy)) {
            enemy.hp -= bullet.power;
            bullet.y = -100;
            if (enemy.hp <= 0) {
              state.phaseProgress += 1;
              state.score += 80 + state.phase * 8;
            }
          }
        }
        if (state.boss && rectHit(bullet, state.boss)) {
          state.boss.hp -= bullet.power;
          bullet.y = -100;
          if (state.boss.hp <= 0 && !state.clearedBossPhase) {
            state.score += 2500 + state.phase * 120;
            state.clearedBossPhase = true;
            state.boss = null;
            nextPhase();
          }
        }
      }

      if (p.invul <= 0) {
        for (const eb of state.enemyBullets) {
          if (circleRectHit(eb, p)) {
            p.hp -= eb.fromBoss ? 8 : 5;
            p.invul = 50;
            state.flash = 12;
            eb.y = H + 100;
            if (p.hp <= 0) {
              state.mode = "gameover";
              break;
            }
          }
        }
      }

      if (!state.boss && state.phaseProgress >= state.phaseTarget) {
        nextPhase();
      }

      if (state.flash > 0) state.flash -= 1;
    }

    function drawStars() {
      for (const s of stars) {
        s.y += s.z;
        if (s.y > H) {
          s.y = -2;
          s.x = Math.random() * W;
          s.z = Math.random() * 1.8 + 0.3;
        }
        ctx.fillStyle = s.z > 1.5 ? "#dff7ff" : s.z > 0.9 ? "#b7d8ff" : "#8ea2bf";
        ctx.fillRect(s.x, s.y, s.z, s.z);
      }
    }

    function drawPlayer(p) {
      const blink = p.invul > 0 && Math.floor(p.invul / 4) % 2 === 0;
      if (blink) return;
      ctx.fillStyle = "#6af7ff";
      ctx.fillRect(p.x + 16, p.y + 2, 4, 10);
      ctx.fillRect(p.x + 14, p.y + 12, 8, 6);
      ctx.fillRect(p.x + 2, p.y + 18, 32, 6);
      ctx.fillRect(p.x + 6, p.y + 24, 8, 6);
      ctx.fillRect(p.x + 22, p.y + 24, 8, 6);
      ctx.fillStyle = "#ffffff";
      ctx.fillRect(p.x + 17, p.y + 9, 2, 2);
    }

    function drawEnemy(e) {
      ctx.fillStyle = "#ff5c8e";
      ctx.fillRect(e.x + 4, e.y, 24, 4);
      ctx.fillRect(e.x, e.y + 4, 32, 6);
      ctx.fillRect(e.x + 4, e.y + 10, 24, 4);
      ctx.fillRect(e.x + 8, e.y + 14, 6, 6);
      ctx.fillRect(e.x + 18, e.y + 14, 6, 6);
      ctx.fillStyle = "#ffd4e2";
      ctx.fillRect(e.x + 11, e.y + 7, 3, 2);
      ctx.fillRect(e.x + 18, e.y + 7, 3, 2);
    }

    function drawBoss(b) {
      ctx.fillStyle = "#862dff";
      ctx.fillRect(b.x + 26, b.y, 96, 14);
      ctx.fillRect(b.x + 10, b.y + 14, 128, 20);
      ctx.fillRect(b.x, b.y + 34, 148, 32);
      ctx.fillRect(b.x + 18, b.y + 66, 112, 20);
      ctx.fillStyle = "#f2d8ff";
      ctx.fillRect(b.x + 48, b.y + 26, 8, 6);
      ctx.fillRect(b.x + 92, b.y + 26, 8, 6);
      ctx.fillStyle = "#ff4dd8";
      ctx.fillRect(b.x + 70, b.y + 44, 8, 14);
    }

    function drawBullets() {
      ctx.fillStyle = "#fff47a";
      for (const b of state.bullets) {
        ctx.fillRect(b.x, b.y, b.w, b.h);
      }

      for (const eb of state.enemyBullets) {
        ctx.beginPath();
        ctx.fillStyle = eb.fromBoss ? "#ff5fe2" : "#ff9b65";
        ctx.arc(eb.x, eb.y, eb.r, 0, Math.PI * 2);
        ctx.fill();
      }
    }

    function drawBar(x, y, w, h, rate, color, label) {
      ctx.fillStyle = "rgba(0,0,0,0.45)";
      ctx.fillRect(x, y, w, h);
      ctx.strokeStyle = "#c9f4ff";
      ctx.lineWidth = 1;
      ctx.strokeRect(x, y, w, h);
      ctx.fillStyle = color;
      ctx.fillRect(x + 1, y + 1, (w - 2) * Math.max(0, Math.min(1, rate)), h - 2);
      ctx.fillStyle = "#e8f7ff";
      ctx.font = "11px monospace";
      ctx.fillText(label, x + 4, y + h - 4);
    }

    function drawUI() {
      ctx.fillStyle = "rgba(9,17,31,0.78)";
      ctx.fillRect(8, 8, W - 16, 72);
      ctx.strokeStyle = "rgba(139,230,255,0.8)";
      ctx.strokeRect(8, 8, W - 16, 72);

      const p = state.player;
      drawBar(16, 18, 180, 14, p.hp / p.maxHp, "#53f5a5", `HP ${Math.max(0, p.hp)} / ${p.maxHp}`);
      drawBar(16, 40, 180, 14, state.phaseProgress / state.phaseTarget, "#63c8ff", `PHASE PROGRESS ${state.phaseProgress}/${state.phaseTarget}`);

      ctx.fillStyle = "#ffffff";
      ctx.font = "14px monospace";
      ctx.fillText(`PHASE ${state.phase}`, 220, 30);
      ctx.fillText(`SCORE ${state.score}`, 220, 50);
      ctx.fillStyle = "#ff9dc6";
      ctx.fillText(`BULLET ${state.enemyBullets.length}`, 220, 68);

      if (state.boss) {
        drawBar(16, 84, W - 32, 14, state.boss.hp / state.boss.maxHp, "#ff4bd0", `BOSS HP ${Math.max(0, state.boss.hp)} / ${state.boss.maxHp}`);
      }
    }

    function drawOverlay(title, subtitle, tip) {
      ctx.fillStyle = "rgba(0,0,0,0.55)";
      ctx.fillRect(0, 0, W, H);
      ctx.fillStyle = "#d7f8ff";
      ctx.textAlign = "center";
      ctx.font = "bold 36px monospace";
      ctx.fillText(title, W / 2, H / 2 - 40);
      ctx.font = "16px monospace";
      ctx.fillText(subtitle, W / 2, H / 2);
      ctx.font = "12px monospace";
      ctx.fillStyle = "#9dd9ff";
      ctx.fillText(tip, W / 2, H / 2 + 28);
      ctx.textAlign = "left";
    }

    function draw() {
      ctx.clearRect(0, 0, W, H);
      drawStars();

      if (state.mode === "start") {
        drawOverlay("PRESS SPACE / ENTER", "鬼畜弾幕インベーダーへようこそ", "← → で移動、SPACEで連射");
        return;
      }

      drawBullets();
      for (const e of state.enemies) drawEnemy(e);
      if (state.boss) drawBoss(state.boss);
      drawPlayer(state.player);
      drawUI();

      if (state.flash > 0) {
        ctx.fillStyle = `rgba(255,80,80,${state.flash / 22})`;
        ctx.fillRect(0, 0, W, H);
      }

      if (state.mode === "gameover") {
        drawOverlay("GAME OVER", `到達フェーズ ${state.phase} / SCORE ${state.score}`, "SPACEかENTERで再挑戦");
      }
    }

    function shouldConfirmAction() {
      return !!(keys.Enter || keys[" "]);
    }

    function gameLoop() {
      if (state.mode === "start" && shouldConfirmAction()) resetGame();
      if (state.mode === "gameover" && shouldConfirmAction()) resetGame();
      update();
      draw();
      requestAnimationFrame(gameLoop);
    }

    gameLoop();
  </script>
</body>
</html>
