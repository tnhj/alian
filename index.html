<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>弾幕ボスバトル</title>

<style>
body{
margin:0;
background:black;
overflow:hidden;
font-family:sans-serif;
color:white;
text-align:center;
}

canvas{
display:block;
margin:auto;
background:black;
}

#ui{
position:absolute;
top:0;
left:0;
width:100%;
pointer-events:none;
}

#bossHP{
height:20px;
background:red;
width:100%;
transition:width .2s;
}

.screen{
position:absolute;
top:0;
left:0;
width:100%;
height:100%;
background:black;
display:flex;
justify-content:center;
align-items:center;
flex-direction:column;
}

button{
padding:10px 20px;
font-size:20px;
margin-top:20px;
}

.hidden{
display:none;
}

#pauseText{
position:absolute;
top:40%;
width:100%;
font-size:40px;
}
</style>
</head>

<body>

<div id="startScreen" class="screen">
<h1>弾幕ボスバトル</h1>
<button onclick="startGame()">START</button>
</div>

<div id="gameOverScreen" class="screen hidden">
<h1>GAME OVER</h1>
<button onclick="restart()">RETRY</button>
</div>

<div id="ui">
<div id="bossHP"></div>
</div>

<div id="pauseText" class="hidden">PAUSE</div>

<canvas id="game" width="480" height="640"></canvas>

<script>

const canvas = document.getElementById("game")
const ctx = canvas.getContext("2d")

let player
let bullets=[]
let enemyBullets=[]
let stars=[]
let boss
let keys={}
let gameRunning=false
let paused=false

document.addEventListener("keydown",e=>{
keys[e.key]=true
if(e.key==="p")togglePause()
})

document.addEventListener("keyup",e=>{
keys[e.key]=false
})

function startGame(){

document.getElementById("startScreen").classList.add("hidden")

player={
x:240,
y:550,
speed:4
}

boss={
x:240,
y:-100,
hp:200,
maxHP:200,
phase:0,
timer:0,
entered:false
}

for(let i=0;i<120;i++){
stars.push({
x:Math.random()*480,
y:Math.random()*640,
speed:Math.random()*2+1
})
}

gameRunning=true
loop()
}

function restart(){
location.reload()
}

function togglePause(){

if(!gameRunning)return

paused=!paused
document.getElementById("pauseText").classList.toggle("hidden")
}

function shoot(){
bullets.push({
x:player.x,
y:player.y,
speed:7
})
}

setInterval(()=>{
if(keys[" "] && gameRunning && !paused){
shoot()
}
},120)

function spawnPattern(){

if(boss.phase===0){

for(let i=0;i<8;i++){
let angle=i*Math.PI/4
enemyBullets.push({
x:boss.x,
y:boss.y,
vx:Math.cos(angle)*2,
vy:Math.sin(angle)*2
})
}

}

if(boss.phase===1){

for(let i=0;i<16;i++){
let angle=i*Math.PI/8+boss.timer*.05
enemyBullets.push({
x:boss.x,
y:boss.y,
vx:Math.cos(angle)*3,
vy:Math.sin(angle)*3
})
}

}

if(boss.phase===2){

for(let i=-3;i<=3;i++){
enemyBullets.push({
x:boss.x,
y:boss.y,
vx:i,
vy:3
})
}

}

}

function update(){

if(!gameRunning || paused)return

boss.timer++

if(!boss.entered){

boss.y+=1.5

if(boss.y>120){
boss.entered=true
}

}

if(boss.entered && boss.timer%60===0){

spawnPattern()

if(boss.hp<130)boss.phase=1
if(boss.hp<60)boss.phase=2

}

if(keys["ArrowLeft"]||keys["a"])player.x-=player.speed
if(keys["ArrowRight"]||keys["d"])player.x+=player.speed
if(keys["ArrowUp"]||keys["w"])player.y-=player.speed
if(keys["ArrowDown"]||keys["s"])player.y+=player.speed

stars.forEach(s=>{
s.y+=s.speed
if(s.y>640){
s.y=0
s.x=Math.random()*480
}
})

bullets.forEach(b=>b.y-=b.speed)

enemyBullets.forEach(b=>{
b.x+=b.vx
b.y+=b.vy
})

bullets.forEach((b,i)=>{

if(Math.hypot(b.x-boss.x,b.y-boss.y)<25){
boss.hp--
bullets.splice(i,1)
}

})

enemyBullets.forEach(b=>{
if(Math.hypot(b.x-player.x,b.y-player.y)<10){
gameOver()
}
})

document.getElementById("bossHP").style.width=
(boss.hp/boss.maxHP*100)+"%"

if(boss.hp<=0){
gameOver()
}

}

function draw(){

ctx.clearRect(0,0,480,640)

ctx.fillStyle="white"
stars.forEach(s=>{
ctx.fillRect(s.x,s.y,2,2)
})

ctx.fillStyle="cyan"
ctx.fillRect(player.x-5,player.y-5,10,10)

ctx.fillStyle="yellow"
bullets.forEach(b=>{
ctx.fillRect(b.x-2,b.y-8,4,8)
})

ctx.fillStyle="red"
enemyBullets.forEach(b=>{
ctx.beginPath()
ctx.arc(b.x,b.y,4,0,Math.PI*2)
ctx.fill()
})

ctx.fillStyle="purple"
ctx.beginPath()
ctx.arc(boss.x,boss.y,25,0,Math.PI*2)
ctx.fill()

}

function gameOver(){

gameRunning=false

document
.getElementById("gameOverScreen")
.classList.remove("hidden")

}

function loop(){

update()
draw()

requestAnimationFrame(loop)

}

</script>

</body>
</html>
