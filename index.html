<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>インベーダーゲーム</title>

<style>

body{
background:black;
color:white;
text-align:center;
font-family:sans-serif;
}

canvas{
background:#111;
border:2px solid white;
image-rendering:pixelated;
}

</style>
</head>

<body>

<h2>インベーダーゲーム</h2>

<p>
スコア <span id="score">0</span>
フェーズ <span id="phase">1</span>
ダメージ <span id="damage">0</span>/10
</p>

<p>← → 移動　スペース 攻撃</p>

<canvas id="game" width="600" height="650"></canvas>

<script>

const canvas=document.getElementById("game");
const ctx=canvas.getContext("2d");

let player={x:290,y:600};

let bullets=[];
let enemyBullets=[];
let enemies=[];
let explosions=[];

let boss=null;

let score=0;
let phase=1;
let damage=0;

let gameOver=false;

let lastShot=0;
let shotCooldown=90;

function spawnEnemies(){

enemies=[];

let rows=2+phase;
let cols=6+phase;

for(let y=0;y<rows;y++){
for(let x=0;x<cols;x++){

enemies.push({
x:60+x*60,
y:60+y*50,
vx:(Math.random()-0.5)*2,
vy:(Math.random()-0.5)*0.5
});

}
}

}

function spawnBoss(){

boss={
x:240,
y:80,
w:120,
h:80,
hp:60,
vx:2
};

}

spawnEnemies();

document.addEventListener("keydown",e=>{

if(gameOver)return;

if(e.key==="ArrowLeft") player.x-=35;
if(e.key==="ArrowRight") player.x+=35;

if(e.key===" "){

let now=Date.now();

if(now-lastShot>shotCooldown){

bullets.push({
x:player.x+10,
y:player.y
});

lastShot=now;

}

}

});

function update(){

if(gameOver)return;

bullets.forEach(b=>b.y-=10);

enemyBullets.forEach((b,i)=>{

b.x+=b.vx;
b.y+=b.vy;

if(b.type==="split" && b.y>300){

enemyBullets.push({x:b.x,y:b.y,vx:-3,vy:3,type:"normal"});
enemyBullets.push({x:b.x,y:b.y,vx:3,vy:3,type:"normal"});
enemyBullets.push({x:b.x,y:b.y,vx:0,vy:4,type:"normal"});

enemyBullets.splice(i,1);

}

if(b.type==="bounce"){

if(b.x<0||b.x>600){
b.vx*=-1;
}

if(b.y<0){
b.vy*=-1;
}

}

});

enemies.forEach(e=>{

e.x+=e.vx;
e.y+=e.vy;

if(e.x<0||e.x>580) e.vx*=-1;

if(Math.random()<0.01+phase*0.003){

enemyBullets.push({
x:e.x+10,
y:e.y+15,
vx:0,
vy:4,
type:"normal"
});

}

});

bullets.forEach((b,bi)=>{

enemies.forEach((e,ei)=>{

if(
b.x<e.x+20 &&
b.x+4>e.x &&
b.y<e.y+20 &&
b.y+10>e.y
){

createExplosion(e.x,e.y);

enemies.splice(ei,1);
bullets.splice(bi,1);

score+=100;

document.getElementById("score").textContent=score;

}

});

});

if(boss){

boss.x+=boss.vx;

if(boss.x<0||boss.x+boss.w>600){
boss.vx*=-1;
}

let r=Math.random();

if(r<0.02){

enemyBullets.push({
x:boss.x+boss.w/2,
y:boss.y+boss.h,
vx:0,
vy:4,
type:"split"
});

}
else if(r<0.035){

enemyBullets.push({
x:boss.x+boss.w/2,
y:boss.y+boss.h,
vx:3,
vy:3,
type:"bounce"
});

}
else if(r<0.045){

enemies.push({
x:boss.x+Math.random()*100-50,
y:boss.y+80,
vx:(Math.random()-0.5)*3,
vy:1
});

}

bullets.forEach((b,bi)=>{

if(
b.x<boss.x+boss.w &&
b.x+4>boss.x &&
b.y<boss.y+boss.h &&
b.y+10>boss.y
){

boss.hp--;

bullets.splice(bi,1);

createExplosion(b.x,b.y);

if(boss.hp<=0){

score+=5000;
boss=null;

}

}

});

}

enemyBullets.forEach((b,bi)=>{

if(
b.x<player.x+20 &&
b.x+4>player.x &&
b.y<player.y+20 &&
b.y+10>player.y
){

enemyBullets.splice(bi,1);

damage++;

document.getElementById("damage").textContent=damage;

if(damage>=10){
gameOver=true;
}

}

});

explosions.forEach((ex,i)=>{

ex.life--;

ex.particles.forEach(p=>{
p.x+=p.vx;
p.y+=p.vy;
});

if(ex.life<=0){
explosions.splice(i,1);
}

});

if(enemies.length===0 && !boss){

phase++;

document.getElementById("phase").textContent=phase;

if(phase<5){
spawnEnemies();
}else{
spawnBoss();
}

}

}

function createExplosion(x,y){

let particles=[];

for(let i=0;i<14;i++){

particles.push({
x:x,
y:y,
vx:(Math.random()-0.5)*5,
vy:(Math.random()-0.5)*5
});

}

explosions.push({
particles:particles,
life:20
});

}

function drawPixel(x,y,p,c){

ctx.fillStyle=c;

for(let r=0;r<p.length;r++){
for(let col=0;col<p[r].length;col++){

if(p[r][col]){
ctx.fillRect(x+col*4,y+r*4,4,4);
}

}
}

}

const playerSprite=[
[0,1,0],
[1,1,1],
[1,1,1]
];

const enemySprite=[
[1,0,1],
[1,1,1],
[0,1,0]
];

function draw(){

ctx.clearRect(0,0,600,650);

drawPixel(player.x,player.y,playerSprite,"lime");

bullets.forEach(b=>{
ctx.fillStyle="yellow";
ctx.fillRect(b.x,b.y,3,10);
});

enemyBullets.forEach(b=>{
ctx.fillStyle="white";
ctx.fillRect(b.x,b.y,3,10);
});

enemies.forEach(e=>{
drawPixel(e.x,e.y,enemySprite,"red");
});

if(boss){

ctx.fillStyle="purple";
ctx.fillRect(boss.x,boss.y,boss.w,boss.h);

ctx.fillStyle="white";
ctx.fillText("BOSS HP "+boss.hp,boss.x,boss.y-10);

}

explosions.forEach(ex=>{

ctx.fillStyle="orange";

ex.particles.forEach(p=>{
ctx.fillRect(p.x,p.y,3,3);
});

});

if(gameOver){

ctx.fillStyle="white";
ctx.font="50px sans-serif";
ctx.fillText("GAME OVER",200,320);

}

}

function loop(){

update();
draw();

requestAnimationFrame(loop);

}

loop();

</script>

</body>
</html>
