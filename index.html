<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Bullet Hell Game</title>
<style>
body{
margin:0;
background:black;
overflow:hidden;
}
canvas{
display:block;
margin:auto;
background:#000;
}
</style>
</head>

<body>
<canvas id="game"></canvas>

<script>

const canvas = document.getElementById("game")
const ctx = canvas.getContext("2d")

canvas.width = 600
canvas.height = 700

let keys = {}

document.addEventListener("keydown",e=>keys[e.key]=true)
document.addEventListener("keyup",e=>keys[e.key]=false)

let player={
x:300,
y:600,
speed:4,
cool:0,
lives:3
}

let bullets=[]
let enemyBullets=[]
let enemies=[]
let items=[]
let boss=null

let frame=0

function spawnEnemy(){

if(frame%90==0){
enemies.push({
x:Math.random()*560+20,
y:-20,
hp:3,
type:"small"
})
}

if(frame%900==0){
enemies.push({
x:300,
y:100,
hp:50,
type:"mid"
})
}

if(frame==3000){
boss={
x:300,
y:120,
hp:200,
phase:1
}
}

}

function shootFlower(x,y,count,speed){

for(let i=0;i<count;i++){

let angle=i*(Math.PI*2/count)

enemyBullets.push({
x:x,
y:y,
vx:Math.cos(angle)*speed,
vy:Math.sin(angle)*speed
})

}

}

function playerShoot(){

if(player.cool>0)return

bullets.push({
x:player.x,
y:player.y,
vy:-7
})

player.cool=15

}

function update(){

frame++

spawnEnemy()

if(keys["ArrowLeft"])player.x-=player.speed
if(keys["ArrowRight"])player.x+=player.speed
if(keys["ArrowUp"])player.y-=player.speed
if(keys["ArrowDown"])player.y+=player.speed

if(keys[" "])playerShoot()

player.cool--

bullets.forEach(b=>b.y+=b.vy)

enemyBullets.forEach(b=>{
b.x+=b.vx
b.y+=b.vy
})

enemies.forEach(e=>{

if(e.type=="small"){

e.y+=1

if(frame%120==0){
shootFlower(e.x,e.y,6,2)
}

}

if(e.type=="mid"){

if(frame%100==0){
shootFlower(e.x,e.y,12,2)
}

if(frame%150==0){

let dx=player.x-e.x
let dy=player.y-e.y
let d=Math.hypot(dx,dy)

enemyBullets.push({
x:e.x,
y:e.y,
vx:dx/d*4,
vy:dy/d*4
})

}

if(frame%200==0){

for(let i=0;i<8;i++){
let a=i*0.4
enemyBullets.push({
x:e.x,
y:e.y,
vx:Math.cos(a+frame*0.1)*2,
vy:Math.sin(a+frame*0.1)*2
})
}

}

}

})

if(boss){

if(boss.phase==1){

if(frame%80==0)shootFlower(boss.x,boss.y,16,2)

if(frame%120==0){

enemyBullets.push({
x:boss.x,
y:boss.y,
vx:0,
vy:3,
split:true
})

}

if(boss.hp<100)boss.phase=2

}

else{

if(frame%70==0){

enemyBullets.push({
x:boss.x,
y:boss.y,
vx:3,
vy:2,
bounce:true
})

}

if(frame%200==0){

enemies.push({
x:boss.x,
y:boss.y,
hp:2,
type:"small"
})

}

}

}

bullets.forEach((b,bi)=>{

enemies.forEach((e,ei)=>{

if(Math.hypot(b.x-e.x,b.y-e.y)<15){

e.hp--
bullets.splice(bi,1)

if(e.hp<=0){

if(Math.random()<0.1){

items.push({
x:e.x,
y:e.y
})

}

enemies.splice(ei,1)

}

}

})

if(boss){

if(Math.hypot(b.x-boss.x,b.y-boss.y)<30){

boss.hp--
bullets.splice(bi,1)

}

}

})

enemyBullets.forEach((b,i)=>{

if(b.split && b.y>350){

b.split=false

shootFlower(b.x,b.y,8,2)

}

if(b.bounce){

if(b.x<0||b.x>canvas.width)b.vx*=-1
if(b.y<0||b.y>canvas.height)b.vy*=-1

}

if(Math.hypot(b.x-player.x,b.y-player.y)<12){

player.lives--
enemyBullets.splice(i,1)

}

})

items.forEach((it,i)=>{

it.y+=2

if(Math.hypot(it.x-player.x,it.y-player.y)<15){

player.lives++
items.splice(i,1)

}

})

}

function draw(){

ctx.fillStyle="black"
ctx.fillRect(0,0,canvas.width,canvas.height)

ctx.fillStyle="cyan"
ctx.fillRect(player.x-8,player.y-8,16,16)

ctx.fillStyle="yellow"
bullets.forEach(b=>{
ctx.fillRect(b.x-2,b.y-6,4,8)
})

ctx.fillStyle="red"
enemyBullets.forEach(b=>{
ctx.beginPath()
ctx.arc(b.x,b.y,4,0,Math.PI*2)
ctx.fill()
})

ctx.fillStyle="orange"
enemies.forEach(e=>{
ctx.beginPath()
ctx.arc(e.x,e.y,12,0,Math.PI*2)
ctx.fill()
})

if(boss){

ctx.fillStyle="purple"
ctx.beginPath()
ctx.arc(boss.x,boss.y,40,0,Math.PI*2)
ctx.fill()

}

ctx.fillStyle="lime"
items.forEach(i=>{
ctx.fillRect(i.x-6,i.y-6,12,12)
})

ctx.fillStyle="white"
ctx.fillText("Lives:"+player.lives,10,20)

}

function gameLoop(){

update()
draw()
requestAnimationFrame(gameLoop)

}

gameLoop()

</script>
</body>
</html>
