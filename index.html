<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Insane Danmaku Invader</title>

<style>
body{
margin:0;
background:black;
overflow:hidden;
}

canvas{
display:block;
margin:auto;
background:black;
}
</style>
</head>

<body>

<canvas id="game"></canvas>

<script>

const canvas=document.getElementById("game")
const ctx=canvas.getContext("2d")

canvas.width=600
canvas.height=700

let keys={}
document.addEventListener("keydown",e=>keys[e.key]=true)
document.addEventListener("keyup",e=>keys[e.key]=false)

let phase=1
let frame=0

let player={
x:300,
y:620,
speed:4,
cool:0,
lives:10
}

let bullets=[]
let enemyBullets=[]
let enemies=[]
let boss=null
let items=[]

function nextPhase(){

phase++
frame=0
enemies=[]
enemyBullets=[]

if(phase<=9){

spawnWave()

}else{

spawnBoss()

}

}

function spawnWave(){

let count=3+phase*2

for(let i=0;i<count;i++){

enemies.push({

x:Math.random()*560+20,
y:Math.random()*250+30,

vx:(Math.random()*2-1)*(1+phase*0.2),
vy:(Math.random()*2-1)*(1+phase*0.2),

hp:2+phase,

type:phase>=7 && Math.random()<0.3 ? "mid":"small"

})

}

}

function spawnBoss(){

boss={
x:300,
y:120,
vx:3,
vy:2,
hp:500,
phase:1
}

}

function shootFlower(x,y,count,speed){

for(let i=0;i<count;i++){

let angle=i*(Math.PI*2/count)

enemyBullets.push({

x:x,
y:y,
vx:Math.cos(angle)*speed,
vy:Math.sin(angle)*speed

})

}

}

function playerShoot(){

if(player.cool>0)return

bullets.push({
x:player.x,
y:player.y,
vy:-8
})

player.cool=20

}

function update(){

frame++

if(keys["ArrowLeft"])player.x-=player.speed
if(keys["ArrowRight"])player.x+=player.speed
if(keys["ArrowUp"])player.y-=player.speed
if(keys["ArrowDown"])player.y+=player.speed

if(keys[" "])playerShoot()

player.cool--

player.x=Math.max(10,Math.min(canvas.width-10,player.x))
player.y=Math.max(360,Math.min(canvas.height-10,player.y))

bullets.forEach(b=>b.y+=b.vy)

enemyBullets.forEach(b=>{
b.x+=b.vx
b.y+=b.vy
})

enemies.forEach(e=>{

e.x+=e.vx
e.y+=e.vy

if(e.x<20||e.x>580)e.vx*=-1
if(e.y<20||e.y>320)e.vy*=-1

if(frame%(120-phase*5)==0){

if(e.type=="small"){

shootFlower(e.x,e.y,6+phase,2)

}

if(e.type=="mid"){

shootFlower(e.x,e.y,12+phase,2)

if(frame%200==0){

let dx=player.x-e.x
let dy=player.y-e.y
let d=Math.hypot(dx,dy)

enemyBullets.push({
x:e.x,
y:e.y,
vx:dx/d*4,
vy:dy/d*4
})

}

}

}

})

if(boss){

boss.x+=boss.vx
boss.y+=boss.vy

if(boss.x<60||boss.x>540)boss.vx*=-1
if(boss.y<40||boss.y>260)boss.vy*=-1

if(boss.phase==1){

if(frame%70==0){

shootFlower(boss.x,boss.y,24,2)

}

if(frame%120==0){

enemyBullets.push({
x:boss.x,
y:boss.y,
vx:0,
vy:3,
split:true
})

}

if(boss.hp<250){

boss.phase=2

}

}

else{

if(frame%80==0){

enemyBullets.push({
x:boss.x,
y:boss.y,
vx:3,
vy:2,
bounce:true
})

}

if(frame%200==0){

shootFlower(boss.x,boss.y,36,3)

}

if(frame%300==0){

enemies.push({
x:boss.x,
y:boss.y,
vx:2,
vy:1,
hp:3,
type:"small"
})

}

}

}

bullets.forEach((b,bi)=>{

enemies.forEach((e,ei)=>{

if(Math.hypot(b.x-e.x,b.y-e.y)<14){

e.hp--
bullets.splice(bi,1)

if(e.hp<=0){

if(Math.random()<0.1){

items.push({x:e.x,y:e.y})

}

enemies.splice(ei,1)

}

}

})

if(boss){

if(Math.hypot(b.x-boss.x,b.y-boss.y)<40){

boss.hp--
bullets.splice(bi,1)

if(boss.hp<=0){

alert("GAME CLEAR")

location.reload()

}

}

}

})

enemyBullets.forEach((b,i)=>{

if(b.split && b.y>350){

b.split=false
shootFlower(b.x,b.y,10,2)

}

if(b.bounce){

if(b.x<0||b.x>canvas.width)b.vx*=-1
if(b.y<0||b.y>canvas.height)b.vy*=-1

}

if(Math.hypot(b.x-player.x,b.y-player.y)<10){

player.lives--
enemyBullets.splice(i,1)

if(player.lives<=0){

alert("GAME OVER")
location.reload()

}

}

})

items.forEach((it,i)=>{

it.y+=2

if(Math.hypot(it.x-player.x,it.y-player.y)<15){

player.lives++
items.splice(i,1)

}

})

if(enemies.length==0 && !boss && phase<10){

spawnWave()

}

if(enemies.length==0 && phase<10 && frame>200){

nextPhase()

}

}

function draw(){

ctx.fillStyle="black"
ctx.fillRect(0,0,canvas.width,canvas.height)

ctx.strokeStyle="#333"
ctx.beginPath()
ctx.moveTo(0,350)
ctx.lineTo(600,350)
ctx.stroke()

ctx.fillStyle="cyan"
ctx.fillRect(player.x-8,player.y-8,16,16)

ctx.fillStyle="yellow"
bullets.forEach(b=>{
ctx.fillRect(b.x-2,b.y-8,4,8)
})

ctx.fillStyle="red"
enemyBullets.forEach(b=>{
ctx.beginPath()
ctx.arc(b.x,b.y,4,0,Math.PI*2)
ctx.fill()
})

ctx.fillStyle="orange"
enemies.forEach(e=>{
ctx.beginPath()
ctx.arc(e.x,e.y,12,0,Math.PI*2)
ctx.fill()
})

if(boss){

ctx.fillStyle="purple"
ctx.beginPath()
ctx.arc(boss.x,boss.y,45,0,Math.PI*2)
ctx.fill()

}

ctx.fillStyle="lime"
items.forEach(i=>{
ctx.fillRect(i.x-6,i.y-6,12,12)
})

ctx.fillStyle="white"
ctx.font="18px Arial"
ctx.fillText("Lives: "+player.lives,10,20)
ctx.fillText("Phase: "+phase,500,20)

}

function loop(){

update()
draw()
requestAnimationFrame(loop)

}

spawnWave()
loop()

</script>

</body>
</html>
