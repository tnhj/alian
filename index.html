<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Danmaku Boss Game</title>
<style>
body{margin:0;background:black;color:white;text-align:center;font-family:sans-serif}
canvas{background:#111;display:block;margin:auto}
</style>
</head>
<body>

<h2>Danmaku Boss Game</h2>
<canvas id="game" width="800" height="600"></canvas>

<script>

const canvas=document.getElementById("game")
const ctx=canvas.getContext("2d")

let keys={}
document.addEventListener("keydown",e=>keys[e.key]=true)
document.addEventListener("keyup",e=>keys[e.key]=false)

let player={
x:400,
y:560,
w:30,
h:30,
hp:120,
cool:0
}

let bullets=[]
let enemies=[]
let enemyBullets=[]
let boss=null

let frame=0
let phase=1
let gameOver=false

function shoot(x,y,angle,speed,r=5){
enemyBullets.push({
x,y,
dx:Math.cos(angle)*speed,
dy:Math.sin(angle)*speed,
r:r
})
}

function circleShot(x,y,count,speed){
for(let i=0;i<count;i++){
shoot(x,y,(Math.PI*2/count)*i,speed)
}
}

function spiralShot(x,y,count,speed,rot){
for(let i=0;i<count;i++){
shoot(x,y,(Math.PI*2/count)*i+rot,speed)
}
}

function spawnEnemy(){

enemies.push({
x:Math.random()*760+20,
y:-20,
w:35,
h:35,
hp:3,
speed:1+phase*0.3
})

}

function spawnBoss(){

boss={
x:320,
y:60,
w:160,
h:160,
hp:1000,
phase:1,
cool:0,
move:3,
rot:0
}

}

function update(){

if(gameOver)return

frame++

if(keys["ArrowLeft"]) player.x-=6
if(keys["ArrowRight"]) player.x+=6

player.x=Math.max(0,Math.min(770,player.x))

player.cool--
if(keys[" "] && player.cool<=0){
bullets.push({x:player.x+15,y:player.y,dy:-7})
player.cool=18
}

for(let b of bullets)b.y+=b.dy
bullets=bullets.filter(b=>b.y>-10)

if(!boss && frame%Math.max(20,80-phase*5)==0){
spawnEnemy()
}

for(let e of enemies){

e.y+=e.speed

if(Math.random()<0.02+phase*0.01){

shoot(e.x+15,e.y,Math.PI/2,3+phase*0.4)

}

}

for(let b of enemyBullets){

b.x+=b.dx
b.y+=b.dy

}

for(let e of enemies){
for(let b of bullets){

if(b.x>e.x&&b.x<e.x+e.w&&b.y>e.y&&b.y<e.y+e.h){
e.hp--
b.y=-999
}

}
}

enemies=enemies.filter(e=>e.hp>0 && e.y<650)

for(let b of enemyBullets){

if(b.x>player.x&&b.x<player.x+player.w&&b.y>player.y&&b.y<player.y+player.h){
player.hp-=5
b.y=999
}

}

enemyBullets=enemyBullets.filter(b=>b.y<700&&b.x>-50&&b.x<850)

if(player.hp<=0){
gameOver=true
}

if(frame>900 && !boss){
spawnBoss()
}

if(boss){

boss.x+=boss.move
if(boss.x<0||boss.x>640)boss.move*=-1

boss.rot+=0.05

// 円形弾幕
if(frame%60==0){
circleShot(boss.x+80,boss.y+80,20+phase*2,2+phase*0.2)
}

// 渦巻き弾幕
if(frame%8==0){
spiralShot(boss.x+80,boss.y+80,3,3+phase*0.2,boss.rot)
}

// 分裂弾
if(frame%120==0){
for(let i=-2;i<=2;i++){
shoot(boss.x+80,boss.y+80,Math.PI/2+i*0.2,4)
}
}

// 子分召喚
if(frame%200==0){
spawnEnemy()
spawnEnemy()
spawnEnemy()
}

// 第二形態
if(boss.hp<500 && boss.phase==1){
boss.phase=2
}

// レーザー
if(boss.phase==2 && frame%150==0){

for(let y=0;y<600;y+=15){
enemyBullets.push({
x:boss.x+80,
y:y,
dx:0,
dy:0,
r:7
})
}

}

// 最終理不尽攻撃
if(boss.hp<200){

if(frame%30==0){
circleShot(boss.x+80,boss.y+80,50,3.5)
}

if(frame%5==0){
shoot(boss.x+80,boss.y+80,Math.random()*Math.PI*2,4)
}

}

for(let b of bullets){
if(b.x>boss.x&&b.x<boss.x+boss.w&&b.y>boss.y&&b.y<boss.y+boss.h){
boss.hp-=2
b.y=-999
}
}

if(boss.hp<=0){
boss=null
phase++
frame=0

if(phase>10){
alert("完全クリア！！")
gameOver=true
}

}

}

}

function draw(){

ctx.clearRect(0,0,800,600)

ctx.fillStyle="cyan"
ctx.fillRect(player.x,player.y,player.w,player.h)

ctx.fillStyle="yellow"
for(let b of bullets){
ctx.fillRect(b.x,b.y,4,10)
}

ctx.fillStyle="red"
for(let e of enemies){
ctx.fillRect(e.x,e.y,e.w,e.h)
}

ctx.fillStyle="orange"
for(let b of enemyBullets){
ctx.beginPath()
ctx.arc(b.x,b.y,b.r,0,Math.PI*2)
ctx.fill()
}

if(boss){
ctx.fillStyle="purple"
ctx.fillRect(boss.x,boss.y,boss.w,boss.h)

ctx.fillStyle="white"
ctx.fillText("BOSS HP:"+boss.hp,350,20)
}

ctx.fillText("HP:"+player.hp,20,20)
ctx.fillText("PHASE:"+phase,20,40)

if(gameOver){
ctx.fillStyle="red"
ctx.font="50px sans-serif"
ctx.fillText("GAME OVER",260,300)
}

}

function loop(){
update()
draw()
requestAnimationFrame(loop)
}

loop()

</script>

</body>
</html>
