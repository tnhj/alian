<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>8bit Bullet Hell</title>

<style>

body{
margin:0;
background:black;
color:white;
font-family:monospace;
overflow:hidden;
}

canvas{
display:block;
margin:auto;
background:black;
}

#ui{
position:absolute;
top:10px;
left:10px;
}

.bar{
width:220px;
height:14px;
background:#333;
margin-bottom:5px;
}

.fill{
height:100%;
background:lime;
}

#phaseFill{background:orange;}
#bossFill{background:red;}

#gameover{
position:absolute;
top:50%;
left:50%;
transform:translate(-50%,-50%);
font-size:50px;
display:none;
}

</style>
</head>

<body>

<div id="ui">

HP
<div class="bar"><div id="hpFill" class="fill"></div></div>

PHASE
<div class="bar"><div id="phaseFill" class="fill"></div></div>

BOSS
<div class="bar"><div id="bossFill" class="fill"></div></div>

Phase <span id="phaseText">1</span>

</div>

<div id="gameover">GAME OVER</div>

<canvas id="game" width="480" height="640"></canvas>

<script>

const canvas=document.getElementById("game")
const ctx=canvas.getContext("2d")

let keys={}
document.addEventListener("keydown",e=>keys[e.key]=true)
document.addEventListener("keyup",e=>keys[e.key]=false)

let phase=1
let phaseProgress=0
let phaseMax=25

let boss=null

let player={
x:240,
y:560,
hp:100,
maxHP:100,
speed:4,
bomb:3
}

let bullets=[]
let enemyBullets=[]
let enemies=[]
let stars=[]

for(let i=0;i<120;i++){
stars.push({
x:Math.random()*480,
y:Math.random()*640,
s:Math.random()*2+1
})
}

function spawnEnemy(){

enemies.push({
x:Math.random()*440+20,
y:Math.random()*200+20,
vx:(Math.random()-0.5)*2,
vy:(Math.random()-0.5)*2,
hp:2
})

}

function spawnMidBoss(){

boss={
x:240,
y:120,
hp:150,
maxHP:150,
type:"mid",
timer:0
}

}

function spawnBoss(){

boss={
x:240,
y:120,
hp:400,
maxHP:400,
type:"final",
timer:0
}

}

for(let i=0;i<5;i++)spawnEnemy()

function update(){

// movement
if(keys["ArrowLeft"]) player.x-=player.speed
if(keys["ArrowRight"]) player.x+=player.speed
if(keys["ArrowUp"]) player.y-=player.speed
if(keys["ArrowDown"]) player.y+=player.speed

player.x=Math.max(10,Math.min(470,player.x))
player.y=Math.max(350,Math.min(630,player.y))

// shoot
if(keys[" "] && Math.random()<0.3){

bullets.push({
x:player.x,
y:player.y,
v:8
})

}

// bomb
if(keys["x"] && player.bomb>0){

enemyBullets=[]
player.bomb--

}

// stars
stars.forEach(s=>{
s.y+=s.s
if(s.y>640)s.y=0
})

// bullets
bullets.forEach((b,i)=>{
b.y-=b.v
if(b.y<0)bullets.splice(i,1)
})

// enemies
enemies.forEach((e,ei)=>{

e.x+=e.vx
e.y+=e.vy

if(e.x<20||e.x>460)e.vx*=-1
if(e.y<20||e.y>300)e.vy*=-1

if(Math.random()<0.02){

enemyBullets.push({
x:e.x,
y:e.y,
vx:(Math.random()-0.5)*3,
vy:3
})

}

bullets.forEach((b,bi)=>{

if(Math.hypot(b.x-e.x,b.y-e.y)<15){

e.hp--
bullets.splice(bi,1)

if(e.hp<=0){

enemies.splice(ei,1)
phaseProgress++
spawnEnemy()

}

}

})

})

// boss logic
if(boss){

boss.timer++

if(boss.timer%20==0){

for(let i=0;i<16;i++){

let a=i*Math.PI/8

enemyBullets.push({
x:boss.x,
y:boss.y,
vx:Math.cos(a)*3,
vy:Math.sin(a)*3
})

}

}

bullets.forEach((b,bi)=>{

if(Math.hypot(b.x-boss.x,b.y-boss.y)<40){

boss.hp--
bullets.splice(bi,1)

}

})

if(boss.hp<=0){

boss=null
phase++

}

}

// enemy bullets
enemyBullets.forEach((b,i)=>{

b.x+=b.vx
b.y+=b.vy

if(Math.hypot(b.x-player.x,b.y-player.y)<15){

player.hp-=10
enemyBullets.splice(i,1)

}

})

// phase progress
if(phaseProgress>=phaseMax && !boss){

phaseProgress=0

if(phase==5) spawnMidBoss()
else if(phase==10) spawnBoss()
else{
phase++
for(let i=0;i<phase+3;i++)spawnEnemy()
}

}

// game over
if(player.hp<=0){

document.getElementById("gameover").style.display="block"
return

}

// UI
document.getElementById("hpFill").style.width=(player.hp/player.maxHP*100)+"%"
document.getElementById("phaseFill").style.width=(phaseProgress/phaseMax*100)+"%"
document.getElementById("phaseText").innerText=phase

if(boss){
document.getElementById("bossFill").style.width=(boss.hp/boss.maxHP*100)+"%"
}else{
document.getElementById("bossFill").style.width="0%"
}

}

function drawPlayer(){

const p=[
"00111100",
"01111110",
"11111111",
"11011011",
"11111111",
"00111100",
"00100100",
"01000010"
]

let scale=3

for(let y=0;y<p.length;y++){
for(let x=0;x<p[y].length;x++){

if(p[y][x]=="1"){

ctx.fillStyle="cyan"

ctx.fillRect(
player.x+x*scale-12,
player.y+y*scale-12,
scale,
scale
)

}

}
}

}

function draw(){

ctx.clearRect(0,0,480,640)

ctx.fillStyle="white"
stars.forEach(s=>ctx.fillRect(s.x,s.y,2,2))

drawPlayer()

ctx.fillStyle="yellow"
bullets.forEach(b=>{
ctx.beginPath()
ctx.arc(b.x,b.y,4,0,Math.PI*2)
ctx.fill()
})

ctx.fillStyle="red"
enemyBullets.forEach(b=>{
ctx.beginPath()
ctx.arc(b.x,b.y,4,0,Math.PI*2)
ctx.fill()
})

ctx.fillStyle="orange"
enemies.forEach(e=>{
ctx.fillRect(e.x-12,e.y-12,24,24)
})

if(boss){

ctx.fillStyle="purple"

if(boss.type=="mid")
ctx.fillRect(boss.x-32,boss.y-32,64,64)

else
ctx.fillRect(boss.x-48,boss.y-48,96,96)

}

}

function loop(){

update()
draw()

requestAnimationFrame(loop)

}

loop()

</script>
</body>
</html>
