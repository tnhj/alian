+    function drawPixelSprite(pattern, x, y, size, color) {
+      const px = size / pattern.length;

+      for (let r = 0; r < pattern.length; r++) {
+        for (let c = 0; c < pattern[r].length; c++) {

+        }

+    function restart() {
+      game.state = "play";

+      game.player.x = W / 2 - 16;
+      startPhase(1);
+    }
+
+    function startPhase(phase) {
+      game.phase = phase;
+      game.shots = [];
+      game.enemyBullets = [];
+      game.enemies = [];
+      game.boss = null;
+      game.waveIntro = 80;
+      game.phaseDefeated = 0;
+      game.formation.dir = 1;

+      if (phase % 5 === 0) {
+        spawnBoss(phase);

+        return;
+      }
+
+      const rows = Math.min(3 + Math.floor(phase / 2), 8);
+      const cols = Math.min(7 + phase, 12);
+      const baseHp = 1 + Math.floor(phase / 3);
+      const gapX = 34;
+      const gapY = 30;
+      const startX = 36;
+
+      for (let r = 0; r < rows; r++) {

+    function update() {

+      if (keys.ArrowLeft) game.player.x -= game.player.speed;

+
+      if (game.fireCooldown > 0) game.fireCooldown--;
+      if (keys.Space && game.fireCooldown <= 0) {
+        game.shots.push({ x: game.player.x + game.player.w / 2, y: game.player.y + 2, vy: -9.5, r: 3 });
+        game.fireCooldown = 8;
+      }
+
+      for (const shot of game.shots) shot.y += shot.vy;
+      game.shots = game.shots.filter((s) => s.y > -20);

+      if (game.boss) {

+      for (const b of game.enemyBullets) {

+      for (const s of game.shots) {
+        ctx.beginPath();
+        ctx.arc(s.x, s.y, s.r, 0, Math.PI * 2);
+        ctx.fill();
+      }
+
+      for (const b of game.enemyBullets) {
+        ctx.fillStyle = b.color;
+        ctx.beginPath();
+        ctx.arc(b.x, b.y, b.r, 0, Math.PI * 2);
+        ctx.fill();
+      }
+
+      drawUI();
+      drawOverlay();
+    }
+
+    function drawBackground() {
+      const grad = ctx.createLinearGradient(0, 0, 0, H);
+      grad.addColorStop(0, "#040a1c");
+      grad.addColorStop(1, "#000106");
+      ctx.fillStyle = grad;
+      ctx.fillRect(0, 0, W, H);
+      for (const s of game.stars) {
+        ctx.fillStyle = s.z > 2 ? "#e2fbff" : "#8ea8ff";
+        ctx.fillRect(s.x, s.y, s.z, s.z);
+      }
+    }
+
+    function drawGauge(x, y, w, h, ratio, colorA, colorB, label) {
+      ctx.fillStyle = "rgba(5, 14, 31, 0.82)";
+      ctx.fillRect(x - 2, y - 2, w + 4, h + 4);
+      ctx.strokeStyle = "#95dfff";
+      ctx.strokeRect(x - 2, y - 2, w + 4, h + 4);
+
+      const g = ctx.createLinearGradient(x, y, x + w, y);
+      g.addColorStop(0, colorA);
+      g.addColorStop(1, colorB);
+      ctx.fillStyle = g;
+      ctx.fillRect(x, y, Math.max(0, Math.min(1, ratio)) * w, h);
+
+      ctx.font = "12px monospace";
+      ctx.fillStyle = "#ddf6ff";
+      ctx.fillText(label, x + 4, y + h - 2);
+    }
+
+    function drawUI() {
+      ctx.fillStyle = "rgba(4, 14, 33, 0.75)";
+      ctx.fillRect(8, 8, 464, 72);
+      ctx.strokeStyle = "#7fd6ff";
+      ctx.strokeRect(8, 8, 464, 72);
+
+      ctx.font = "14px monospace";
+      ctx.fillStyle = "#dcf8ff";
+      ctx.fillText(`SCORE ${game.score}`, 20, 28);
+      ctx.fillText(`PHASE ${game.phase}${game.boss ? " [BOSS]" : ""}`, 330, 28);
+
+      drawGauge(20, 36, 200, 14, game.player.hp / game.player.maxHp, "#7effcc", "#29a0ff", "PLAYER HP");
+      const progress = game.phaseTarget > 0 ? game.phaseDefeated / game.phaseTarget : 0;
+      drawGauge(252, 36, 200, 14, progress, "#ffd26c", "#ff6f5f", "PHASE PROGRESS");
+
+      if (game.boss) {
+        drawGauge(76, 90, 328, 16, game.boss.hp / game.boss.maxHp, "#ff9ff2", "#ff4f8e", "BOSS HP");
+      }
+    }
+
+    function drawOverlay() {
+      if (game.state === "start") {
+        ctx.fillStyle = "rgba(0,0,0,0.38)";
+        ctx.fillRect(0, 0, W, H);
+        ctx.textAlign = "center";
+        ctx.fillStyle = "#f0fdff";
+        ctx.font = "34px monospace";
+        ctx.fillText("DANMAKU INVADER", W / 2, H / 2 - 36);
+        ctx.font = "16px monospace";
+        ctx.fillText("SPACEで出撃", W / 2, H / 2 + 8);
+        ctx.fillText("フェーズ5,10,15...でボス襲来", W / 2, H / 2 + 34);
+        ctx.fillText("鬼畜弾幕を避けて生き残れ", W / 2, H / 2 + 58);
+        ctx.textAlign = "left";
+      }
+
+      if (game.state === "gameover") {
+        ctx.fillStyle = "rgba(0,0,0,0.45)";
+        ctx.fillRect(0, 0, W, H);
+        ctx.textAlign = "center";
+        ctx.fillStyle = "#ffb7cf";
+        ctx.font = "42px monospace";
+        ctx.fillText("GAME OVER", W / 2, H / 2 - 10);
+        ctx.fillStyle = "#ffffff";
+        ctx.font = "18px monospace";
+        ctx.fillText(`SCORE ${game.score}`, W / 2, H / 2 + 20);
+        ctx.fillText("ENTERで再挑戦", W / 2, H / 2 + 50);
+        ctx.textAlign = "left";
+      }
+    }
+
+    function loop() {
+      update();
+      draw();
+      requestAnimationFrame(loop);
+    }
+
+    startPhase(1);
+    loop();
+  </script>
 </body>
 </html>
