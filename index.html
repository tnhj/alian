<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Pixel Boss Battle</title>

<style>

body{
margin:0;
background:black;
color:white;
font-family:monospace;
overflow:hidden;
}

canvas{
display:block;
margin:auto;
background:#111;
image-rendering:pixelated;
}

#ui{
position:absolute;
top:10px;
left:10px;
}

.bar{
width:220px;
height:14px;
background:#333;
margin-bottom:6px;
}

.fill{
height:100%;
background:#0f0;
}

#phasefill{background:cyan;}
#bossfill{background:red;}

#title{
position:absolute;
width:100%;
height:100%;
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
background:black;
font-size:40px;
}

button{
font-size:20px;
padding:10px 30px;
margin-top:20px;
}

</style>
</head>

<body>

<div id="title">
PIXEL BOSS BATTLE
<button onclick="startGame()">START</button>
</div>

<div id="ui">

HP
<div class="bar"><div id="hpfill" class="fill"></div></div>

PHASE
<div class="bar"><div id="phasefill" class="fill"></div></div>

<div id="bossui" style="display:none;">
BOSS
<div class="bar"><div id="bossfill"></div></div>
</div>

</div>

<canvas id="game" width="800" height="500"></canvas>

<script>

const canvas = document.getElementById("game")
const ctx = canvas.getContext("2d")

let keys={}
document.addEventListener("keydown",e=>keys[e.key]=true)
document.addEventListener("keyup",e=>keys[e.key]=false)

const playerSprite=[
"00100",
"01110",
"11111",
"10101",
"00100"
]

const enemySprite=[
"01110",
"11111",
"10101",
"11111",
"01110"
]

const bossSprite=[
"00111100",
"11111111",
"11011011",
"11111111",
"01111110"
]

let player={
x:380,
y:440,
hp:100,
speed:3
}

let bullets=[]
let enemyBullets=[]
let enemies=[]
let explosions=[]
let boss=null

let phase=1
let progress=0
let maxProgress=100
let gameOver=false

function startGame(){

document.getElementById("title").style.display="none"

spawnEnemies()

loop()

}

function drawSprite(sprite,x,y,scale,color){

ctx.fillStyle=color

for(let r=0;r<sprite.length;r++){
for(let c=0;c<sprite[r].length;c++){

if(sprite[r][c]=="1"){

ctx.fillRect(
x+c*scale,
y+r*scale,
scale,
scale)

}

}}

}

function spawnEnemies(){

let count=5+phase*2

for(let i=0;i<count;i++){

enemies.push({

x:Math.random()*760,
y:Math.random()*200,
vx:(Math.random()*2-1)*(1+phase*0.2),
vy:(Math.random()*2-1)*(1+phase*0.2),
shoot:80-Math.min(phase*5,50)

})

}

}

function spawnBoss(){

boss={
x:300,
y:60,
vx:3,
hp:300,
max:300,
phase2:false,
timer:0
}

document.getElementById("bossui").style.display="block"

}

function shoot(){

bullets.push({
x:player.x+10,
y:player.y,
vy:-7
})

}

function explosion(x,y){

explosions.push({x,y,frame:0})

}

function splitShot(x,y){

for(let i=-2;i<=2;i++){

enemyBullets.push({
x,y,
vx:i*1.5,
vy:3
})

}

}

function bounceShot(x,y){

enemyBullets.push({x,y,vx:4,vy:2,bounce:true})
enemyBullets.push({x,y,vx:-4,vy:2,bounce:true})

}

function summonMinion(){

for(let i=0;i<2;i++){

enemies.push({
x:boss.x+Math.random()*80,
y:boss.y+60,
vx:(Math.random()*2-1)*2,
vy:(Math.random()*2-1)*2,
shoot:80
})

}

}

function update(){

if(gameOver)return

if(keys["ArrowLeft"]) player.x-=player.speed
if(keys["ArrowRight"]) player.x+=player.speed

player.x=Math.max(0,Math.min(780,player.x))

if(keys[" "] && Math.random()<0.3) shoot()

bullets.forEach(b=>b.y+=b.vy)
bullets=bullets.filter(b=>b.y>-20)

enemies.forEach(e=>{

e.x+=e.vx
e.y+=e.vy

if(e.x<0||e.x>780)e.vx*=-1
if(e.y<0||e.y>250)e.vy*=-1

e.shoot--

if(e.shoot<0){

enemyBullets.push({
x:e.x+10,
y:e.y+10,
vx:0,
vy:3+phase*0.3
})

e.shoot=80-Math.min(phase*5,50)

}

})

enemyBullets.forEach(b=>{

b.x+=b.vx||0
b.y+=b.vy

if(b.bounce){

if(b.x<0||b.x>800)b.vx*=-1

}

})

enemyBullets.forEach((b,i)=>{

if(Math.abs(b.x-player.x)<14 && Math.abs(b.y-player.y)<14){

player.hp-=5
explosion(player.x,player.y)
enemyBullets.splice(i,1)

if(player.hp<=0){

gameOver=true
alert("GAME OVER")
location.reload()

}

}

})

bullets.forEach((b,bi)=>{

enemies.forEach((e,ei)=>{

if(Math.abs(b.x-e.x)<18 && Math.abs(b.y-e.y)<18){

explosion(e.x,e.y)

bullets.splice(bi,1)
enemies.splice(ei,1)

progress+=10

}

})

})

if(enemies.length==0 && !boss){

if(progress>=maxProgress){

spawnBoss()

}else{

phase++
spawnEnemies()

}

}

if(boss){

boss.timer++

boss.x+=boss.vx
boss.y+=Math.sin(boss.timer*0.05)*1.5

if(boss.x<0||boss.x>650)boss.vx*=-1

if(boss.hp<150 && !boss.phase2){

boss.phase2=true

}

if(boss.timer%70==0) splitShot(boss.x+60,boss.y)

if(boss.timer%120==0) bounceShot(boss.x+60,boss.y)

if(boss.timer%180==0) summonMinion()

if(boss.phase2 && boss.timer%90==0){

enemyBullets.push({
x:boss.x+60,
y:boss.y,
vx:0,
vy:10,
laser:true
})

enemyBullets.push({
x:boss.x+30,
y:boss.y,
vx:0,
vy:10,
laser:true
})

}

bullets.forEach((b,i)=>{

if(Math.abs(b.x-boss.x)<80 && Math.abs(b.y-boss.y)<50){

boss.hp-=10
explosion(b.x,b.y)

bullets.splice(i,1)

}

})

if(boss.hp<=0){

alert("GAME CLEAR!")
location.reload()

}

}

explosions.forEach(e=>e.frame++)
explosions=explosions.filter(e=>e.frame<20)

updateUI()

}

function draw(){

ctx.clearRect(0,0,800,500)

drawSprite(playerSprite,player.x,player.y,4,"lime")

bullets.forEach(b=>{
ctx.fillStyle="yellow"
ctx.fillRect(b.x,b.y,3,8)
})

enemyBullets.forEach(b=>{
ctx.fillStyle=b.laser?"cyan":"red"
ctx.fillRect(b.x,b.y,6,b.laser?24:10)
})

enemies.forEach(e=>{
drawSprite(enemySprite,e.x,e.y,7,"white")
})

if(boss){
drawSprite(bossSprite,boss.x,boss.y,16,boss.phase2?"purple":"orange")
}

explosions.forEach(e=>{

ctx.fillStyle="orange"
ctx.beginPath()
ctx.arc(e.x,e.y,e.frame,0,Math.PI*2)
ctx.fill()

})

}

function updateUI(){

document.getElementById("hpfill").style.width=player.hp*2+"px"

document.getElementById("phasefill").style.width=(progress/maxProgress)*220+"px"

if(boss){
document.getElementById("bossfill").style.width=(boss.hp/boss.max)*220+"px"
}

}

function loop(){

update()
draw()

requestAnimationFrame(loop)

}

</script>

</body>
</html>
