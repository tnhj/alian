<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>インベーダーEX</title>

<style>

body{
margin:0;
background:black;
color:white;
font-family:sans-serif;
text-align:center;
}

canvas{
background:black;
display:block;
margin:auto;
border:2px solid white;
}

#screen{
position:absolute;
top:0;
left:0;
right:0;
bottom:0;
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
background:black;
font-size:30px;
}

.bar{
height:12px;
background:red;
}

#ui{
width:600px;
margin:auto;
}

</style>
</head>

<body>

<div id="screen">
<h1>インベーダーEX</h1>
<p>ENTERでスタート</p>
</div>

<div id="ui">

HP
<div style="background:#333">
<div id="hpBar" class="bar" style="width:100%"></div>
</div>

Phase
<div style="background:#333">
<div id="phaseBar" class="bar" style="width:0%;background:lime"></div>
</div>

</div>

<canvas id="game" width="600" height="600"></canvas>

<script>

const canvas=document.getElementById("game");
const ctx=canvas.getContext("2d");

let keys={};

document.addEventListener("keydown",e=>{

keys[e.key]=true;

if(e.key==="Enter" && !gameStarted){
startGame();
}

});

document.addEventListener("keyup",e=>keys[e.key]=false);

let player;
let bullets=[];
let enemyBullets=[];
let enemies=[];
let explosions=[];

let boss=null;

let hp=100;

let phase=1;
let phaseProgress=0;

let gameStarted=false;
let gameOver=false;
let gameClear=false;

function startGame(){

document.getElementById("screen").style.display="none";

gameStarted=true;

init();

requestAnimationFrame(loop);

}

function init(){

player={x:280,y:540,w:30,h:20};

spawnEnemies();

}

function spawnEnemies(){

enemies=[];

let count=5+phase*3;

for(let i=0;i<count;i++){

enemies.push({
x:Math.random()*550,
y:40+Math.random()*150,
vx:(Math.random()-0.5)*(1+phase*0.5),
w:24,
h:16
});

}

}

function spawnBoss(){

boss={
x:260,
y:80,
w:80,
h:40,
vx:2,
hp:300
};

}

function loop(){

update();
draw();

requestAnimationFrame(loop);

}

function update(){

if(!gameStarted || gameOver || gameClear) return;

movePlayer();

updateBullets();

updateEnemies();

updateBoss();

updateExplosions();

updateUI();

if(hp<=0){
gameOver=true;
showText("GAME OVER");
}

}

function movePlayer(){

let speed=5;

if(keys["ArrowLeft"]) player.x-=speed;
if(keys["ArrowRight"]) player.x+=speed;

if(player.x<40)player.x=40;
if(player.x>520)player.x=520;

if(keys[" "]) shoot();

}

let shootTimer=0;

function shoot(){

if(shootTimer>0) return;

bullets.push({
x:player.x+14,
y:player.y,
w:4,
h:10
});

shootTimer=8;

}

function updateBullets(){

shootTimer--;

bullets.forEach((b,i)=>{

b.y-=8;

if(b.y<0){
bullets.splice(i,1);
return;
}

enemies.forEach((e,ei)=>{

if(hit(b,e)){

spawnExplosion(e.x,e.y);

bullets.splice(i,1);
enemies.splice(ei,1);

phaseProgress++;

}

});

if(boss && hit(b,boss)){

spawnExplosion(b.x,b.y);

boss.hp-=10;

bullets.splice(i,1);

if(boss.hp<=0){

spawnExplosion(boss.x,boss.y,50);

boss=null;

gameClear=true;

showText("GAME CLEAR");

}

}

});

enemyBullets.forEach((b,i)=>{

b.x+=b.vx;
b.y+=b.vy;

if(b.type==="bounce"){

if(b.x<0 || b.x>600) b.vx*=-1;

}

if(b.y>600) enemyBullets.splice(i,1);

if(hit(b,player)){

hp-=10;

enemyBullets.splice(i,1);

spawnExplosion(player.x,player.y);

}

});

}

function updateEnemies(){

enemies.forEach(e=>{

e.x+=e.vx;

if(e.x<0||e.x>560){
e.vx*=-1;
}

if(Math.random()<0.01+phase*0.003){

enemyBullets.push({
x:e.x+12,
y:e.y,
vx:(Math.random()-0.5)*2,
vy:3
});

}

});

if(enemies.length===0){

phase++;

phaseProgress=0;

if(phase<5){
spawnEnemies();
}else{
spawnBoss();
}

}

}

function updateBoss(){

if(!boss) return;

boss.x+=boss.vx;

if(boss.x<0||boss.x>520){
boss.vx*=-1;
}

let r=Math.random();

if(r<0.02){

enemyBullets.push({
x:boss.x+40,
y:boss.y+40,
vx:0,
vy:4,
type:"split"
});

}

if(r<0.035){

enemyBullets.push({
x:boss.x+40,
y:boss.y+40,
vx:3,
vy:3,
type:"bounce"
});

}

if(r<0.045){

enemies.push({
x:boss.x,
y:boss.y+50,
vx:(Math.random()-0.5)*3,
w:24,
h:16
});

}

}

function spawnExplosion(x,y,size=30){

explosions.push({
x:x,
y:y,
t:20,
size:size
});

}

function updateExplosions(){

explosions.forEach((e,i)=>{

e.t--;

if(e.t<=0) explosions.splice(i,1);

});

}

function updateUI(){

document.getElementById("hpBar").style.width=hp+"%";

let p=Math.min(phaseProgress/10*100,100);

document.getElementById("phaseBar").style.width=p+"%";

}

function draw(){

ctx.clearRect(0,0,600,600);

drawPlayer();
drawEnemies();
drawBoss();
drawBullets();
drawExplosions();

}

function drawPlayer(){

ctx.fillStyle="cyan";

ctx.fillRect(player.x,player.y,30,20);
ctx.fillRect(player.x+10,player.y-10,10,10);

}

function drawEnemies(){

ctx.fillStyle="lime";

enemies.forEach(e=>{

ctx.fillRect(e.x,e.y,20,16);

});

}

function drawBoss(){

if(!boss) return;

ctx.fillStyle="purple";

ctx.fillRect(boss.x,boss.y,80,40);
ctx.fillRect(boss.x+20,boss.y-20,40,20);

}

function drawBullets(){

ctx.fillStyle="yellow";

bullets.forEach(b=>{
ctx.fillRect(b.x,b.y,4,10);
});

ctx.fillStyle="red";

enemyBullets.forEach(b=>{
ctx.fillRect(b.x,b.y,6,6);
});

}

function drawExplosions(){

explosions.forEach(e=>{

ctx.fillStyle="orange";

ctx.beginPath();

ctx.arc(
e.x,
e.y,
e.size*(e.t/20),
0,
Math.PI*2
);

ctx.fill();

});

}

function hit(a,b){

return(
a.x < b.x + b.w &&
a.x + a.w > b.x &&
a.y < b.y + b.h &&
a.y + a.h > b.y
);

}

function showText(text){

let s=document.getElementById("screen");

s.innerHTML="<h1>"+text+"</h1>";

s.style.display="flex";

}

</script>

</body>
</html>
