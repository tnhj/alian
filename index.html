<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Dot Danmaku Shooter</title>

<style>
body{
margin:0;
background:black;
color:white;
text-align:center;
font-family:sans-serif;
}

canvas{
display:block;
margin:auto;
background:#111;
image-rendering:pixelated;
}
</style>
</head>

<body>

<canvas id="game" width="800" height="600"></canvas>

<script>

const canvas=document.getElementById("game")
const ctx=canvas.getContext("2d")

let keys={}

document.addEventListener("keydown",e=>keys[e.key]=true)
document.addEventListener("keyup",e=>keys[e.key]=false)

let gameState="title"

let player={
x:380,
y:540,
hp:100,
maxHp:100,
cool:0
}

let bullets=[]
let enemies=[]
let enemyBullets=[]
let items=[]
let explosions=[]

let boss=null

let phase=1
let enemiesTotal=0
let enemiesKilled=0

/* ドット絵 */

const playerSprite=[
"00100",
"01110",
"11111",
"10101",
"00100"
]

const enemySprite=[
"01110",
"11111",
"10101",
"11111",
"01010"
]

const bossSprite=[
"00111100",
"11111111",
"11011011",
"11111111",
"10111101",
"11100111",
"01111110",
"00111100"
]

function drawSprite(sprite,x,y,size,color){

for(let r=0;r<sprite.length;r++){
for(let c=0;c<sprite[r].length;c++){

if(sprite[r][c]=="1"){

ctx.fillStyle=color
ctx.fillRect(
x+c*size,
y+r*size,
size,
size
)

}

}
}

}

/* 敵生成 */

function spawnEnemies(){

let count=phase*4

enemies=[]
enemiesKilled=0
enemiesTotal=count

for(let i=0;i<count;i++){

enemies.push({

x:Math.random()*760,
y:Math.random()*200,

dx:(Math.random()-0.5)*2,
dy:(Math.random()-0.5)*2

})

}

}

/* ボス */

function spawnBoss(){

boss={
x:360,
y:80,
hp:500,
cool:0
}

}

/* 爆発 */

function createExplosion(x,y){

for(let i=0;i<10;i++){

explosions.push({

x:x,
y:y,
dx:(Math.random()-0.5)*4,
dy:(Math.random()-0.5)*4,
life:30

})

}

}

/* 回復 */

function dropItem(x,y){

if(Math.random()<0.25){

items.push({
x:x,
y:y,
type:"heal"
})

}

}

/* 更新 */

function update(){

if(gameState=="title"){

if(keys["Enter"]){

gameState="play"
spawnEnemies()

}

return
}

/* 移動 */

if(keys["ArrowLeft"])player.x-=6
if(keys["ArrowRight"])player.x+=6

player.x=Math.max(0,Math.min(770,player.x))

/* 攻撃 */

player.cool--

if(keys[" "] && player.cool<=0){

bullets.push({
x:player.x+15,
y:player.y
})

player.cool=15
}

for(let b of bullets)b.y-=8
bullets=bullets.filter(b=>b.y>-10)

/* 敵 */

for(let e of enemies){

e.x+=e.dx
e.y+=e.dy

if(e.x<0||e.x>770)e.dx*=-1
if(e.y<0||e.y>300)e.dy*=-1

if(Math.random()<0.01+phase*0.002){

enemyBullets.push({
x:e.x+15,
y:e.y+15,
dy:3+phase*0.2
})

}

}

/* 敵被弾 */

for(let i=enemies.length-1;i>=0;i--){

let e=enemies[i]

for(let j=bullets.length-1;j>=0;j--){

let b=bullets[j]

if(
b.x>e.x &&
b.x<e.x+30 &&
b.y>e.y &&
b.y<e.y+30
){

createExplosion(e.x,e.y)
dropItem(e.x,e.y)

enemies.splice(i,1)
bullets.splice(j,1)

enemiesKilled++

break
}

}
}

/* 敵弾 */

for(let b of enemyBullets)b.y+=b.dy

enemyBullets=enemyBullets.filter(b=>b.y<620)

/* プレイヤー被弾 */

for(let b of enemyBullets){

if(
b.x>player.x &&
b.x<player.x+30 &&
b.y>player.y &&
b.y<player.y+30
){

player.hp-=5
b.y=700

createExplosion(player.x,player.y)

}

}

if(player.hp<=0){

gameState="gameover"

}

/* アイテム */

for(let it of items){

it.y+=2

if(
it.x>player.x &&
it.x<player.x+30 &&
it.y>player.y &&
it.y<player.y+30
){

player.hp=Math.min(player.maxHp,player.hp+20)
it.y=700

}

}

items=items.filter(i=>i.y<620)

/* 爆発 */

for(let ex of explosions){

ex.x+=ex.dx
ex.y+=ex.dy
ex.life--

}

explosions=explosions.filter(e=>e.life>0)

/* フェーズ */

if(enemiesKilled>=enemiesTotal && !boss){

phase++

if(phase==10){

spawnBoss()

}else{

spawnEnemies()

}

}

/* ボス */

if(boss){

boss.cool--

boss.x+=Math.sin(Date.now()/400)*2

if(boss.cool<=0){

for(let i=0;i<16;i++){

let angle=(Math.PI*2/16)*i

enemyBullets.push({

x:boss.x+40,
y:boss.y+40,

dx:Math.cos(angle)*3,
dy:Math.sin(angle)*3

})

}

boss.cool=40

}

for(let b of enemyBullets){

if(b.dx){

b.x+=b.dx
b.y+=b.dy

}

}

for(let b of bullets){

if(
b.x>boss.x &&
b.x<boss.x+80 &&
b.y>boss.y &&
b.y<boss.y+80
){

boss.hp-=10
b.y=-50

createExplosion(boss.x+40,boss.y+40)

}

}

if(boss.hp<=0){

gameState="clear"

}

}

}

/* 描画 */

function draw(){

ctx.clearRect(0,0,800,600)

/* タイトル */

if(gameState=="title"){

ctx.fillStyle="white"
ctx.font="50px sans-serif"

ctx.fillText("DOT SHOOTER",250,250)

ctx.font="20px sans-serif"
ctx.fillText("PRESS ENTER",320,320)

return

}

/* プレイヤー */

drawSprite(playerSprite,player.x,player.y,6,"cyan")

/* 弾 */

ctx.fillStyle="yellow"

for(let b of bullets)
ctx.fillRect(b.x,b.y,4,10)

/* 敵 */

for(let e of enemies)
drawSprite(enemySprite,e.x,e.y,6,"red")

/* 敵弾 */

ctx.fillStyle="orange"

for(let b of enemyBullets){

ctx.beginPath()
ctx.arc(b.x,b.y,4,0,Math.PI*2)
ctx.fill()

}

/* アイテム */

ctx.fillStyle="lime"

for(let it of items)
ctx.fillRect(it.x,it.y,10,10)

/* 爆発 */

ctx.fillStyle="yellow"

for(let ex of explosions){

ctx.fillRect(ex.x,ex.y,3,3)

}

/* ボス */

if(boss){

drawSprite(bossSprite,boss.x,boss.y,10,"purple")

ctx.fillStyle="white"
ctx.fillText("BOSS HP:"+boss.hp,350,20)

}

/* HPバー */

ctx.fillStyle="red"
ctx.fillRect(20,20,200,10)

ctx.fillStyle="lime"
ctx.fillRect(20,20,200*(player.hp/player.maxHp),10)

/* フェーズバー */

ctx.fillStyle="gray"
ctx.fillRect(20,40,200,8)

ctx.fillStyle="cyan"

let progress=enemiesKilled/enemiesTotal

ctx.fillRect(20,40,200*progress,8)

/* 表示 */

ctx.fillStyle="white"
ctx.fillText("PHASE "+phase,20,70)

/* 終了 */

if(gameState=="gameover"){

ctx.font="50px sans-serif"
ctx.fillText("GAME OVER",260,300)

}

if(gameState=="clear"){

ctx.font="50px sans-serif"
ctx.fillText("GAME CLEAR!",250,300)

}

}

/* ループ */

function loop(){

update()
draw()

requestAnimationFrame(loop)

}

loop()

</script>

</body>
</html>
