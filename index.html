<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Retro Danmaku</title>

<style>
body{
background:black;
color:white;
text-align:center;
font-family:monospace;
}

canvas{
background:black;
border:2px solid white;
}

</style>
</head>

<body>

<h2>RETRO DANMAKU</h2>
<canvas id="game" width="480" height="640"></canvas>
<p>矢印キー移動 / SPACE射撃（長押しで溜め）</p>

<script>

const canvas=document.getElementById("game")
const ctx=canvas.getContext("2d")

let keys={}
document.addEventListener("keydown",e=>keys[e.key]=true)
document.addEventListener("keyup",e=>keys[e.key]=false)

let state="start"

let stars=[]

for(let i=0;i<100;i++){
stars.push({
x:Math.random()*480,
y:Math.random()*640,
s:Math.random()*2+1
})
}

let player={
x:220,
y:560,
size:48,
hp:100,
max:100
}

let bullets=[]
let enemyBullets=[]
let enemies=[]

let phase=1
let phaseProgress=0
let phaseMax=15

let boss=null

let shotCool=0
let charge=0

function spawnEnemy(){

if(boss)return

enemies.push({
x:Math.random()*420,
y:Math.random()*200,
size:60,
hp:2,
dir:Math.random()<0.5?-1:1,
cool:60
})

}

function spawnBoss(){

boss={
x:180,
y:60,
size:120,
hp:200,
max:200,
cool:0
}

}

function update(){

if(state!="play")return

/* player move */

if(keys["ArrowLeft"])player.x-=4
if(keys["ArrowRight"])player.x+=4
if(keys["ArrowUp"])player.y-=4
if(keys["ArrowDown"])player.y+=4

player.x=Math.max(0,Math.min(480-player.size,player.x))
player.y=Math.max(0,Math.min(640-player.size,player.y))

/* shooting */

if(keys[" "]){
charge++
}else{

if(charge>25){

bullets.push({
x:player.x+24,
y:player.y,
vy:-8,
size:14,
power:4,
pierce:true
})

}else if(charge>0 && shotCool<=0){

bullets.push({
x:player.x+24,
y:player.y,
vy:-8,
size:6,
power:1
})

shotCool=30
}

charge=0
}

if(shotCool>0)shotCool--

/* bullets move */

for(let b of bullets) b.y+=b.vy
bullets=bullets.filter(b=>b.y>-20)

/* enemy */

for(let e of enemies){

e.x+=e.dir*1.5

if(e.x<0||e.x>420)e.dir*=-1

e.cool--

if(e.cool<0){

enemyBullets.push({
x:e.x+30,
y:e.y+30,
vy:3
})

e.cool=80
}

}

/* boss */

if(boss){

boss.cool--

if(boss.cool<0){

for(let i=0;i<12;i++){

let a=i*Math.PI*2/12

enemyBullets.push({
x:boss.x+60,
y:boss.y+60,
vx:Math.cos(a)*2,
vy:Math.sin(a)*2
})

}

boss.cool=60
}

}

/* enemy bullets */

for(let b of enemyBullets){

b.x+=b.vx||0
b.y+=b.vy

}

enemyBullets=enemyBullets.filter(b=>b.y<660)

/* hit */

for(let b of bullets){

for(let e of enemies){

if(Math.abs(b.x-(e.x+30))<30 &&
Math.abs(b.y-(e.y+30))<30){

e.hp-=b.power

if(!b.pierce)b.y=-100

if(e.hp<=0){

phaseProgress++
enemies.splice(enemies.indexOf(e),1)

}

}

}

if(boss){

if(Math.abs(b.x-(boss.x+60))<60 &&
Math.abs(b.y-(boss.y+60))<60){

boss.hp-=b.power

if(!b.pierce)b.y=-100

}

}

}

/* player hit */

for(let b of enemyBullets){

if(Math.abs(b.x-(player.x+24))<24 &&
Math.abs(b.y-(player.y+24))<24){

player.hp-=5
b.y=700

}

}

if(player.hp<=0){
state="gameover"
}

/* phase */

if(!boss){

if(enemies.length<phase+2)spawnEnemy()

if(phaseProgress>=phaseMax){

phase++
phaseProgress=0
phaseMax+=10

if(phase==5||phase==10){
spawnBoss()
}

}

}

/* boss defeat */

if(boss && boss.hp<=0){

boss=null
phase++

}

}

/* star bg */

function drawStars(){

ctx.fillStyle="white"

for(let s of stars){

ctx.fillRect(s.x,s.y,s.s,s.s)

s.y+=s.s

if(s.y>640){
s.y=0
s.x=Math.random()*480
}

}

}

/* player */

function drawPlayer(){

ctx.fillStyle="cyan"

ctx.fillRect(player.x+20,player.y,8,48)
ctx.fillRect(player.x,player.y+16,48,8)
ctx.fillRect(player.x+8,player.y+24,32,8)

}

/* enemy */

function drawEnemy(e){

ctx.fillStyle="red"

ctx.fillRect(e.x,e.y,60,10)
ctx.fillRect(e.x+10,e.y+10,40,10)
ctx.fillRect(e.x,e.y+20,60,10)
ctx.fillRect(e.x+10,e.y+30,10,10)
ctx.fillRect(e.x+40,e.y+30,10,10)

}

/* boss */

function drawBoss(){

ctx.fillStyle="purple"

ctx.fillRect(boss.x,boss.y,120,20)
ctx.fillRect(boss.x+20,boss.y+20,80,20)
ctx.fillRect(boss.x,boss.y+40,120,20)

}

/* bullets */

function drawBullets(){

ctx.fillStyle="yellow"

for(let b of bullets){

ctx.beginPath()
ctx.arc(b.x,b.y,b.size,0,Math.PI*2)
ctx.fill()

}

ctx.fillStyle="orange"

for(let b of enemyBullets){

ctx.beginPath()
ctx.arc(b.x,b.y,4,0,Math.PI*2)
ctx.fill()

}

}

/* UI */

function drawUI(){

ctx.strokeStyle="white"

ctx.strokeRect(10,10,200,10)

ctx.fillStyle="lime"
ctx.fillRect(10,10,200*(player.hp/player.max),10)

ctx.strokeRect(270,10,200,10)

ctx.fillStyle="orange"
ctx.fillRect(270,10,200*(phaseProgress/phaseMax),10)

ctx.fillStyle="white"
ctx.fillText("PHASE "+phase,200,40)

if(boss){

ctx.strokeRect(140,60,200,10)

ctx.fillStyle="red"
ctx.fillRect(140,60,200*(boss.hp/boss.max),10)

}

}

/* draw */

function draw(){

ctx.clearRect(0,0,480,640)

drawStars()

if(state=="start"){

ctx.font="30px monospace"
ctx.fillText("RETRO DANMAKU",110,260)

ctx.font="16px monospace"
ctx.fillText("PRESS SPACE",170,320)

if(keys[" "])state="play"

return
}

if(state=="gameover"){

ctx.font="40px monospace"
ctx.fillText("GAME OVER",120,300)

return
}

drawPlayer()

for(let e of enemies)drawEnemy(e)

if(boss)drawBoss()

drawBullets()

drawUI()

}

function loop(){

update()
draw()

requestAnimationFrame(loop)

}

loop()

</script>

</body>
</html>
