<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>Touhou Style Invader</title>
<style>
body{margin:0;background:#000;color:white;font-family:sans-serif;text-align:center}
canvas{background:#000;display:block;margin:auto;border:2px solid #444}
#ui{width:800px;margin:auto}
.bar{height:10px;background:#333;margin:4px 0}
.fill{height:100%;background:#0f0}
button{padding:10px 20px;margin:10px;font-size:16px}
</style>
</head>
<body>

<div id="menu">
<h1>TOUHOU STYLE INVADER</h1>
<p>← → 移動 / SPACE 攻撃 / P Pause</p>
<button onclick="startGame()">START GAME</button>
</div>

<div id="game" style="display:none">
<div id="ui">
HP
<div class="bar"><div id="hp" class="fill" style="width:100%"></div></div>
Score <span id="score">0</span>
Phase <span id="phase">1</span>
</div>

<canvas id="c" width="800" height="600"></canvas>
</div>

<script>
const canvas=document.getElementById('c')
const ctx=canvas.getContext('2d')

let gameRunning=false
let paused=false

let player={x:400,y:540,hp:100}
let bullets=[]
let enemyBullets=[]
let enemies=[]
let explosions=[]
let items=[]

let phase=1
let score=0

const keys={}

document.addEventListener('keydown',e=>{
keys[e.key]=true
if(e.key==='p' || e.key==='P') paused=!paused
})

document.addEventListener('keyup',e=>keys[e.key]=false)

function startGame(){
document.getElementById('menu').style.display='none'
document.getElementById('game').style.display='block'
spawnPhase()
gameRunning=true
loop()
}

function spawnPhase(){
enemies=[]

if(phase<10){
for(let i=0;i<5+phase;i++){
enemies.push({
x:100+i*80,
y:80,
hp:10,
t:Math.random()*100
})
}
}else{
// boss
 enemies.push({x:400,y:120,hp:400,boss:true,t:0})
}
}

function shoot(){
bullets.push({x:player.x,y:player.y,v:8})
}

document.addEventListener('keydown',e=>{
if(e.code==='Space') shoot()
})

function explosion(x,y){
for(let i=0;i<12;i++){
explosions.push({
x,y,
vx:(Math.random()-0.5)*4,
vy:(Math.random()-0.5)*4,
life:30
})
}
}

function update(){
if(!gameRunning||paused) return

if(keys['ArrowLeft']) player.x-=5
if(keys['ArrowRight']) player.x+=5

player.x=Math.max(20,Math.min(780,player.x))

bullets.forEach(b=>b.y-=b.v)
bullets=bullets.filter(b=>b.y>-10)

// enemies
for(let e of enemies){
e.t+=0.05

if(e.boss){
e.x=400+Math.sin(e.t)*200

if(Math.random()<0.3){
for(let a=0;a<6.28;a+=0.4){
enemyBullets.push({x:e.x,y:e.y,vx:Math.cos(a)*2,vy:Math.sin(a)*2})
}
}

}else{
e.x+=Math.sin(e.t)*2

if(Math.random()<0.02){
enemyBullets.push({x:e.x,y:e.y,vx:0,vy:3})
}
}
}

// enemy bullets
for(let b of enemyBullets){
b.x+=b.vx
b.y+=b.vy

if(Math.hypot(b.x-player.x,b.y-player.y)<6){
player.hp-=5
b.y=999
}
}

enemyBullets=enemyBullets.filter(b=>b.y<620)

// collisions
for(let b of bullets){
for(let e of enemies){
if(Math.hypot(b.x-e.x,b.y-e.y)<15){
e.hp--
b.y=-100

if(e.hp<=0){
explosion(e.x,e.y)
score+=100

if(Math.random()<0.3){
items.push({x:e.x,y:e.y})
}

e.dead=true
}
}
}

enemies=enemies.filter(e=>!e.dead)

// items
items.forEach(i=>{
i.y+=2

if(Math.hypot(i.x-player.x,i.y-player.y)<20){
player.hp=Math.min(100,player.hp+20)
i.y=999
}
})
items=items.filter(i=>i.y<620)

// explosions
explosions.forEach(ex=>{
ex.x+=ex.vx
ex.y+=ex.vy
ex.life--
})
explosions=explosions.filter(e=>e.life>0)

// phase clear
if(enemies.length===0){
phase++
if(phase<=10) spawnPhase()
}

// UI

document.getElementById('hp').style.width=player.hp+'%'
document.getElementById('score').textContent=score

document.getElementById('phase').textContent=phase

if(player.hp<=0){
alert('GAME OVER')
location.reload()
}

if(phase>10){
alert('GAME CLEAR!')
location.reload()
}
}

function draw(){
ctx.clearRect(0,0,800,600)

// player
ctx.fillStyle='cyan'
ctx.fillRect(player.x-10,player.y-10,20,20)

// bullets
ctx.fillStyle='white'
bullets.forEach(b=>ctx.fillRect(b.x,b.y,3,10))

// enemies
ctx.fillStyle='red'
enemies.forEach(e=>ctx.fillRect(e.x-12,e.y-12,24,24))

// enemy bullets
ctx.fillStyle='yellow'
enemyBullets.forEach(b=>ctx.fillRect(b.x,b.y,5,5))

// items
ctx.fillStyle='lime'
items.forEach(i=>ctx.fillRect(i.x-6,i.y-6,12,12))

// explosions
ctx.fillStyle='orange'
explosions.forEach(ex=>ctx.fillRect(ex.x,ex.y,4,4))

if(paused){
ctx.fillStyle='white'
ctx.font='40px sans-serif'
ctx.fillText('PAUSE',340,300)
}
}

function loop(){
update()
draw()
requestAnimationFrame(loop)
}

</script>

</body>
</html>
