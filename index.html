<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>インベーダーゲーム</title>

<style>
body{
background:black;
color:white;
text-align:center;
font-family:sans-serif;
}

canvas{
background:#111;
border:2px solid white;
image-rendering: pixelated;
}
</style>

</head>
<body>

<h2>インベーダーゲーム</h2>

<p>
スコア: <span id="score">0</span>
ダメージ: <span id="damage">0</span>/10
</p>

<p>← → 移動 / スペース 攻撃</p>

<canvas id="game" width="500" height="600"></canvas>

<script>

const canvas=document.getElementById("game");
const ctx=canvas.getContext("2d");

let player={x:240,y:560};

let bullets=[];
let enemyBullets=[];
let enemies=[];
let explosions=[];

let score=0;
let damage=0;

let enemyDir=1;

let gameOver=false;

let lastShot=0;
let shotCooldown=80;

function createEnemies(){

enemies=[];

for(let i=0;i<7;i++){
for(let j=0;j<3;j++){

enemies.push({
x:80+i*50,
y:50+j*40
});

}
}

}

createEnemies();

document.addEventListener("keydown",e=>{

if(gameOver)return;

if(e.key==="ArrowLeft") player.x-=30;
if(e.key==="ArrowRight") player.x+=30;

if(e.key===" "){

let now=Date.now();

if(now-lastShot>shotCooldown){

bullets.push({x:player.x+10,y:player.y});
lastShot=now;

}

}

});

function update(){

if(gameOver)return;

bullets.forEach(b=>b.y-=9);
enemyBullets.forEach(b=>b.y+=3);

let moveDown=false;

enemies.forEach(e=>{

e.x+=enemyDir;

if(e.x<0||e.x>470){
moveDown=true;
}

if(Math.random()<0.004){

enemyBullets.push({
x:e.x+10,
y:e.y+15
});

}

});

if(moveDown){

enemyDir*=-1;

enemies.forEach(e=>e.y+=20);

}

bullets.forEach((b,bi)=>{

enemies.forEach((e,ei)=>{

if(
b.x<e.x+20 &&
b.x+4>e.x &&
b.y<e.y+20 &&
b.y+10>e.y
){

createExplosion(e.x+10,e.y+10);

enemies.splice(ei,1);
bullets.splice(bi,1);

score+=100;
document.getElementById("score").textContent=score;

}

});

});

enemyBullets.forEach((b,bi)=>{

if(
b.x<player.x+20 &&
b.x+4>player.x &&
b.y<player.y+20 &&
b.y+10>player.y
){

enemyBullets.splice(bi,1);

damage++;

document.getElementById("damage").textContent=damage;

if(damage>=10){
gameOver=true;
}

}

});

explosions.forEach((ex,i)=>{

ex.life--;

ex.particles.forEach(p=>{
p.x+=p.vx;
p.y+=p.vy;
});

if(ex.life<=0){
explosions.splice(i,1);
}

});

}

function createExplosion(x,y){

let particles=[];

for(let i=0;i<12;i++){

particles.push({
x:x,
y:y,
vx:(Math.random()-0.5)*4,
vy:(Math.random()-0.5)*4
});

}

explosions.push({
particles:particles,
life:20
});

}

function drawPixelArt(x,y,pattern,color){

ctx.fillStyle=color;

for(let r=0;r<pattern.length;r++){
for(let c=0;c<pattern[r].length;c++){

if(pattern[r][c]==1){

ctx.fillRect(x+c*3,y+r*3,3,3);

}

}
}

}

const playerSprite=[
[0,1,0],
[1,1,1],
[1,1,1]
];

const enemySprite=[
[1,0,1],
[1,1,1],
[0,1,0]
];

function draw(){

ctx.clearRect(0,0,500,600);

drawPixelArt(player.x,player.y,playerSprite,"lime");

bullets.forEach(b=>{
ctx.fillStyle="yellow";
ctx.fillRect(b.x,b.y,3,8);
});

enemyBullets.forEach(b=>{
ctx.fillStyle="white";
ctx.fillRect(b.x,b.y,3,8);
});

enemies.forEach(e=>{
drawPixelArt(e.x,e.y,enemySprite,"red");
});

explosions.forEach(ex=>{

ctx.fillStyle="orange";

ex.particles.forEach(p=>{
ctx.fillRect(p.x,p.y,3,3);
});

});

if(gameOver){

ctx.fillStyle="white";
ctx.font="50px sans-serif";
ctx.fillText("GAME OVER",120,300);

}

}

function loop(){

update();
draw();

requestAnimationFrame(loop);

}

loop();

</script>

</body>
</html>
