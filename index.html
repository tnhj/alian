<!DOCTYPE html>

<html>
<head>
<meta charset="UTF-8">
<title>Danmaku Invader</title>
<style>
body{margin:0;background:black;overflow:hidden}
canvas{display:block;margin:auto;background:black}
</style>
</head>

<body>

<canvas id="game"></canvas>

<script>

const canvas=document.getElementById("game")
const ctx=canvas.getContext("2d")

canvas.width=600
canvas.height=700

let keys={}
document.addEventListener("keydown",e=>keys[e.key]=true)
document.addEventListener("keyup",e=>keys[e.key]=false)

let phase=1
let frame=0

let player={
x:300,
y:620,
speed:4,
cool:0,
hp:100,
maxHp:100,
power:1
}

let bullets=[]
let enemyBullets=[]
let enemies=[]
let boss=null
let items=[]
let effects=[]

function spawnWave(){

let count=3+phase*2

for(let i=0;i<count;i++){

enemies.push({

x:Math.random()*560+20,
y:Math.random()*260+30,

vx:(Math.random()*2-1)*(1+phase*0.2),
vy:(Math.random()*2-1)*(1+phase*0.2),

hp:3+phase,
type:"small"

})

}

if(phase==4||phase==7||phase==9){

enemies.push({

x:300,
y:120,
vx:2,
vy:1,
hp:120,
type:"mid"

})

}

}

function spawnBoss(){

boss={
x:300,
y:120,
vx:3,
vy:2,
hp:800,
phase:1
}

}

function nextPhase(){

phase++
frame=0
enemyBullets=[]
enemies=[]

if(phase<10){
spawnWave()
}else{
spawnBoss()
}

}

function shootFlower(x,y,count,speed){

for(let i=0;i<count;i++){

let a=i*(Math.PI*2/count)

enemyBullets.push({
x:x,
y:y,
vx:Math.cos(a)*speed,
vy:Math.sin(a)*speed
})

}

}

function shootSpiral(x,y,rot){

for(let i=0;i<8;i++){

let a=rot+i*0.8

enemyBullets.push({

x:x,
y:y,
vx:Math.cos(a)*2,
vy:Math.sin(a)*2

})

}

}

function playerShoot(){

if(player.cool>0)return

for(let i=0;i<player.power;i++){

bullets.push({
x:player.x+(i*10)-(player.power*5),
y:player.y,
vy:-8
})

}

player.cool=15

}

function explode(x,y){

for(let i=0;i<10;i++){

effects.push({

x:x,
y:y,
vx:(Math.random()*4-2),
vy:(Math.random()*4-2),
life:30

})

}

}

function update(){

frame++

if(keys["ArrowLeft"])player.x-=player.speed
if(keys["ArrowRight"])player.x+=player.speed
if(keys["ArrowUp"])player.y-=player.speed
if(keys["ArrowDown"])player.y+=player.speed

if(keys[" "])playerShoot()

player.cool--

player.x=Math.max(10,Math.min(canvas.width-10,player.x))
player.y=Math.max(360,Math.min(canvas.height-10,player.y))

bullets.forEach(b=>b.y+=b.vy)

enemyBullets.forEach(b=>{
b.x+=b.vx
b.y+=b.vy
})

enemies.forEach(e=>{

e.x+=e.vx
e.y+=e.vy

if(e.x<20||e.x>580)e.vx*=-1
if(e.y<20||e.y>320)e.vy*=-1

if(frame%(100-phase*4)==0){

if(e.type=="small"){
shootFlower(e.x,e.y,6+phase,2)
}

if(e.type=="mid"){
shootFlower(e.x,e.y,16,2)
shootSpiral(e.x,e.y,frame*0.05)
}

}

})

if(boss){

boss.x+=boss.vx
boss.y+=boss.vy

if(boss.x<60||boss.x>540)boss.vx*=-1
if(boss.y<40||boss.y>260)boss.vy*=-1

if(boss.phase==1){

if(frame%50==0){
shootFlower(boss.x,boss.y,30,2)
}

if(frame%120==0){

enemyBullets.push({
x:boss.x,
y:boss.y,
vx:0,
vy:3,
split:true
})

}

if(boss.hp<400){
boss.phase=2
}

}else{

if(frame%40==0){
shootFlower(boss.x,boss.y,40,3)
}

if(frame%200==0){

enemies.push({

x:boss.x,
y:boss.y,
vx:2,
vy:1,
hp:5,
type:"small"

})

}

}

}

bullets.forEach((b,bi)=>{

enemies.forEach((e,ei)=>{

if(Math.hypot(b.x-e.x,b.y-e.y)<14){

e.hp--
bullets.splice(bi,1)

if(e.hp<=0){

explode(e.x,e.y)

if(Math.random()<0.2){

items.push({
x:e.x,
y:e.y,
type:Math.random()<0.5?"heal":"power"
})

}

enemies.splice(ei,1)

}

}

})

if(boss){

if(Math.hypot(b.x-boss.x,b.y-boss.y)<40){

boss.hp--
bullets.splice(bi,1)

if(boss.hp<=0){

alert("GAME CLEAR")
location.reload()

}

}

}

})

enemyBullets.forEach((b,i)=>{

if(b.split && b.y>350){

b.split=false
shootFlower(b.x,b.y,10,2)

}

if(Math.hypot(b.x-player.x,b.y-player.y)<8){

player.hp-=10
enemyBullets.splice(i,1)

if(player.hp<=0){

alert("GAME OVER")
location.reload()

}

}

})

items.forEach((it,i)=>{

it.y+=2

if(Math.hypot(it.x-player.x,it.y-player.y)<15){

if(it.type=="heal"){

player.hp=Math.min(player.maxHp,player.hp+30)

}else{

player.power=Math.min(5,player.power+1)

}

items.splice(i,1)

}

})

effects.forEach((e,i)=>{

e.x+=e.vx
e.y+=e.vy
e.life--

if(e.life<=0)effects.splice(i,1)

})

if(enemies.length==0 && !boss){

nextPhase()

}

}

function draw(){

ctx.fillStyle="black"
ctx.fillRect(0,0,canvas.width,canvas.height)

ctx.strokeStyle="#333"
ctx.beginPath()
ctx.moveTo(0,350)
ctx.lineTo(600,350)
ctx.stroke()

ctx.fillStyle="cyan"
ctx.fillRect(player.x-6,player.y-6,12,12)

ctx.fillStyle="yellow"
bullets.forEach(b=>{
ctx.fillRect(b.x-2,b.y-8,4,8)
})

ctx.fillStyle="red"
enemyBullets.forEach(b=>{
ctx.beginPath()
ctx.arc(b.x,b.y,3,0,Math.PI*2)
ctx.fill()
})

ctx.fillStyle="orange"
enemies.forEach(e=>{
ctx.beginPath()
ctx.arc(e.x,e.y,12,0,Math.PI*2)
ctx.fill()
})

if(boss){

ctx.fillStyle="purple"
ctx.beginPath()
ctx.arc(boss.x,boss.y,45,0,Math.PI*2)
ctx.fill()

}

ctx.fillStyle="lime"
items.forEach(i=>{
ctx.fillRect(i.x-6,i.y-6,12,12)
})

ctx.fillStyle="white"
effects.forEach(e=>{
ctx.fillRect(e.x,e.y,2,2)
})

ctx.fillStyle="white"
ctx.font="18px Arial"

ctx.fillText("PHASE "+phase+" / 10",10,20)
ctx.fillText("ENEMIES "+enemies.length,10,40)

ctx.fillText("HP",470,20)

ctx.fillStyle="red"
ctx.fillRect(500,10,80,10)

ctx.fillStyle="lime"
ctx.fillRect(500,10,80*(player.hp/player.maxHp),10)

}

function loop(){

update()
draw()
requestAnimationFrame(loop)

}

spawnWave()
loop()

</script>

</body>
</html>
