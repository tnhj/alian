<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Dot Danmaku Shooter</title>
<style>
body{margin:0;background:black;color:white;text-align:center;font-family:sans-serif}
canvas{display:block;margin:auto;background:#111;image-rendering:pixelated}
</style>
</head>

<body>
<canvas id="game" width="800" height="600"></canvas>

<script>

const canvas=document.getElementById("game")
const ctx=canvas.getContext("2d")

let keys={}
document.addEventListener("keydown",e=>keys[e.key]=true)
document.addEventListener("keyup",e=>keys[e.key]=false)

let gameState="title"

let player={x:380,y:540,hp:100,maxHp:100,cool:0}

let bullets=[]
let enemies=[]
let enemyBullets=[]
let items=[]
let explosions=[]

let boss=null

let phase=1
let enemiesTotal=0
let enemiesKilled=0

/* ドット絵 */

const playerSprite=["00100","01110","11111","10101","00100"]
const enemySprite=["01110","11111","10101","11111","01010"]
const bossSprite=[
"00111100",
"11111111",
"11011011",
"11111111",
"10111101",
"11100111",
"01111110",
"00111100"
]

function drawSprite(sprite,x,y,size,color){
for(let r=0;r<sprite.length;r++){
for(let c=0;c<sprite[r].length;c++){
if(sprite[r][c]=="1"){
ctx.fillStyle=color
ctx.fillRect(x+c*size,y+r*size,size,size)
}
}
}
}

/* 敵 */

function spawnEnemies(){
let count=phase*4
enemies=[]
enemiesKilled=0
enemiesTotal=count

for(let i=0;i<count;i++){
enemies.push({
x:Math.random()*760,
y:Math.random()*200,
dx:(Math.random()-0.5)*2,
dy:(Math.random()-0.5)*2
})
}
}

/* ボス */

function spawnBoss(){
boss={
x:360,
y:80,
hp:800,
maxHp:800,
phase:1,
cool:0,
moveX:3,
moveY:2
}
}

/* 爆発 */

function explode(x,y){
for(let i=0;i<12;i++){
explosions.push({
x:x,y:y,
dx:(Math.random()-0.5)*5,
dy:(Math.random()-0.5)*5,
life:25
})
}
}

/* 更新 */

function update(){

if(gameState=="title"){
if(keys["Enter"]){
gameState="play"
spawnEnemies()
}
return
}

/* 移動 */

if(keys["ArrowLeft"])player.x-=6
if(keys["ArrowRight"])player.x+=6
player.x=Math.max(0,Math.min(770,player.x))

/* 攻撃 */

player.cool--
if(keys[" "] && player.cool<=0){
bullets.push({x:player.x+15,y:player.y})
player.cool=15
}

for(let b of bullets)b.y-=8
bullets=bullets.filter(b=>b.y>-20)

/* 敵 */

for(let e of enemies){

e.x+=e.dx
e.y+=e.dy

if(e.x<0||e.x>770)e.dx*=-1
if(e.y<0||e.y>300)e.dy*=-1

if(Math.random()<0.01+phase*0.003){
enemyBullets.push({x:e.x+15,y:e.y+15,dy:3+phase*0.2})
}
}

/* 敵被弾 */

for(let i=enemies.length-1;i>=0;i--){
let e=enemies[i]

for(let j=bullets.length-1;j>=0;j--){
let b=bullets[j]

if(b.x>e.x&&b.x<e.x+30&&b.y>e.y&&b.y<e.y+30){

explode(e.x,e.y)

if(Math.random()<0.25){
items.push({x:e.x,y:e.y})
}

enemies.splice(i,1)
bullets.splice(j,1)
enemiesKilled++
break
}
}
}

/* 敵弾 */

for(let b of enemyBullets){
if(b.dx){
b.x+=b.dx
b.y+=b.dy

if(b.x<0||b.x>800)b.dx*=-1
}else{
b.y+=b.dy
}
}

enemyBullets=enemyBullets.filter(b=>b.y<650)

/* プレイヤー被弾 */

for(let b of enemyBullets){
if(b.x>player.x&&b.x<player.x+30&&b.y>player.y&&b.y<player.y+30){
player.hp-=5
explode(player.x,player.y)
b.y=999
}
}

if(player.hp<=0)gameState="gameover"

/* アイテム */

for(let it of items){
it.y+=2
if(it.x>player.x&&it.x<player.x+30&&it.y>player.y&&it.y<player.y+30){
player.hp=Math.min(player.maxHp,player.hp+20)
it.y=700
}
}

items=items.filter(i=>i.y<620)

/* 爆発 */

for(let e of explosions){
e.x+=e.dx
e.y+=e.dy
e.life--
}

explosions=explosions.filter(e=>e.life>0)

/* フェーズ */

if(enemiesKilled>=enemiesTotal && !boss){
phase++
if(phase==10)spawnBoss()
else spawnEnemies()
}

/* =================
ボス
================= */

if(boss){

/* 第二形態 */

if(boss.hp<boss.maxHp/2 && boss.phase==1){
boss.phase=2
}

/* 移動 */

boss.x+=boss.moveX
boss.y+=boss.moveY

if(boss.x<0||boss.x>720)boss.moveX*=-1
if(boss.y<0||boss.y>200)boss.moveY*=-1

boss.cool--

/* 第一形態攻撃 */

if(boss.phase==1){

if(boss.cool<=0){

/* 円形弾幕 */

for(let i=0;i<24;i++){

let a=Math.PI*2/24*i

enemyBullets.push({
x:boss.x+40,
y:boss.y+40,
dx:Math.cos(a)*3,
dy:Math.sin(a)*3
})

}

/* 分裂弾 */

enemyBullets.push({
x:boss.x+40,
y:boss.y+40,
dx:0,
dy:5,
split:true
})

/* 子分 */

if(Math.random()<0.3)spawnEnemies()

boss.cool=50
}

}

/* 第二形態 */

else{

if(boss.cool<=0){

/* 超円形弾幕 */

for(let i=0;i<40;i++){

let a=Math.PI*2/40*i

enemyBullets.push({
x:boss.x+40,
y:boss.y+40,
dx:Math.cos(a)*4,
dy:Math.sin(a)*4
})

}

/* 壁反射弾 */

for(let i=0;i<6;i++){

enemyBullets.push({
x:boss.x+40,
y:boss.y+40,
dx:(Math.random()-0.5)*6,
dy:4
})

}

/* 子分大量 */

spawnEnemies()

boss.cool=35

}

}

/* 分裂弾 */

for(let b of enemyBullets){

if(b.split && b.y>350){

b.split=false

for(let i=-2;i<=2;i++){

enemyBullets.push({
x:b.x,
y:b.y,
dx:i,
dy:4
})

}

}

}

/* ボス被弾 */

for(let b of bullets){
if(b.x>boss.x&&b.x<boss.x+80&&b.y>boss.y&&b.y<boss.y+80){
boss.hp-=10
b.y=-20
explode(boss.x+40,boss.y+40)
}
}

if(boss.hp<=0)gameState="clear"

}

/* 描画 */

function draw(){

ctx.clearRect(0,0,800,600)

if(gameState=="title"){
ctx.fillStyle="white"
ctx.font="50px sans-serif"
ctx.fillText("DOT SHOOTER",240,250)
ctx.font="20px sans-serif"
ctx.fillText("PRESS ENTER",320,320)
return
}

/* プレイヤー */

drawSprite(playerSprite,player.x,player.y,6,"cyan")

/* 弾 */

ctx.fillStyle="yellow"
for(let b of bullets)ctx.fillRect(b.x,b.y,4,10)

/* 敵 */

for(let e of enemies)
drawSprite(enemySprite,e.x,e.y,6,"red")

/* 敵弾 */

ctx.fillStyle="orange"
for(let b of enemyBullets){
ctx.beginPath()
ctx.arc(b.x,b.y,4,0,Math.PI*2)
ctx.fill()
}

/* ボス */

if(boss){
drawSprite(bossSprite,boss.x,boss.y,10,"purple")
}

/* 爆発 */

ctx.fillStyle="yellow"
for(let e of explosions){
ctx.fillRect(e.x,e.y,3,3)
}

/* HPバー */

ctx.fillStyle="red"
ctx.fillRect(20,20,200,10)

ctx.fillStyle="lime"
ctx.fillRect(20,20,200*(player.hp/player.maxHp),10)

/* 表示 */

ctx.fillStyle="white"
ctx.fillText("PHASE "+phase,20,60)

if(gameState=="gameover"){
ctx.font="50px sans-serif"
ctx.fillText("GAME OVER",260,300)
}

if(gameState=="clear"){
ctx.font="50px sans-serif"
ctx.fillText("GAME CLEAR!",250,300)
}

}

function loop(){
update()
draw()
requestAnimationFrame(loop)
}

loop()

</script>
</body>
</html>
