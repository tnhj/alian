<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>DOT SHOOTING</title>
<style>
body{margin:0;background:black;color:white;font-family:sans-serif}
canvas{display:block;margin:auto;background:black}
#ui{position:absolute;left:10px;top:10px}
</style>
</head>

<body>

<div id="ui">
HP <span id="hp"></span>
</div>

<canvas id="game" width="480" height="640"></canvas>

<script>

const canvas=document.getElementById("game")
const ctx=canvas.getContext("2d")

let stars=[]
for(let i=0;i<100;i++){
stars.push({x:Math.random()*480,y:Math.random()*640,s:Math.random()*2+1})
}

let player={
x:240,
y:540,
hp:100,
size:24,
charging:false,
charge:0
}

let bullets=[]
let enemies=[]
let enemyBullets=[]
let explosions=[]
let items=[]

function spawnEnemy(){
enemies.push({
x:Math.random()*420+30,
y:Math.random()*200+30,
vx:(Math.random()-0.5)*2,
vy:(Math.random()-0.5)*2,
size:32,
hp:5
})
}

for(let i=0;i<6;i++)spawnEnemy()

document.addEventListener("mousemove",e=>{
const r=canvas.getBoundingClientRect()
player.x=e.clientX-r.left
})

document.addEventListener("keydown",e=>{
if(e.key===" ")player.charging=true
})

document.addEventListener("keyup",e=>{
if(e.key===" "){
if(player.charge>30){
bullets.push({x:player.x,y:player.y,v:10,size:14,pierce:true})
}else{
bullets.push({x:player.x,y:player.y,v:8,size:6})
}
player.charge=0
player.charging=false
}
})

function explosion(x,y){
explosions.push({x,y,t:20})
}

function update(){

if(player.charging)player.charge++

stars.forEach(s=>{
s.y+=s.s
if(s.y>640)s.y=0
})

bullets.forEach((b,i)=>{
b.y-=b.v
if(b.y<0)bullets.splice(i,1)
})

enemies.forEach((e,ei)=>{

e.x+=e.vx
e.y+=e.vy

if(e.x<20||e.x>460)e.vx*=-1
if(e.y<20||e.y>300)e.vy*=-1

if(Math.random()<0.02){
enemyBullets.push({
x:e.x,
y:e.y,
vx:(Math.random()-0.5)*4,
vy:3,
size:6
})
}

bullets.forEach((b,bi)=>{
if(Math.hypot(b.x-e.x,b.y-e.y)<20){
e.hp--
if(!b.pierce)bullets.splice(bi,1)
if(e.hp<=0){
explosion(e.x,e.y)
if(Math.random()<0.2)items.push({x:e.x,y:e.y})
enemies.splice(ei,1)
spawnEnemy()
}
}
})

})

enemyBullets.forEach((b,i)=>{
b.x+=b.vx
b.y+=b.vy

if(Math.hypot(b.x-player.x,b.y-player.y)<15){
player.hp-=5
enemyBullets.splice(i,1)
}

if(b.y>640)enemyBullets.splice(i,1)
})

items.forEach((it,i)=>{
it.y+=2
if(Math.hypot(it.x-player.x,it.y-player.y)<20){
player.hp=Math.min(100,player.hp+20)
items.splice(i,1)
}
})

explosions.forEach((e,i)=>{
e.t--
if(e.t<=0)explosions.splice(i,1)
})

document.getElementById("hp").innerText=player.hp

}

function draw(){

ctx.clearRect(0,0,480,640)

ctx.fillStyle="white"
stars.forEach(s=>ctx.fillRect(s.x,s.y,2,2))

// PLAYER DOT
ctx.fillStyle="cyan"
ctx.fillRect(player.x-12,player.y-12,24,24)
ctx.fillStyle="blue"
ctx.fillRect(player.x-6,player.y-20,12,12)

// BULLETS
ctx.fillStyle="yellow"
bullets.forEach(b=>{
ctx.beginPath()
ctx.arc(b.x,b.y,b.size,0,Math.PI*2)
ctx.fill()
})

// ENEMY BULLETS
ctx.fillStyle="red"
enemyBullets.forEach(b=>{
ctx.beginPath()
ctx.arc(b.x,b.y,b.size,0,Math.PI*2)
ctx.fill()
})

// ENEMIES
ctx.fillStyle="orange"
enemies.forEach(e=>{
ctx.fillRect(e.x-16,e.y-16,32,32)
})

// ITEMS
ctx.fillStyle="lime"
items.forEach(it=>{
ctx.fillRect(it.x-6,it.y-6,12,12)
})

// EXPLOSIONS
ctx.fillStyle="yellow"
explosions.forEach(e=>{
ctx.globalAlpha=e.t/20
ctx.fillRect(e.x-20,e.y-20,40,40)
ctx.globalAlpha=1
})

}

function loop(){
update()
draw()
requestAnimationFrame(loop)
}

loop()

</script>
</body>
</html>
