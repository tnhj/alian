<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Dot Shooting Game</title>

<style>
body{
margin:0;
background:black;
color:white;
text-align:center;
font-family:sans-serif;
}

canvas{
background:#111;
display:block;
margin:auto;
image-rendering:pixelated;
}
</style>
</head>

<body>

<h2>Dot Shooting Game</h2>

<canvas id="game" width="800" height="600"></canvas>

<script>

const canvas=document.getElementById("game")
const ctx=canvas.getContext("2d")

let keys={}

document.addEventListener("keydown",e=>keys[e.key]=true)
document.addEventListener("keyup",e=>keys[e.key]=false)

let player={
x:380,
y:540,
hp:100,
cool:0
}

let bullets=[]
let enemies=[]
let enemyBullets=[]
let boss=null

let phase=1
let enemiesLeft=0
let gameOver=false

/* =======================
ドット絵
======================= */

const playerSprite=[
"00100",
"01110",
"11111",
"10101",
"00100"
]

const enemySprite=[
"01110",
"11111",
"10101",
"11111",
"01010"
]

const bossSprite=[
"00111100",
"11111111",
"11011011",
"11111111",
"10111101",
"11100111",
"01111110",
"00111100"
]

function drawSprite(sprite,x,y,size,color){

for(let row=0;row<sprite.length;row++){
for(let col=0;col<sprite[row].length;col++){

if(sprite[row][col]=="1"){

ctx.fillStyle=color
ctx.fillRect(
x+col*size,
y+row*size,
size,
size
)

}

}
}

}

/* =======================
敵生成
======================= */

function spawnEnemies(){

let count=phase*4

for(let i=0;i<count;i++){

enemies.push({

x:Math.random()*760,
y:Math.random()*200,
dx:(Math.random()-0.5)*2,
dy:Math.random()*1.5,
size:30

})

}

enemiesLeft=count

}

/* =======================
ボス生成
======================= */

function spawnBoss(){

boss={
x:350,
y:80,
hp:400,
cool:0
}

}

/* =======================
更新
======================= */

function update(){

if(gameOver)return

/* プレイヤー移動 */

if(keys["ArrowLeft"]) player.x-=6
if(keys["ArrowRight"]) player.x+=6

player.x=Math.max(0,Math.min(770,player.x))

/* 弾 */

player.cool--

if(keys[" "] && player.cool<=0){

bullets.push({
x:player.x+10,
y:player.y
})

player.cool=18
}

for(let b of bullets){
b.y-=8
}

bullets=bullets.filter(b=>b.y>-20)

/* 敵 */

for(let e of enemies){

e.x+=e.dx
e.y+=e.dy

if(e.x<0||e.x>770)e.dx*=-1
if(e.y<0||e.y>300)e.dy*=-1

if(Math.random()<0.01+phase*0.003){

enemyBullets.push({
x:e.x+15,
y:e.y+15,
dy:3+phase*0.2
})

}

}

/* 敵被弾 */

for(let i=enemies.length-1;i>=0;i--){

let e=enemies[i]

for(let j=bullets.length-1;j>=0;j--){

let b=bullets[j]

if(
b.x>e.x &&
b.x<e.x+30 &&
b.y>e.y &&
b.y<e.y+30
){

enemies.splice(i,1)
bullets.splice(j,1)

enemiesLeft--

break

}

}

}

/* 敵弾 */

for(let b of enemyBullets){
b.y+=b.dy
}

enemyBullets=enemyBullets.filter(b=>b.y<620)

/* プレイヤー被弾 */

for(let b of enemyBullets){

if(
b.x>player.x &&
b.x<player.x+30 &&
b.y>player.y &&
b.y<player.y+30
){

player.hp-=5
b.y=700

}

}

if(player.hp<=0){

gameOver=true

}

/* フェーズクリア */

if(enemiesLeft<=0 && !boss){

phase++

if(phase==10){

spawnBoss()

}else{

spawnEnemies()

}

}

/* ボス */

if(boss){

boss.cool--

boss.x+=Math.sin(Date.now()/400)*2

if(boss.cool<=0){

for(let i=0;i<12;i++){

let angle=(Math.PI*2/12)*i

enemyBullets.push({

x:boss.x+40,
y:boss.y+40,
dx:Math.cos(angle)*3,
dy:Math.sin(angle)*3

})

}

boss.cool=40

}

for(let b of enemyBullets){

if(b.dx){
b.x+=b.dx
b.y+=b.dy
}

}

/* ボス被弾 */

for(let b of bullets){

if(
b.x>boss.x &&
b.x<boss.x+80 &&
b.y>boss.y &&
b.y<boss.y+80
){

boss.hp-=10
b.y=-50

}

}

if(boss.hp<=0){

alert("GAME CLEAR")
gameOver=true

}

}

}

/* =======================
描画
======================= */

function draw(){

ctx.clearRect(0,0,800,600)

/* プレイヤー */

drawSprite(playerSprite,player.x,player.y,6,"cyan")

/* 弾 */

ctx.fillStyle="yellow"
for(let b of bullets){

ctx.fillRect(b.x,b.y,4,10)

}

/* 敵 */

for(let e of enemies){

drawSprite(enemySprite,e.x,e.y,6,"red")

}

/* 敵弾 */

ctx.fillStyle="orange"

for(let b of enemyBullets){

ctx.beginPath()
ctx.arc(b.x,b.y,4,0,Math.PI*2)
ctx.fill()

}

/* ボス */

if(boss){

drawSprite(bossSprite,boss.x,boss.y,10,"purple")

ctx.fillStyle="white"
ctx.fillText("BOSS HP:"+boss.hp,340,20)

}

/* UI */

ctx.fillStyle="white"

ctx.fillText("HP:"+player.hp,20,20)
ctx.fillText("PHASE:"+phase,20,40)

if(gameOver){

ctx.font="40px sans-serif"
ctx.fillText("GAME OVER",300,300)

}

}

/* =======================
ゲーム開始
======================= */

spawnEnemies()

function loop(){

update()
draw()

requestAnimationFrame(loop)

}

loop()

</script>

</body>
</html>
