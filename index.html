<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>Extreme Danmaku Invader Pixel Edition</title>
<style>
body{margin:0;background:#000;color:#fff;font-family:sans-serif;text-align:center}
canvas{background:#000;display:block;margin:auto;border:2px solid #333;image-rendering:pixelated}
#ui{position:absolute;top:8px;left:50%;transform:translateX(-50%);width:420px}
.bar{height:10px;background:#333;border-radius:5px;overflow:hidden;margin-bottom:4px}
.fill{height:100%;background:#0f0;width:100%}
#bossFill{background:#f44}
</style>
</head>
<body>
<div id="ui">
<div>HP</div>
<div class="bar"><div id="hpFill" class="fill"></div></div>
<div id="bossUI" style="display:none">
<div>Boss</div>
<div class="bar"><div id="bossFill" class="fill"></div></div>
</div>
<div id="score">Score 0</div>
<div id="phase">Phase 1</div>
</div>
<canvas id="game" width="420" height="600"></canvas>
<script>
const canvas=document.getElementById("game")
const ctx=canvas.getContext("2d")

let keys={}
let bullets=[]
let enemyBullets=[]
let enemies=[]
let items=[]
let boss=null
let score=0
let phase=1

const player={x:210,y:540,hp:100,cool:0,hit:4}

window.addEventListener("keydown",e=>keys[e.key]=true)
window.addEventListener("keyup",e=>keys[e.key]=false)

const playerSprite=[
"0011100",
"0111110",
"1111111",
"1011101",
"0011100"
]

const enemySprite=[
"01110",
"11111",
"10101",
"11111",
"01010"
]

const bossSprite=[
"00111100",
"01111110",
"11111111",
"11011011",
"11111111",
"01111110",
"00111100"
]

function drawSprite(sprite,x,y,s,color){
 ctx.fillStyle=color
 for(let r=0;r<sprite.length;r++){
  for(let c=0;c<sprite[r].length;c++){
   if(sprite[r][c]==="1")ctx.fillRect(x+c*s,y+r*s,s,s)
  }
 }
}

function spawnWave(){
 enemies=[]
 for(let i=0;i<10+phase;i++){
  enemies.push({x:20+i*30,y:60,t:Math.random()*10})
 }
}

function spawnBoss(){
 boss={x:210,y:100,hp:3000,max:3000,t:0,pattern:0}
 document.getElementById("bossUI").style.display="block"
}

function shoot(x,y,vx,vy){enemyBullets.push({x,y,vx,vy})}

function flower(cx,cy,n,s,rot){
 for(let i=0;i<n;i++){
  let a=i*Math.PI*2/n+rot
  shoot(cx,cy,Math.cos(a)*s,Math.sin(a)*s)
 }
}

// 新しい弾幕：回転リング
function rotatingRing(cx,cy,n,s,rot){
 for(let i=0;i<n;i++){
  let a=i*Math.PI*2/n
  shoot(cx,cy,Math.cos(a+rot)*s,Math.sin(a+rot)*s)
 }
}

// 新しい弾幕：プレイヤー狙い拡散
function aimedBurst(cx,cy,n,s){
 let dx=player.x-cx
 let dy=player.y-cy
 let base=Math.atan2(dy,dx)
 for(let i=0;i<n;i++){
  let a=base+(i-n/2)*0.15
  shoot(cx,cy,Math.cos(a)*s,Math.sin(a)*s)
 }
}

// 新しい弾幕：ウェーブ弾
function wavePattern(cx,cy,count,speed,t){
 for(let i=0;i<count;i++){
  let a=(i*0.4)+t
  shoot(cx,cy,Math.cos(a)*speed,Math.sin(a)*speed)
 }
}(cx,cy,n,s,rot){
 for(let i=0;i<n;i++){
  let a=i*Math.PI*2/n+rot
  shoot(cx,cy,Math.cos(a)*s,Math.sin(a)*s)
 }
}

function spiral(cx,cy,n,s,rot){
 for(let i=0;i<n;i++){
  let a=rot+i*0.25
  shoot(cx,cy,Math.cos(a)*s,Math.sin(a)*s)
 }
}

function rain(){
 for(let i=0;i<14;i++)shoot(Math.random()*420,-10,0,3+Math.random()*2)
}

function dropItem(x,y){
 if(Math.random()<0.25){
  items.push({x:x,y:y})
 }
}

function update(){

 if(keys.ArrowLeft)player.x-=5
 if(keys.ArrowRight)player.x+=5
 player.x=Math.max(10,Math.min(canvas.width-10,player.x))

 if(keys[" "]&&player.cool<=0){
  bullets.push({x:player.x,y:player.y})
  player.cool=6
 }
 if(player.cool>0)player.cool--

 bullets.forEach(b=>b.y-=9)
 bullets=bullets.filter(b=>b.y>-20)

 enemyBullets.forEach(b=>{
  b.x+=b.vx
  b.y+=b.vy
  if(Math.hypot(b.x-player.x,b.y-player.y)<player.hit){
   player.hp-=4
   b.y=1000
  }
 })

 enemyBullets=enemyBullets.filter(b=>b.y<620&&b.x>-20&&b.x<440)

 items.forEach(i=>{
  i.y+=2
  if(Math.hypot(i.x-player.x,i.y-player.y)<12){
   player.hp=Math.min(100,player.hp+20)
   i.y=1000
  }
 })
 items=items.filter(i=>i.y<620)

 if(boss){
  boss.t+=0.05
  boss.x=210+Math.sin(boss.t)*150

  if(boss.pattern==0){
   flower(boss.x,boss.y,40,2,boss.t)
   if(boss.hp<2000)boss.pattern=1
  }
  else if(boss.pattern==1){
   spiral(boss.x,boss.y,20,3,boss.t*3)
   if(Math.random()<0.1)rain()
   if(boss.hp<1000)boss.pattern=2
  }
  else{
   flower(boss.x,boss.y,70,2.5,boss.t*2)
   spiral(boss.x,boss.y,30,3.5,boss.t*5)
   if(Math.random()<0.15)rotatingRing(boss.x,boss.y,24,2.8,boss.t)
   if(Math.random()<0.12)aimedBurst(boss.x,boss.y,9,3.2)
   if(Math.random()<0.1)wavePattern(boss.x,boss.y,14,2.6,boss.t)
  }(boss.x,boss.y,70,2.5,boss.t*2)
   spiral(boss.x,boss.y,30,3.5,boss.t*5)
  }

  bullets.forEach(b=>{
   if(Math.hypot(b.x-boss.x,b.y-boss.y)<30){
    boss.hp-=2
    score+=5
    b.y=-100
   }
  })

  if(boss.hp<=0){alert("GAME CLEAR");location.reload()}

  document.getElementById("bossFill").style.width=(boss.hp/boss.max*100)+"%"
 }

 else{
  enemies.forEach(e=>{
   e.t+=0.07
   e.x+=Math.sin(e.t)*3
   e.y+=Math.sin(e.t*2)*0.6

   if(Math.random()<0.03){
    let dx=player.x-e.x
    let dy=player.y-e.y
    let d=Math.hypot(dx,dy)
    shoot(e.x,e.y,dx/d*2,dy/d*2)
   }

   bullets.forEach(b=>{
    if(Math.hypot(b.x-e.x,b.y-e.y)<12){
     dropItem(e.x,e.y)
     e.y=1000
     score+=10
     b.y=-100
    }
   })
  })

  enemies=enemies.filter(e=>e.y<900)

  if(enemies.length==0){
   phase++
   document.getElementById("phase").textContent="Phase "+phase

   if(phase>=10)spawnBoss()
   else spawnWave()
  }
 }

 if(player.hp<=0){alert("GAME OVER");location.reload()}

 document.getElementById("hpFill").style.width=player.hp+"%"
 document.getElementById("score").textContent="Score "+score
}

function draw(){
 ctx.clearRect(0,0,canvas.width,canvas.height)

 drawSprite(playerSprite,player.x-14,player.y-10,4,"#0ff")

 ctx.fillStyle="#ff0"
 bullets.forEach(b=>ctx.fillRect(b.x-2,b.y-6,4,8))

 ctx.fillStyle="#f55"
 enemyBullets.forEach(b=>ctx.fillRect(b.x-2,b.y-2,4,4))

 enemies.forEach(e=>drawSprite(enemySprite,e.x-10,e.y-10,4,"#0f0"))

 items.forEach(i=>{
  ctx.fillStyle="#0ff"
  ctx.fillRect(i.x-4,i.y-4,8,8)
 })

 if(boss)drawSprite(bossSprite,boss.x-16,boss.y-16,4,"#f0f")

 // hitbox debug core
 ctx.fillStyle="#fff"
 ctx.fillRect(player.x-1,player.y-1,2,2)
}

function loop(){
 update()
 draw()
 requestAnimationFrame(loop)
}

spawnWave()
loop()
</script>
</body>
</html>
